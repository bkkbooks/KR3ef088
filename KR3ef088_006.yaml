body:
  text: 卷六外感雜病百合狐惑陰陽毒十三章百合狐惑陰毒陽毒非同氣也而狐惑之神思迷亂有似百合陽毒之膿血腐瘀頗類狐惑不同之中未嘗無相同之象而皆有表邪則同也百合之病有得於吐下發汗者有不經吐下發汗者是傷寒之變證也狐惑之病狀類傷寒是傷寒之類證也陽毒陰毒之病服藥取汗是傷寒之別證也其病氣之變現固以本氣之郁發然非有表邪之外束則本氣何因而鬱發也此可以會通其原病矣百合九章百合一百合病者百脈一宗悉致其病也意欲食復不能食常默然欲臥不能臥欲行不能行飲食或有美時或有不欲聞食臭時如寒無寒如熱無熱口苦小便赤諸藥不能治得藥則劇吐利如有神靈者身形如和其脈微數每溺時頭痛者六十日乃愈若溺時頭不痛淅淅然者四十日愈若溺時快然但頭眩者二十日愈其證或未病而預見或病四五日而出或病二十日或一月後見者各隨證治之百合病者傷寒之後邪氣傳變百脈一宗悉致其病百脈者六氣攸分五行不一而百脈一宗則殊途同歸悉致其病則百端俱集意未嘗不欲食復不能食常默然無語動止不安故欲臥不能臥欲行不能行飲食或有甘美之時或有惡聞食臭之時如寒而無寒如熱而無熱口苦便赤諸藥不效得藥則劇吐利不測身形如和其脈微數如是則經絡臟腑莫名其部寒熱燥濕難分其條此有法焉觀其小便溺時頭痛者水降而氣升也氣水一原在上則為氣是謂上焦如霧在下則為水是謂下焦如瀆在中氣水之交是謂中焦如漚上焦清氣昏蒙心緒煩亂濁氣稍降頭目猶清溺時清氣降泄而濁氣升騰頭上壅塞是以作痛此其病重兩月乃愈若溺時頭上不痛但淅淅振栗者氣雖上升而未甚壅遏其病頗輕四十日愈若溺時快然但覺頭眩者氣雖上升而不至填塞其病更輕二十日愈其溺時之證或未病而預見或病四五日而方出或病二十日及一月而後見者各隨其證之輕重而治之也百合二百合病發汗後者百合知母湯主之百合之病即其溺時頭痛觀之是病在氣分也主氣者肺肺朝百脈百脈之氣受之於肺一呼則百脈皆升一吸則百脈皆降呼吸出入百脈關通是以肺病則百脈皆病肺氣清明則神思靈爽甘寢飽食肺氣不清則鬱悶懊憹眠食損廢矣是宜清肺肺氣清和百脈自調而其由來非一則用法不同若得於發汗之後者是汗亡肺津金被火刑也百合知母湯百合清肺而生津知母涼金而瀉火也百合知母湯十九百合七枚知母三兩上先以水洗百合漬一宿當白沫出去其水更以泉水二升煎取一升去滓別以泉水二升煎知母取一升去滓後合和煎取一升五合分溫再服百合三百合病下之後者滑石代赭湯主之百合病得於下之後者是下傷中氣濕動胃逆肺鬱而生熱也滑石代赭湯百合清金而瀉熱滑石代赭滲濕而降逆也滑石代赭湯二十百合七枚滑石三兩碎綿裹代赭石如雞子大碎綿裹上先以水洗百合浸一宿當白沫出去其水更以泉水二升煎取一升去滓別以泉水二升煎滑石代赭石取一升去滓後合和重煎取一升五合分溫服百合四百合病吐之後者百合雞子湯主之百合病得於吐之後者是吐傷肺胃之津燥動而火炎也百合雞子湯百合清肺熱而生津雞子黃補脾精而潤燥也百合雞子湯二十一百合七枚雞子黃一枚上先以水洗百合浸一宿當白沫出去其水更以泉水二升煎取一升去滓內雞子黃攪勻煎五分溫服百合五百合病不經吐下發汗病形如初者百合地黃湯主之百合病不經吐下發汗病形如初者瘀熱淫蒸敗濁未泄百合地黃湯百合清金而除煩熱地黃瀉胃而下瘀濁也百合地黃湯二十二百合七枚生地黃汁一升上先以水洗百合浸一宿當白沫出去其水更以泉水二升煎取一升去滓內地黃汁煎取一升五合分溫再服中病勿更服大便當如漆百合六百合病一月不解變成渴者百合洗方主之百合病一月不解變成渴者是金被火刑津枯而肺燥也百合洗方潤皮毛而清肺燥也百合洗方二十三百合一升上百合一味以水一斗浸之一宿以洗身洗後食煮餅勿以鹽豉也百合七百合病渴不差者栝蔞牡蠣散主之百合病渴不差者是相火刑金而津液枯稿也栝蔞牡蠣散栝蔞清金而潤燥牡蠣斂肺而止渴也栝蔞牡蠣散二十四栝蔞根牡蠣熬等分上為細末飲服方寸匕日三服百合八百合病變發熱者百合滑石散主之百合病變發熱者是濕動胃逆而肺氣不降也百合滑石散百合清金而瀉熱滑石利水而瀉濕也百合滑石散二十五百合一兩炙滑石二兩上為散飲服方寸匕日三服當微利熱除則止服百合九百合病見於陰者以陽法救之見於陽者以陰法救之見陽攻陰復發其汗此為逆見陰攻陽乃復下之此亦為逆百合病見於陰分者以陽法救之陽長而陰自消見於陽分者以陰法救之陰進而陽自退若見於陽者反攻其陰而發汗愈亡其陰此為逆也若見於陰者反攻其陽而下之愈亡其陽此亦為逆也狐惑二章狐惑一狐惑之為病狀如傷寒默默欲眠目不得閉臥起不安蝕於喉為惑蝕於陰為狐不欲飲食惡聞食臭其面目乍赤乍黑乍白蝕於上部則聲嗄甘草瀉心湯主之蝕於下部則咽乾苦參湯洗之蝕於肛者雄黃散熏之狐惑者狐疑惶惑綿昧不明狀如傷寒而病實在裡默默欲眠目不得閉臥起不安飲食皆廢其面目乍赤乍黑乍白而無定色此蓋濕氣遏郁精神昏憒之病也濕邪淫泆上下熏蒸浸漬糜爛肌肉剝蝕蝕於喉嚨其名為惑以心主藏神陽分受傷清氣燔蒸則神思惶惑而不靈也蝕於二陰其名為狐以腎主藏志陰分受傷濁氣熏爍則志意狐惑而不清也蝕於上部其病在心心火刑金是以聲嗄心火升炎下寒上熱甘草瀉心湯參甘薑棗溫補中脘之虛寒芩連半夏清降上焦之鬱熱也蝕於下部其病在腎腎脈上循喉嚨是以咽乾其前在陰器則以苦參湯洗之後在肛門則以雄黃散熏之蓋土濕木陷鬱而生熱化生蟲𧈟前後侵蝕苦參雄黃清熱而去濕療瘡而殺蟲也土濕則脾陷而不消胃逆而不納故不能飲食君火不降則見赤色辛金不降則見白色壬水不降則見黑色病見上下而根在中焦總由太陰濕土之旺甘草瀉心溫中清上培土降逆狐惑之的方也甘草瀉心湯二十六方見傷寒太陽甘草四兩炙半夏半升黃芩三兩黃連一兩乾薑三兩人參三兩大棗十二枚上七味以水一斗煮取六升去滓再煎取三升溫服一升日三服傷寒無人參苦參湯二十七苦參一升上一味以水一斗煎取七升去滓熏洗日三次雄黃散二十八雄黃上一味為末簡瓦二枚合之燒向肛熏之狐惑二病者脈數無熱微煩默默但欲臥汗出初得之三四日目赤如鳩眼七八日目四眥黑若能食者膿已成也赤小豆當歸散主之病者脈數而無表熱鬱郁微煩默默欲臥自汗常出此狐惑之濕旺而木鬱者初得之三四日目赤如鳩眼七八日目之四眥皆黑以肝竅於目藏血而胎火木鬱生熱內蒸而不外發故脈數而身和木賊土困故煩鬱而欲臥風木疏泄故見自汗邪熱隨經而走上竅故目如鳩眼營血腐敗而不外華故目眥灰黑此必作癰膿若能飲食者膿已成也以肉腐膿化木鬱鬆緩是以能食赤小豆當歸散小豆利水而瀉濕當歸養血而排膿也赤小豆當歸散二十九赤小豆三升浸令芽出曝乾當歸十兩上二味杵為散漿水服方寸匕日三服陽毒一章陽毒一陽毒之為病面赤斑斑如錦紋咽喉痛吐膿血五日可治七日不可治升麻鱉甲湯主之眉批諸家皆以此為溫疫時病陽毒之病少陽甲木之邪也相火上逆陽明鬱蒸而生上熱其經自面下項循喉嚨而入缺盆故面赤喉痛而吐膿血臟氣相摶五日始周則猶可治七日經氣已周而兩臟再傷故不可治難經所謂七傳者死也五十三難假令心病傳肺肺傳肝肝傳脾脾傳腎腎傳心一臟不再傷故言七傳者死七日肺肝再傷故死也升麻鱉甲湯升麻甘草清咽喉而鬆滯結鱉甲當歸排膿血而決腐瘀雄黃蜀椒瀉濕熱而下逆氣也升麻鱉甲湯三十升麻二兩鱉甲手指大一片炙甘草二兩當歸一兩雄黃五錢研蜀椒一兩炒去汗上六味以水四升煮取一升頓服之老小再服取汗陰毒一章陰毒一陰毒之為病面目青身痛如被杖咽喉痛五日可治七日不可治升麻鱉甲去雄黃蜀椒湯主之陰毒之病厥陰乙木之邪也肝竅於目而色青故面目青足太陰之脈上膈而挾咽脾肝鬱迫風木衝擊故身與咽喉皆痛升麻鱉甲去雄黃蜀椒湯升麻甘草清咽喉而鬆迫結鱉甲當歸破痞瘀而滋風木也升麻鱉甲去雄黃蜀椒湯三十一升麻二兩鱉甲手指大一片炙甘草二兩炙當歸一兩煎服依前法陰陽毒有表邪外束故宜取汗
