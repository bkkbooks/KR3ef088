body:
  text: 卷十三內傷雜病嘔吐噦下利四十九章嘔噦者陽明胃病也下利者太陰脾病也胃以下行為順胃氣上逆則為嘔噦脾以上行為順脾氣下陷則病下利總以中氣之不治也中氣者升降脾胃之樞機樞機病則升降失職而吐利乃作此中多挾木邪以木鬱則剋土甲木逼於上則胃逆而為吐乙木賊於下則脾陷而為利補土疏木乃吐利之定法土旺而木達膽胃降則嘔止肝脾升則利斷矣嘔吐噦二十四章嘔吐一問曰病人脈數數為熱當消穀引飲而反吐者何也師曰以發其汗令陽氣微膈氣虛脈乃數數為客熱不能消穀胃中虛冷故也此段見傷寒太陽篇汗多陽亡濁陰上逆是以嘔吐陽不歸根客居膈上息道短促是以脈數膈上雖熱胃中則是虛冷虛冷則水穀不消而病嘔吐也嘔吐二趺陽脈浮而澀浮則為虛虛則傷脾脾傷則不磨朝食暮吐暮食朝吐宿穀不化名曰胃反脈緊而澀其病難治趺陽者陽明胃氣之所變現也動脈在足趺上之衝陽故曰趺陽陽明胃氣以下行為順脈不應見浮澀浮則胃氣之虛而不降也胃虛而上逆則脾虛而下陷陷則脾傷脾傷不能磨化水穀故朝食而暮吐暮食而朝吐宿穀不化名曰胃反胃反者飲食倒上是反順而為逆也緊澀者血寒而陽陷也脾敗不磨而脈見緊澀水冰地坼微陽淪陷而不升故其病難治嘔吐三脈弦者虛也胃氣無餘朝食暮吐變為胃反寒在於上醫反下之令脈反弦故名曰虛膽肝脈弦弦者木鬱剋土胃陽之虛也胃氣無餘不能消穀朝食暮吐變為胃反宗氣衰微寒在於上醫反下之令土敗木賊脈反見弦故名曰虛也嘔吐四寸口脈微而數微則無氣無氣則營虛營虛則血不足血不足則胸中冷寸口者手太陰肺氣之所變現也肺主氣寸口脈微而數者肺中宗氣之虛也水穀之化營氣行於經絡其大氣之摶而不行者積於胸中命曰宗氣宗氣者所以貫心肺而行呼吸營氣之源也無宗氣則營氣虛營虛則血不足也宗氣之根實本於營血血藏於肝而血中之溫氣則化君火氣乃君火之斂降者也營虛血少不能化火陽衰於上故胸中冷血陰也而孕君火其性溫暖而和煦後世但言涼血而不知暖血誤人多矣嘔吐五先嘔卻渴者此為欲解先渴卻吐者為水停心下此屬飲家嘔家本渴今反不渴者以心下有支飲故也此屬支飲先嘔而後渴者積飲既去而津亡作渴故為欲解先渴而後吐者為水停心下阻格君火是以作渴渴而飲水為停水所阻乃復嘔出此屬素有積飲之家也嘔家津液失亡本當發渴今嘔後反不渴者以心下有支飲停留所嘔者但是新下之水穀也此屬支飲此段見痰飲咳嗽中嘔吐六病人慾吐者不可下之病人慾吐者陳宿在上故不可下嘔吐七嘔家有癰膿不可治嘔膿儘自愈此段見傷寒厥陰嘔家而有癰膿當令其膿從嘔出不可降逆止嘔使膿無出路俟其膿盡癰平則嘔吐自愈矣噦八噦而腹滿視其前後知何部不利利之則愈此段見傷寒陽明濁氣上逆則生嘔噦噦而腹滿者太陰之清氣不升陽明之濁氣不降也前後二陰必有不利之部前部不利利其水道後部不利利其穀道前後竅通濁氣下泄則滿消而噦止矣嘔吐九胃反嘔吐者大半夏湯主之胃反嘔吐者前竅短澀後門乾燥多有糞若羊矢之證蓋手足太陽兩經同氣水穀入胃脾陽消磨散其精華上歸於肺霧氣化津傳於膀胱小腸水路清通穀道滋潤是以小便不澀大便不幹胃反氣逆肺金莫降津液凝瘀化生痰涎二陰失滋枯澀燥結故糞如羊矢下竅堵塞濁氣莫泄逆而上衝故嘔吐不止緣其陽衰土濕中氣頹敗不能腐熟水穀化氣生津以滋腸竅是以飲食不得順下而逆行也大半夏湯人參補中氣之虛白蜜潤小腸之燥半夏降胃氣之逆中氣旺而水穀消下竅開而渣滓降濁氣不升嘔吐自止也陰陽別論三陽結謂之膈手足太陽是為三陽足太陽膀胱結則小便澀手太陽小腸結則大便乾下竅澀結濁氣上逆故食膈而不下總由於陽明之陽虛噎膈反胃頗同反胃之病在胃之下脘噎膈之病兼在胃之上脘上脘氣閉則食不能入下脘氣閉則入而復出陽明之性陽盛則開陰盛則閉故也大半夏湯七十半夏二升洗人參三兩白蜜一升上三味以水一斗二升和蜜揚之二百四十遍煮取二升半溫服一升余分再服嘔吐十胃反吐而渴欲飲水者茯苓澤瀉湯主之胃反嘔吐而渴欲飲水者濕盛胃逆而火不根水也以戊土上逆降路瘀塞君相二火不得下蟄逆刑辛金是以渴生茯苓澤瀉湯茯苓澤瀉桂枝疏木而瀉水薑甘白朮降逆而燥土也茯苓澤瀉湯七十一茯苓八兩澤瀉四兩桂枝二兩生薑四兩甘草二兩白朮三兩上六味以水一斗煮取三升內澤瀉再煮取二升半溫服八合日再服嘔吐十一吐後渴欲得水而貪飲者文蛤湯主之吐後渴欲得水而貪飲者吐傷中氣濕動肺逆郁生上熱表裡無降泄之路文蛤湯甘草大棗補土而益脾精石膏文蛤清金而瀉濕熱杏姜利氣而降逆麻黃髮表而達郁也文蛤湯七十二文蛤五兩麻黃三兩生薑三兩杏仁五十枚石膏五兩甘草三兩大棗十二枚上七味以水六升煮取二升溫服一升汗出即愈嘔吐十二嘔吐而病在膈上後思水者解急與之思水者豬苓散主之病在膈上嘔吐之後而思水飲是病去而津亡也其病當解宜急與之水以益津液思水者痰飲雖去而土濕猶存渴欲飲水恐其復致停瘀豬苓散二苓白朮瀉濕而燥土最為相宜也豬苓散七十三豬苓茯苓白朮等分上三味杵為散飲服方寸匕日三服嘔吐十三食已即吐者大黃甘草湯主之食已即吐者胃之上口必有濕熱瘀塞大黃甘草湯大黃瀉其鬱熱甘草培其中氣也大黃甘草湯七十四大黃四兩甘草一兩上二味以水三升煮取一升分溫再服嘔吐十四嘔而脈弱小便複利身有微熱見厥者難治四逆湯主之此段見傷寒厥陰嘔而脈弱胃氣之虛小便複利腎氣之虛腎司二便寒則膀胱失約故小便自利里陽虛敗加以身有微熱而見厥逆者陰盛於內而微陽外格故為難治宜四逆湯以回里陽也四逆湯七十五方見傷寒太陰甘草二兩炙乾薑一兩半附子一枚生用上三味以水三升煮取一升二合去滓分溫再服強人可大附子一枚乾薑三兩嘔吐十五諸嘔吐谷不得下者小半夏湯主之方在痰飲嘔吐而谷不得下者胃氣上逆濁陰不降也小半夏湯半夏生薑降逆氣而驅濁陰也嘔吐十六嘔而發熱者小柴胡湯主之此段見傷寒少陽嘔者膽木之克胃土甲木從相火化氣相火鬱升是以發熱小柴胡湯參甘大棗補戊土而益中氣柴胡黃芩瀉甲木而清相火生薑半夏降濁而止嘔也小柴胡湯七十六方見傷寒少陽柴胡八兩黃芩三兩半夏一升生薑三兩人參三兩甘草三兩大棗十二枚上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服嘔吐十七嘔而腸鳴心下痞者半夏瀉心湯主之寒邪沖激則腸中雷鳴膽胃升郁則心下痞硬心痞則火無降路必生上熱半夏瀉心湯黃芩黃連清上而瀉火薑甘參棗溫中而補土半夏降逆而止嘔也半夏瀉心湯七十七方見傷寒少陽半夏八兩洗黃芩三兩黃連一兩乾薑三兩人參三兩甘草三兩炙大棗十二枚上七味以水一斗煮取六升去滓再煎取三升溫服一升日三服嘔吐十八嘔而胸滿者吳茱萸湯主之嘔而胸滿者中氣虛寒膽胃逆升濁陰填塞於膈上也吳茱萸湯人參大棗補中而培土茱萸生薑溫胃而降逆也吳茱萸湯七十八方見傷寒陽明吳茱萸一升人參二兩大棗十二枚生薑六兩上四味以水五升煮取二升溫服七合日三服嘔吐十九乾嘔吐涎沫頭痛者吳茱萸湯主之此段見傷寒厥陰胃氣上逆濁陰翻騰則生乾嘔肺氣鬱阻津液凝滯則生涎沫濁氣升填頭上壅塞則苦疼痛肺胃之上逆根緣中下之虛寒宜吳茱萸湯溫補中脘而降逆氣也嘔吐二十乾嘔吐逆吐涎沫半夏乾薑散主之乾嘔吐逆吐涎沫胃寒而氣逆也半夏乾薑散半夏降其逆氣乾薑溫其中寒也半夏乾薑散七十九半夏乾薑等分上二味杵為散取方寸匕將水一升半煎取七合頓服之嘔吐二十一乾嘔而下利者黃芩加半夏生薑湯主之乾嘔而利者甲木之賊戊土胃氣鬱遏不能容納水穀故下為泄利而上為乾嘔黃芩加半夏生薑湯甘草大棗補中氣而益脾精黃芩芍藥清甲木而瀉相火半夏生薑降胃氣而止嘔吐也黃芩加半夏生薑湯八十方見傷寒少陽黃芩三兩芍藥一兩甘草二兩大棗十二枚半夏半升生薑三兩上六味以水一斗煮取三升去滓溫服一升日再夜一服嘔吐二十二病人胸中似喘不喘似嘔不嘔似噦不噦徹心中憒憒然無奈者生薑半夏湯主之胸中似喘似嘔似噦又復不喘不嘔不噦徹心中憒憒然煩亂而無奈者胃氣上逆濁氣翻騰溫溫泛泛心緒作惡之象也生薑半夏湯降逆氣而驅濁陰也生薑半夏湯八十一此即小半夏湯而分兩不同生薑汁一升半夏半斤上二味以水三升煮半夏取二升內生薑汁煮取一升半小冷分四服日三夜一嘔止停後服嘔噦二十三乾嘔噦若手足厥者橘皮湯主之乾嘔噦者胃氣上逆濁陰湧泛也肺氣阻滯郁生痰涎遏抑清陽不得四布故手足厥逆橘皮湯橘皮生薑降沖逆而行瘀濁也橘皮湯八十二橘皮四兩生薑八兩上二味以水七升煮取三升溫服一升下咽即愈噦逆二十四噦逆者橘皮竹茹湯主之噦逆者中虛而胃逆也橘皮竹茹湯參甘大棗補中而培土橘薑竹茹降逆而止嘔也橘皮竹茹湯八十三橘皮二斤竹茹二斤生薑半斤人參一兩甘草五兩大棗三十枚上六味以水一斗煮取三升溫服一升日三服下利二十五章下利一下利清穀不可攻其表汗出必脹滿此段見傷寒太陰下利清穀脾陽陷敗雖有太陽表證不可攻之攻之汗出陽亡清陽愈陷濁陰愈逆必生脹滿下利二下利氣者當利其小便下利而失氣者濕盛而氣滯也當利其小便以滲濕邪下利三夫六腑氣絕於外者手足寒上氣腳縮五臟氣絕於內者利不禁下甚者手足不仁六腑為陽其位在外六腑氣絕於外者手足寒冷喘促而上氣蜷臥而腳縮也五臟為陰其位在內五臟氣絕於內者下利不禁下甚者神氣敗泄而手足不仁六腑以胃為主五臟以脾為主脾胃同主四肢故病皆見於手足也下利四下利後脈絕手足厥冷晬時脈還手足溫者生脈不還者死此段見傷寒厥陰利後脈絕手足厥冷陽氣敗泄危亡在目若晬時脈還手足溫者陽氣來復可以回生脈不還者陽氣不復死無望矣下利五下利手足厥冷無脈者炙之不溫若脈不還反微喘者死此段見傷寒厥陰下利厥冷無脈炙之不溫與脈不還是純陰無陽而反微喘者則氣不歸根必死無疑也下利六少陰負趺陽者為順也少陰腎脈趺陽胃脈胃土本克腎水而水盛反得侮土以土生於火而火克於水火勝則土能剋水而少陰負火敗則水反侮土而趺陽負凡病皆水勝而土負土勝而水負者甚少也水勝則死土勝則生故少陰以負趺陽為順仲景脈法唐後無傳庸工下士開滋陰補水之門誤世殃民禍流千載今海內醫書連床累架皆徐世勣作無賴賊時逢人輒殺者也俗子誦之以害生靈醫如猛虎人如孤豚誠足悲傷不可說也下利七下利脈沉弦者下重脈大者為未止脈微弱數者為欲自止雖發熱不死此段見傷寒厥陰下利脈沉弦者水寒木陷必主下重設脈大者是利亡肝脾之陽木賊土敗利為未止若脈微弱數者是脾陽欲復肝邪將退為欲自止雖外見發熱然續將內斂不至死也下利八下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也此段見傷寒厥陰下利而脈沉遲臟陰盛而腑陽虛也乃其人面色少赤身有微熱者是微陽欲復為陰邪所遏鬱於皮腠而不能透發也然陽郁欲發必不終陷頃當沖透群陰汗出而解但微陽孤弱未能遽出重圍難免鬱冒昏迷而後外達皮毛耳方其鬱冒之時病人必當微厥所以然者其面之少赤是謂戴陽戴陽者陽根微弱而下虛故也下利九下利有微熱而渴脈弱者令自愈此段見傷寒厥陰下利有微熱而渴是陽復矣脈弱則木邪欲退故令自愈下利十下利脈反弦發熱身汗者愈下利脈沉而弦者水寒而木陷也今弦而不沉是乙木有升達之意再見發熱身汗則下陷之陽已升於上故愈下利十一下利脈數有微熱汗出令自愈設脈緊為未解此段見傷寒厥陰下利脈數而有微熱陽欲復也汗出則陽氣外達故令自愈設脈復緊則陰邪閉束陽陷而不升為未解也下利十二下利脈數而渴者令自愈設不差必圊膿血以有熱故也此段見傷寒厥陰下利脈數而渴者陽已復矣故令自愈設利不差必圊膿血以其陽復之過而有餘熱以傷陰也下利十三下利寸脈反浮數尺中自澀者必圊膿血此段見傷寒厥陰下利而寸脈反見浮數是陽復而上盛尺中自澀者是陰退而下虛也陽盛必俯侵陰位鬱蒸營分而圊膿血也下利十四下利腹脹滿身體疼痛者先溫其里乃攻其表溫里宜四逆湯攻表宜桂枝湯此段見傷寒太陰下利而腹脹滿是太陰腹滿自利之證也其身體疼痛則是太陽表證是當先溫其里後攻其表溫里宜四逆湯以驅其寒攻表宜桂枝湯以驅其風里溫而攻表則汗出不慮其陽亡也桂枝湯八十四方見傷寒太陽桂枝三兩芍藥三兩甘草二兩大棗十二枚生薑三兩上五味㕮咀以水七升微火煮取三升去滓適寒溫服一升服已須臾啜稀粥一升以助藥力溫覆令一時許遍身漐漐微似有汗者益佳不可令如水淋漓若一服汗出病瘥停後服下利十五下利清穀裡寒外熱汗出而厥者通脈四逆湯主之下利清穀裡寒外熱手足厥逆脈微欲絕是少陰通脈四逆證厥陰風木疏泄故有汗出之證亦宜通脈四逆溫臟寒而通經脈也此段見傷寒厥陰詳閱傷寒少陰厥陰二篇此段之義乃明通脈四逆湯八十五方見傷寒少陰此即四逆湯而分兩不同甘草二兩炙乾薑三兩強人可四兩附子大者一枚生用上三味以水三升煮取一升二合去滓分溫再服下利十六氣利訶黎勒散主之氣利即前所謂下利氣也以肝脾濕陷二氣鬱塞木遏風動疏泄不藏而為下利利而隧道梗澀氣塊喧鳴而不調暢是謂氣利訶黎勒散行滯氣而收滑陷也訶黎勒散八十六訶黎勒十枚上一味為散粥飲和頓服下利十七下利肺痛紫參湯主之肺與大腸為表裡腸陷而利作則肺逆而痛生而肺腸之失位緣中氣之不治脾土不升而後腸陷胃土不降而後肺逆紫參湯甘草補中而緩急紫參清金而破瘀瘀開而氣調各復肺腸升降之舊則痛定而利止矣紫參湯八十七紫參半斤甘草三兩上二味以水五升先煮紫參取二升內甘草煮取一升半分溫再服下利十八下利後更煩按之心下濡者為虛煩也梔子豉湯主之此段見傷寒厥陰利後陽泄不應生煩乃更煩者是陽復而有內熱也承氣證之煩心下硬滿是謂實煩若按之心下濡者是謂虛煩緣陽復熱升熏蒸肺津而化涎沫心氣鬱阻是以生煩宜梔子豉湯吐其瘀濁以清煩熱也梔子豉湯八十八方見傷寒太陽梔子十四枚劈香豉四合綿裹上二味以水四升先煮梔子取二升半內豉煮取一升半去滓分二服進一服得吐則止下利十九下利譫語者有燥屎也小承氣湯主之此段見傷寒厥陰下利譫語者是膽火傳於胃土胃熱而有燥屎也宜小承氣湯下其燥屎以瀉胃熱此下大承氣證四章皆少陰之負陽明下利之順證也小承氣湯八十九方見傷寒陽明大黃四兩枳實三枚炙厚朴二兩炙上三味以水四升煮取一升二合去滓分溫二服得利則止下利二十下利三部脈皆平按之心下堅者急下之宜大承氣湯方見痙病此段見傷寒可下中在汗下宜忌篇內寸大於關關大於尺人之常也是以三部不平三部皆平是乙木鬱於尺中不能上達故尺與關平甲木鬱於關上不能下達故關與寸平乙木陷則臍下脹甲木逆則心下堅若按之心下堅者是甲木之逆也戊土被迫腑不能容故見下利宜大承氣急下之以清胃腑之鬱熱也下利二十一下利脈遲而滑者實也利未欲止急下之宜大承氣湯此段見傷寒可下中宿食在中不能阻其表氣而鬱其裡氣故外滑而內遲裡氣郁阻肝脾不升故利未欲止下利二十二下利脈反滑者當有所去下之乃愈宜大承氣湯此段見傷寒可下中宿食在中郁格陽氣不得內濟無復陰氣之翕聚是以脈滑下利二十三下利已瘥至其年月日時復發者以病不盡故也當下之宜大承氣湯此段見傷寒可下中下利瘥後至其從前病起之期而又發以病根不盡故也當下之以絕其根下利二十四熱利下重者白頭翁湯主之此段見傷寒厥陰肝氣遏陷郁生下熱魄門重墜者宜白頭翁湯白頭翁清少陽之相火黃連清少陰之君火黃柏秦皮瀉厥陰之濕熱也白頭翁湯九十方見傷寒厥陰白頭翁三兩黃連三兩黃柏二兩秦皮三兩上四味以水七升煮取三升去滓溫服一升不愈更服下利二十五下利便膿血者桃花湯主之此段見傷寒少陰久利不止木鬱血陷寒濕腐敗風木摧剝故便膿血桃花湯粳米補土而瀉濕乾薑溫中而驅寒石脂斂腸而固脫也桃花湯九十一方見傷寒少陰乾薑一兩粳米一升赤石脂一斤一半生用一半篩末上三味以水七升煮米熟去滓內石脂末方寸匕溫服七合日三服若一服愈余勿服附方外臺黃芩湯六治乾嘔下利黃芩三兩桂枝一兩人參三兩大棗十二枚乾薑三兩半夏半升上六味以水七升煮取三升分溫三服
