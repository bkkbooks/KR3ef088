body:
  text: 卷十九外科瘡癰腸癰浸淫七章瘡癰者營衛壅阻之病也營氣得寒血脈凝澀壅阻衛氣蓄積結硬衛鬱熱盛肉腐為膿膿不瀉則爛筋筋爛則傷骨骨傷則髓消筋骨肌肉不相榮經脈敗漏熏於五臟臟傷則人死矣淺者為癰深者為疽癰者營衛之壅塞於外者也疽者氣血之阻滯於內者也疽之外候皮夭而堅癰之外候皮薄以澤陰陽之分也仲景於瘡癰之門獨列腫癰腸癰二種腫癰即癰之淺者腸癰即疽之深者證不多舉而義已概矣靈樞癰疽之篇條緒繁多不過此兩者之傳變而已無煩詳引也瘡癰一諸脈浮數應當發熱而反灑淅惡寒若有痛處當發瘡癰此段見傷寒脈法諸脈浮數應當發熱而反灑淅惡寒此熱鬱於內不得外發陽遏不達故見惡寒若有疼痛之處則內熱鬱蒸肉腐膿化當發瘡癰也瘡癰二師曰諸癰腫欲知有膿無膿以手按腫上熱者為有膿不熱者為無膿內熱盛則蒸腐血肉而為膿以手掩腫上熱者是內熱已盛膿化結消而陽氣外達也故知有膿不熱者血肉腫結陽郁未達故知無膿瘡癰三問曰寸口脈浮微而澀法當亡血若汗出設不汗出者云何曰若身有瘡被刀斧所傷亡血故也寸口脈浮微而澀氣虛則浮微血虛則澀法當亡血若汗出以汗者氣血鬱蒸而外泄汗去則血消血消則氣亡寸口脈浮微而澀氣血俱虛如此是非亡血即汗出也設不汗出必當亡血若夫身有瘡癰或被刀斧所傷營血外亡故脈如此腫癰四腫癰者少腹腫痞按之即痛如淋小便自調時時發熱自汗出復惡寒其脈遲緊者膿未成可下之當有血脈洪數者膿已成不可下也大黃牡丹皮湯主之腫癰者少腹腫痞癰之外在肌肉者也肌肉臃腫內阻腸胃之氣結而不行故痞硬不軟按之裡氣愈阻膀胱經脈壅塞木氣鬱迫故其痛如淋病不及腑水道無阻故小便自調陽氣鬱蒸皮毛不闔故發熱汗出而陽郁不能透泄故仍復惡寒其脈遲緊則血肉凝塞隧路不通膿尚未成可以下之當有血也脈洪數者熱盛膿成不可下也大黃牡丹皮湯丹皮桃仁瓜子排決其膿血芒硝大黃洗蕩其鬱蒸也大黃牡丹皮湯百四十五大黃四兩芒硝三合瓜子半升牡丹皮一兩桃仁五十枚上五味以水六升煮取一升去滓內芒硝再煎沸頓服之有膿當下如無膿當下血腸癰五腸癰之為病其身甲錯腹皮急按之濡如腫狀腹無積聚身無熱脈數此為腸內有癰薏苡附子敗醬散主之腸癰者癰之內及六腑者也血氣凝澀外不華膚故其身甲錯腸胃痞脹故腹皮緊急壅腫在內故按之濡塌形如腫狀其實肌膚未嘗腫硬也病因腸間癰腫腹內原無積聚瘀熱在裡故身上無熱而脈卻甚數此為腸內有癰也靈樞癰疽寒邪客於經脈之中則血澀血澀則不通不通則衛氣歸之不得復反故癰腫寒氣化為熱熱勝則腐肉肉腐則為膿是癰成為熱而其先則寒也寒非得濕則不凝薏苡附子敗醬散薏苡去濕而消滯敗醬破血而宣壅附子溫寒而散結也薏苡附子敗醬散百四十六薏苡十分附子二分敗醬五分上三味杵為未取方寸匕以水二升煎減半頓服小便當下排膿湯百四十七甘草二兩桔梗三兩生薑二兩大棗十枚上四味以水三升煮取一升溫服五合日再服排膿散百四十八枳實十六枚芍藥六分桔梗二分上三味杵為散取雞子黃一枚以藥散與雞子黃相等揉和令相得飲和服之日服金瘡六病金瘡王不留行散主之金瘡失血溫氣外亡乙木寒濕必生風燥王不留行散甘草補中厚朴行滯椒姜暖血而扶陽芩芍清肝而息風蒴藋細葉行瘀而化凝桑根王不留行通經而止血也王不留行散百四十九王不留行十分八月八日採燒甘草十分厚朴二分黃芩二分芍藥二分蒴藋細葉十分七月七日採燒桑東南根白皮十分三月三日採燒乾薑二分川椒三分除目閉口去汗上九味桑皮蒴藋王不留行三味燒灰存性勿令灰過各別搗篩合治之為散服方寸匕小瘡則粉之大瘡但服之産後亦可服如風寒桑東南根勿取之燒灰三物皆陰乾百日浸淫瘡七浸淫瘡從口流向四肢者可治從四肢流來入口者不可治浸淫瘡黃連粉主之素問玉機真臟論夏脈太過則令人身熱而膚痛為浸淫氣交變論歲火太過身熱骨痛而為浸淫靈樞癰疽發於足上下名曰四淫四淫者瘡之淫溢於四肢即浸淫瘡之謂也熱毒浸淫從口流向四肢者毒散於外故可治從四肢流來入口者毒結於內故不可治黃連粉瀉熱而清火也黃連粉百五十黃連原方闕載大概以黃連一味作粉粉瘡上以瀉毒熱也
