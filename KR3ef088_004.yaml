body:
  text: 卷四外感雜病痙濕暍二十七章痙濕暍者風鬱於表而裡氣內應燥盛則木枯而為痙水盛則土潰而為濕火盛則金爍而為暍三氣非同然有相通者焉相通維何濕而已矣痙燥病也而曰若發其汗寒濕相得則惡寒甚是痙病之有濕也暍火病也而曰夏月傷冷水水行皮中所致是暍病之有濕也蓋濕旺土鬱中脘莫運木氣不舒金氣不斂一被感襲閉其皮毛木遏風動血燥筋縮則為痙病金被火刑氣耗津傷則為暍病三者雖殊而溯本窮原未始不類臨此三證助陰滋濕之品當斟酌而詳慎也痙十三章痙病一太陽病發熱汗出而不惡寒者名曰柔痙太陽病發熱汗出而不惡寒者風傷衛也風性柔和故名柔痙痙病二太陽病發熱無汗反惡寒者名曰剛痙太陽病發熱無汗反惡寒者寒傷營也寒性剛急故名剛痙痙病三太陽病發汗太多因致痙太陽病發汗太多亡其津血筋脈失養感於風寒因成痙病痙病四瘡家雖身疼痛不可發汗汗出則痙瘡家膿血失亡筋脈不榮雖感風寒不可發汗汗出血枯筋脈焦縮則成痙病痙病五夫風病下之則痙復發汗必拘急風病木枯血燥下之津血內亡則成痙病復發其汗津血外亡必苦拘急痙病六病者身熱足寒頸項強急惡寒時頭熱面赤目赤獨頭動搖卒口噤背反張者痙病也若發其汗者寒濕相得其表益虛即惡寒甚發其汗已其脈如蛇身熱足寒頸項強急惡寒頭熱面赤目赤頭搖口噤脊背反張者是痙病也以太陽寒水之經起目內眥上額交巔下項挾脊抵腰走足筋司於肝血枯木燥風動筋縮而膀胱津液之腑木所自生更失滋潤故太陽之部筋脈拘牽頭搖口噤頸項強急而脊背反折也素問診要經終論太陽之脈其終也戴眼反折瘈瘲瘈急瘲緩即痙病之謂也若發其汗者陽亡火敗水土之寒濕相得裡氣既虧而表氣益虛即惡寒甚發其汗已經脈枯稿動如蛇行全失緩和從容之象矣痙病七夫痙脈按之緊如弦直上下行脈緊如弦直上下行即上章之其脈如蛇也痙病八暴腹脹大者為欲解脈如故反伏弦者痙陰盛則腹脹素問腎氣實則脹是也暴腹脹大者陰氣內復自臟流經故為欲解其脈如故反沉伏而弦緊者痙病不瘥也痙病九太陽病發熱脈沉而細者名曰痙為難治發熱而脈沉細陰陽俱敗故為難治痙病十痙病有灸瘡難治灸瘡艾火燔灼焦骨傷筋津血消爍未易卒復故難治也痙病十一太陽病其證備身體強𠘧𠘧然脈反沉遲此為痙栝蔞桂枝湯主之太陽病頸項強急發熱惡寒汗出中風之證具備身體強硬𠘧𠘧不柔脈反沉遲此為柔痙栝蔞桂枝湯薑桂達經氣而瀉營郁甘棗補脾精而滋肝血芍藥栝蔞清風木而生津液也栝蔞桂枝湯五栝蔞根三兩桂枝三兩去皮芍藥三兩生薑三兩切甘草二兩炙大棗十二枚劈上六味㕮咀以水七升微火煮取三升去滓適寒溫服一升痙病十二太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痙葛根湯主之太陽病無汗是傷寒之證而小便反少寒水不降也甲木生於壬水太陽不降甲木逆行而賊胃土故氣上衝胸而口噤不語以少陽之脈下胸而貫膈陽明之脈挾口而環唇也此欲作剛痙葛根湯薑甘大棗和中宮而補土桂枝芍藥達營鬱而瀉熱麻黃散太陽之寒葛根解陽明之郁也剛痙是太陽表寒束逼陽明之證故用葛根葛根湯六方見傷寒葛根四兩麻黃三兩去節桂枝二兩芍藥二兩生薑三兩切甘草二兩炙大棗十二枚劈上七味以水一斗先煮麻黃葛根減二升去上沫內諸藥煮取三升去滓溫服一升覆取微似汗不須吸粥余如桂枝湯將息及禁忌痙病十三痙為病胸滿口噤臥不著席腳攣急必齘齒可與大承氣湯剛痙為病陽明上逆故胸滿口噤脊背反張故臥不著席筋脈縮急故腳攣齘齒筋脈屈伸牙齒開合作響是謂齘齒此其土燥胃逆病在陽明可與大承氣湯大黃芒硝瀉其燥熱枳實厚朴破其壅塞也大承氣湯七方見傷寒大黃四兩酒洗芒硝三合厚朴半斤炙去皮枳實五枚炙上四味以水一斗先煮枳朴取五升去滓內大黃煮取二升去滓內芒硝更上微火一兩沸分溫再服得下余勿服濕十一章濕病一太陽病關節疼痛而煩脈沉而細者此名中濕亦曰濕痹其候小便不利大便反快但當利其小便濕流關節經脈郁阻故生煩痛土濕木遏清陽不達故脈沉細此名中濕亦曰濕痹木鬱不能疏泄水道腸胃滋濡故大便反快而小便不利但當利其小便以泄濕氣也濕病二濕家之為病一身盡疼發熱身色如熏黃也濕傷筋骨而阻經脈故一身盡疼陽氣鬱遏是以發熱木氣不達則見黃色以肝主五色入脾為黃也濕病三濕家病身痛發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞內藥鼻中則愈濕家病身痛發熱面黃而喘頭痛鼻塞而煩其脈又大而且自能飲食此其腹中平和無病病在頭中寒濕阻其肺竅是以鼻塞頭痛面黃作喘納藥鼻中散其寒濕則愈矣濕病四濕家其人但頭汗出背強欲得覆被向火若下之早則噦或胸滿小便不利舌上如胎者以丹田有熱胸中有寒渴欲得飲而不能飲則口燥煩也濕鬱發熱皮毛蒸泄則汗自出若但頭上汗出是其陽鬱於上而猶未盛於中也濕在太陽之經脈絡壅阻是以背強太陽行身之背陽郁不得外達是以惡寒俟其濕熱內盛而後可下若下之太早則土敗胃逆噦而胸滿小便不利舌上如胎以太陰土濕乙木遏陷而生下熱在於丹田至其胸中全是濕寒雖渴欲得水卻不能飲止是口中燥煩而已以其陽鬱於上故頭汗口渴舌竅於心陽虛火敗肺津寒凝膠塞心宮故舌上如胎實非盛熱生胎也蓋濕證不論寒熱總因陽虛陽郁不達是以生熱陽氣極虛則不能化熱止是濕寒耳濕病五濕家下之額上汗出微喘小便利者死若下利不止者亦死濕寒之證而誤下之若額上汗出微喘則氣脫於上小便利下利不止則氣脫於下是死證也濕病六風濕相搏一身盡疼痛法當汗出而解值天陰雨不止醫云此可發汗汗之病不愈者何也答曰發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲汗出者風濕俱去也濕為陽虛汗多陽亡風雖去而濕愈增又值陰雨濕盛之時是以濕氣仍在此當微汗以瀉之則風濕俱去矣濕病七濕家身煩疼可與麻黃加朮湯發其汗為宜慎不可以火攻之濕鬱經絡衛氣壅遏而生煩疼可與麻黃加朮湯麻桂杏仁瀉營衛而利肺氣甘草白朮補中脘而燥土濕汗出濕消煩痛自止慎不可以火攻之生其內熱也麻黃加朮湯八麻黃三兩去節桂枝二兩去皮杏仁七十枚去皮尖甘草一兩炙白朮四兩上五味以水九升先煮麻黃減二升去上沫內諸藥煮取二升半去滓溫服八合覆取微似汗濕病八病者一身盡疼發熱日晡所劇者此名風濕此病傷於汗出當風或久傷取冷所致也可與麻黃杏仁薏苡甘草湯汗出當風閉其皮毛汗液郁遏流溢經隧營衛壅滯故發熱身疼午後濕土當令故日晡所劇麻黃杏仁薏苡甘草湯麻黃杏仁破壅而發汗薏苡甘草燥濕而培土也麻黃杏仁薏苡甘草湯九麻黃五錢去節杏仁十粒去皮尖薏苡五錢甘草一兩炙上銼麻豆大每服四錢匕水盞半煎八分去滓溫服有微汗避風濕病九風濕脈浮身重汗出惡風者防己黃耆湯主之風客皮毛是以脈浮濕漬經絡是以身重風性疏泄是以汗出惡風防己黃耆湯甘草白朮補中而燥土黃耆防己發表而瀉濕也防己黃耆湯十防己一兩黃耆一兩甘草五錢炙白朮七錢五分上銼麻豆大每抄五錢匕生薑四片大棗三枚水盞半煎八分去滓溫服良久再服喘者加麻黃五錢胃中不和者加芍藥三分氣上衝者加桂枝三分下有陳寒者加細辛三分服後當如蟲行皮膚中從腰以下如冰後坐被上又以一被繞腰以下溫令有微汗差按以上二方分兩煎法加減俱非仲景法小青龍湯喘者去麻黃加杏仁此云喘者加麻黃大抵後人所補濕病十傷寒八九日風濕相摶身體疼煩不能轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之如大便堅小便自利者去桂加白朮湯主之濕為風鬱兩相摶結營衛壅滯故身體煩疼不能轉側脈法風則浮虛脈浮虛而澀者血分之虛寒也桂枝加附子湯桂枝和中而解表附子暖血而驅寒也若大便堅小便自利者則木達而疏泄之令行濕不在下而在中去桂枝之疏木加白朮以燥土也桂枝附子湯十一方見傷寒太陽此即桂枝去芍藥加附子湯而分兩不同桂枝四兩生薑三兩甘草二兩大棗十二枚附子三枚炮去皮上五味以水六升煮取二升去滓分溫三服去桂加白朮湯十二方見傷寒甘草二兩生薑一兩半大棗六枚附子一枚炮白朮一兩上五味以水三升煮取一升去滓分溫三服一服覺身痹半日許再服三服都盡其人如冒狀勿怪即是朮附並走皮中逐水氣未得除故耳濕病十一風濕相摶骨節疼煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之濕流關節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利濕土中郁肺金不得降斂故氣短而汗泄肝木不得升達故水阻而尿癃陽遏不達則惡風寒氣滯不通則見浮腫甘草附子湯甘草白朮補土而燥濕附子桂枝暖水而疏木也甘草附子湯十三方見傷寒濕病甘草二兩白朮二兩附子二枚桂枝四兩上四味以水六升煮取三升去滓溫服一升日三服初服得微汗則解能食汗止復煩者服五合恐一升多者服六七合為妙暍三章暍病一太陽中暍發熱惡寒身重而疼痛其脈弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發其汗即惡寒甚加溫針則發熱甚數下之則淋甚暍者夏月而感風寒表閉陽遏則見寒熱濕動表郁則生重疼營衛虛澀故弦細芤遲水降氣升故皮毛振聳土鬱不達故手足逆冷陽升火泄故勞即身熱陽明不降故口開齒燥陽明之脈行於口齒陽明行身之前故燥在前齒發汗亡陽故惡寒甚溫針亡陰故發熱甚下之陽敗土濕木鬱不泄是以淋甚暍病二太陽中熱者暍是也汗出惡寒身熱而渴白虎加人參湯主之暑熱而感風寒其名曰暍內熱熏蒸是以汗出表邪束閉是以惡寒暑傷肺氣津液枯燥是以身熱而渴白虎加人參湯白虎清金而補土人參益氣而生津也夏月中暑必感外寒郁其內熱但壯火食氣汗泄陽亡不可汗下人參白虎清金瀉熱益氣生津實不刊之神方也白虎加人參湯十四方見傷寒石膏一斤碎綿裹知母六兩甘草二兩粳米六合人參三兩上五味以水一斗煮米熟湯成去滓溫服一升日三服暍病三太陽中暍身熱疼重而脈微弱此以夏月傷冷水水行皮中所致也一物瓜蒂湯主之夏月汗出浴於冷水水入汗孔而行皮中皮毛冷閉郁遏陽火不得外泄故生內熱熱則傷氣故脈微弱瓜蒂瀉皮中之冷水水去則竅開而熱泄矣瓜蒂湯十五瓜蒂二十枚上銼以水一升煮取五合去滓頓服
