body:
  text: 卷二十二婦人雜病二十二章婦人雜病緣於脾腎寒濕風木枯燥淫泆而傳化也或有寒水不能生木木鬱而變熱者究竟標熱而本寒除熱入血室外余皆陽浮假熱之病未可恣用陰涼之品末以因虛積冷總結婦人諸證妊娠産後雜病共計三十六證無不皆然也雜病熱入血室二十二婦人中風發熱惡寒經水適來得之七八日熱除脈遲身涼和胸脅滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而瀉之此段見傷寒少陽篇婦人中風發熱惡寒而值經水適來之時得之七八日後熱解脈遲身體涼和是當愈矣乃胸脅脹滿如結胸之狀而作譫語者此為熱入血室熱不在外而在內也蓋少陽之經下胸貫膈而循脅裡經氣不降橫塞胸脅故滿如結胸相火逆升而爍心液故作譫語以肝主血心主脈甲乙同氣君相交通故血熱而心病當刺厥陰之期門瀉其經中之實熱以散血室之瘀蒸也雜病二婦人中風七八日續來寒熱發作有時經水適斷此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之方在嘔吐此段見傷寒少陽篇婦人中風七八日後續得寒熱往來發作有時之證而值經水適斷之時者此為熱入血室其血必當瘀結熱結血分少陽之經氣不得外達陰陽交爭互相束閉故使寒熱如瘧發作按時小柴胡發少陽之經邪熱去則血可自下不下然後用下瘀之劑也婦人中風而值經水適來適斷之時及當經傳少陽相火鬱發不得泄路邪熱隨經內傳必入血室以其經脈新虛最易受邪也雜病三婦人傷寒發熱經水適來晝日明瞭暮則譫語如見鬼狀者此為熱入血室治之無犯胃氣及上二焦必自愈此段見傷寒少陽篇婦人傷寒發熱而值經水適來之時晝日清白明瞭暮則譫語如見鬼狀者此為熱入血室以血為陰夜而陽氣入陰血熱發作故譫妄不明治之勿犯中焦胃氣及上焦清氣必自愈也雜病四陽明病下血譫語者此為熱入血室但頭汗出當刺期門隨其實而瀉之濈然汗出而愈此段見傷寒陽明篇陽明病下血而譫語此為胃熱入於血室蓋心藏神而神之魂藏於血血熱魂擾故心神昏亂而作譫語頭為手足六陽所會陽氣上蒸表不能閉故頭上汗出而身無汗則熱入血分不得外泄宜刺厥陰之期門以瀉血熱隨其實處而瀉之一得濈然汗出則熱解而病愈矣雜病五半産漏下二十三寸口脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相摶此名曰革婦人則半産漏下旋覆花湯主之此段見傷寒脈法及虛勞吐衄二篇水寒木枯則脈弦營虛衛浮則脈大弦則陽衰而外減大則陰衰而內芤減則陽氣不足而為寒芤則陰血不充而為虛寒虛相合此名曰革如鼓之外硬而中空也氣血虛寒脈如皮革婦人見此則胎孕殞落而半産經脈沉陷而漏下旋覆花湯旋覆花行經脈之瘀蔥白通經氣之滯新絳止崩而除漏也旋覆花湯百六十五旋覆花三兩蔥白十四莖新絳少許上三味以水三升煮取一升頓服之新終即織黃絹雜病六陷經漏黑二十四婦人陷經漏下黑不解膠薑湯主之婦人經水溫則升而赤寒則陷而黑血藏於肝而肝生於腎腎寒不能生木木鬱血陷則漏下黑色久而不解此以寒水之失藏風木之善泄也膠薑湯阿膠滋木而息風乾薑溫肝而暖血也膠薑湯百六十六阿膠乾薑原方闕載雜病七經水不利二十五婦人經水不利下抵當湯主之經水不利必有瘀血壅阻宜抵當湯下其瘀血也抵當湯百六十七方見傷寒太陽水蛭三十枚熬虻蟲三十枚熬去翅足桃仁二十枚去皮尖大黃三兩酒浸上四味為末水五升煮取三升去滓溫服一升不下再服亦治男子膀胱滿急有瘀血者雜病八帶下二十六問曰婦人年五十所病下利數十日不止莫即發熱少脾裡急腹滿手掌煩熱唇口乾燥何也師曰此病屬帶下何以故曾經半産瘀血在少腹不去何以知之其證唇口乾燥故知之當以溫經湯主之婦人年五十所病下利數十日不止脾土濕陷而風木疏泄也土濕水寒暮而陽不內斂是以發熱乙木鬱陷不得升達故腹滿裡急手厥陰之脈行手掌而上中指手少陰之脈行手掌而走小指下寒而君相之火不根於水故手掌煩熱陰精脫泄肺津枯稿故唇口乾燥此屬帶下之證以曾經半産瘀血在少腹不去陰精不能上濟故少陰失其閉藏厥陰行其疏泄下流而為帶也蓋神藏於心精藏於腎半産之家腎氣虛寒瘀血凝澀結於少腹阻格陰陽交濟之路故陰精流溢下脫而為帶證素問骨空論任脈為病男子內結七疝女子帶下瘕聚以任者諸陰之統任任中陽祕則能受妊任脈寒冷陰精失溫凝聚則為瘕流溢則為帶陰精之不脫者帶脈橫束環腰如帶為之收引也水寒木陷帶脈不引故謂之帶下何以知其為帶下也其證唇口乾燥是陰精之下脫而不上濟故知之也帶下之病下寒上熱下寒故下利裡急上熱故煩熱乾燥此當溫腎肝兩經之下寒溫經湯歸膠芍藥養血而清風丹桂芎藭破瘀而疏木半夏麥冬降逆而潤燥甘草人參補中而培土茱萸乾薑暖血而溫經也溫經湯百六十八當歸二兩芎藭二兩芍藥二兩阿膠二兩桂枝二兩丹皮二兩半夏一兩麥冬一兩去心人參二兩甘草二兩乾薑二兩茱萸三兩上十二味以水一斗煮取三升分溫三服亦主婦人少腹寒久不受胎兼治崩中去血故月水來過多或至期不來雜病九帶下經水不利少腹滿痛經一月再見者土瓜根散主之婦人帶下經水不利此以血瘀而不流也血瘀木陷不得升達則少腹滿痛木陷風生經水疏泄則一月再見土瓜根散桂枝芍藥達木而清風土瓜根蟅蟲破瘀而行血也土瓜根散百六十九土瓜根三分蟅蟲三分桂枝三分芍藥三分上四味杵為散酒服方寸匕日三服陰㿗腫亦主之雜病十婦人經水閉不利臟堅癖不止中有乾血下白物礬石丸主之婦人經水閉澀不利臟中堅癖不止中有乾血阻陰精之上濟而下白物血瘀因於木陷木陷因於土濕土濕遏抑木氣不達故經水不利木陷而風生疏泄失藏精液流溢故下白物礬石丸礬石收濕淫而斂精液杏仁破滯氣而消痞硬也礬石丸百七十礬石三分燒杏仁一分上二味末之煉蜜丸棗核大內臟中劇者再內之雜病十一吐涎心痞二十七婦人吐涎沫醫反下之心下即痞當先治其吐涎沫小青龍湯主之方在痰飲涎沫止乃治痞半夏瀉心湯主之方在嘔吐婦人時吐涎沫此水氣內格肺金不降津液凝瘀而上溢也醫下之土敗胃逆濁氣填塞心下即痞當先治其吐涎沫以小青龍湯瀉其積水涎沫即止乃治其痞痞證濁陰痞塞陽不根陰二火升炎下寒上熱半夏瀉心湯薑甘參棗溫補中脘之虛寒黃芩黃連清瀉上焦之鬱熱半夏降濁而消痞也雜病十二臟燥悲傷二十八婦人臟燥悲傷欲哭象如神靈所作數欠伸甘麥大棗湯主之肺屬金其氣燥其志悲其聲哭婦人臟燥則悲傷欲哭象如神靈所作不能自由蓋五行之氣升於九天之上則暢遂而為喜喜者心之志也陷於九地之下則幽淪而為恐恐者腎之志也方升未升喜之未遂則鬱勃而為怒怒者肝之志也方陷未陷恐之將作則淒涼而為悲悲者肺之志也以厥陰風木之氣善耗津血風動而耗肺津肺金枯燥故悲傷欲哭欠者開口而呵氣伸者舉臂而舒筋陰陽之相引也日暮陽降則生欠伸欠伸者陰引而下陽引而上未能即降也金主降燥金欲降而腎陰又引之故數作欠伸甘麥大棗湯甘草培土大棗滋乙木而息風小麥潤辛金而除燥也甘麥大棗湯百七十一甘草三兩小麥一升大棗十枚上三味以水六升煮取三升分溫三服亦補脾氣雜病十三咽中炙臠二十九婦人咽中如有炙臠半夏厚朴湯主之濕土堙塞濁氣上逆血肉凝澀結而不消則咽中如有炙臠半夏厚朴湯茯苓瀉濕而消瘀朴半薑蘇降逆而散滯也半夏厚朴湯百七十二半夏一升厚朴三兩生薑五兩干蘇葉二兩茯苓四兩上五味以水一斗煮取四升分溫四服日三夜一服雜病十四腹中疾痛三十婦人腹中諸疾痛當歸芍藥散主之方在妊娠婦人腹中諸疾痛無非風木之克濕土氣滯血凝之病也當歸芍藥散芎歸芍藥養肝血而行瘀苓澤白朮燥土氣而瀉濕與妊娠之腹痛無二法也雜病十五婦人腹中痛小建中湯主之方在虛勞婦人腹中痛風木之剋土也小建中湯桂枝倍芍藥而加膠飴瀉風木而滋脾精也雜病十六血氣刺痛三十一婦人六十二種風腹中血氣刺痛紅藍花酒主之婦人六十二種風總因營血之瘀燥風木之失養也紅藍花酒養血行瘀以達風木也紅藍花酒百七十三紅藍花一兩上一味以酒一大升煎減半頓服一半未止再服雜病十七水與血結三十二婦人少腹滿如敦狀小便微難而不渴生後者此為水與血俱結在血室也大黃甘遂湯主之婦人少腹脹滿其狀如敦小便微難而不渴病在生産之後者以水寒土濕乙木抑遏積水與瘀血俱結於血室故腹滿而便難也大黃甘遂湯阿膠清風而潤木大黃甘遂下瘀血而行積水也大黃甘遂湯百七十四大黃四兩甘遂二兩阿膠二兩上三味以水三升煮取一升頓服之其血當下雜病十八轉胞三十三問曰婦人病飲食如故煩熱不得臥而反倚息者何也師曰此名轉胞不得溺也以胞系了戾故致此病但利小便則愈腎氣丸主之方在消渴婦人病飲食如故煩熱不得臥寐而反倚物而布息者此名轉胞不得溺也以胞系了戾回轉故致此病此緣土濕水寒而木氣鬱燥不能疏泄也濕寒結滯溺孔凝澀不開胞滿而不出則氣鼓而系轉水溺不行濁氣莫泄肺氣逆升鬱而生熱故煩熱倚息不得眠臥病不在胃是以飲食如故腎氣丸苓澤瀉水而燥濕丹桂疏木而達郁地黃清風而潤燥附子暖腎而消瘀山萸薯蕷斂肝氣而攝水也雜病十九陰吹三十四胃氣下泄陰吹而正喧此穀氣之實也豬膏發煎主之方在黃疸胃中濁氣下泄前陰氣吹而喧鳴此穀氣之實後竅結塞而不通也豬膏發煎豬膏亂髮利水而滑大腸瀉濕而通膀胱也雜病二十陰寒三十五婦人陰寒溫陰中坐藥蛇床子散主之婦人陰中寒冷腎肝之陽虛也宜以坐藥溫其陰中蛇床子散去寒濕而暖水木也蛇床子散百七十五蛇床子上一味末之以白粉少許和合相得如棗大綿裹內之自然溫雜病二十陰瘡三十六婦人妊娠産後雜病共計三十六證少陰脈滑而數者陰中即生瘡陰中蝕瘡爛者狼牙湯洗之手少陰脈動神門在小指後掌下高骨間足少陰脈動太溪在足內踝後此少陰脈即尺中也尺脈滑而數者水寒土濕生氣不遂木鬱於水而生下熱也前陰者腎肝之所司木鬱下熱陰中即生瘡陰中瘡蝕肌肉而潰爛者狼牙湯洗之瀉其濕熱也狼牙湯百七十六狼牙三兩上一味以水四升煮取半升以綿纏箸如繭浸湯瀝陰中日四遍雜病二十二婦人之病因虛積冷結氣為諸經水斷絶至有歷年血寒積結胞門寒傷經絡凝堅在上嘔吐涎唾久成肺癰形體損分在中盤結繞臍寒疝或兩脅疼痛與臟相連或結熱中痛在關元脈數無瘡肌若魚鱗時著男子非止女身在下為多經候不勻令陰掣痛小腹惡寒或引腰脊下根氣街氣街急痛膝脛疼煩奄忽眩冒狀如厥癲或有憂慘悲傷多嗔此皆帶下非有鬼神久則羸瘦脈虛多寒三十六病千變萬端審脈陰陽虛實緊弦行其針藥治危得安其雖同病脈各異源子當辨記勿謂不然婦人之病因於脾腎陽虛積冷結氣隧竅阻塞血瘀木陷為諸經水斷絶不復流行至有歷年血寒積結胞門痞硬不消此癥瘕之在下者若寒傷經絡血脈結澀則凝堅在上壅其相火逆刑辛金嘔吐涎唾久成肺癰肌肉消減形體損分此癥瘕之在上者若在中盤結繞臍寒疝作疼或兩脅疼痛內與臟氣相連此癥瘕之在中而純寒者或結熱於中痛在臍下關元脈數無瘡肌膚甲錯枯若魚鱗熱結於內男女交合熱淫傳染時著男子非止但在女身此癥瘕之在中而變熱者凡此諸病起於肝腎在下為多往往經候參差遲速不勻或令陰器掣痛少腹惡寒或痛引腰脊下根氣街氣街足陽明之動脈在腿腹之交又名氣衝氣街急痛膝脛疼煩奄忽眩冒狀如厥癲之疾狂惑不精或有憂慘悲傷而多怒嗔此皆帶下之病使然非鬼神之憑附也蓋上中下三部一有氣血寒凝則阻格陰精上濟之路下流而為帶下血結精流筋脈枯稿木氣不舒故掣引作痛悅怒乖常久則身體羸瘦脈虛多寒而成勞傷不起之證婦人妊娠産後雜病共計三十六病悉因此生及其病成則千變萬端不可勝數醫家於此審脈之陰陽虛實緊弦行其針藥於以治危得安其雖同為一病而人之強弱不一是以脈之陰陽各異源流子當辨記此説勿謂不然此窮妊娠産後雜病之源而總結之也
