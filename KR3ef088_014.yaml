body:
  text: 卷十四內傷雜病痰飲咳嗽三十七章痰飲咳嗽者肺腎之病也而根實原於土虛蓋化水者氣也其職在肺化氣者水也其職在腎陽衰土濕則肺失清降而氣不化水腎失溫升而水不化氣於是痰飲作矣痰飲濁瘀肺氣不布隔礙壅阻於是咳嗽生焉治咳嗽者去其痰飲治痰飲者培其土氣培土眉批培土故宜以溫藥和之氣者疏木而泄水緣水侮木賊中氣濕寒此痰飲咳嗽所由來也然則苓桂術甘實為痰飲主方眉批白朮燥土甘草補中茯苓泄水桂枝疏木喻嘉言以小青龍為主方黃玉楸以苓桂術甘為主方皆重在溫藥和之意同一見解自此隨證而化裁之溫涼補瀉意悉法周雖百慮而不一致實同歸而非殊途也後世庸工凡臨咳嗽必用清潤至於滋濕伐陽茫然不知久而土崩人亡未有幸脫者百試不驗而千古皆同此輩方心不可鑑也痰飲一問曰夫飲有四何謂也師曰有痰飲有懸飲有溢飲有支飲痰飲之處所不同名目亦殊義詳下章痰飲二問曰四飲何以為異師曰其人素盛今瘦水走腸間瀝瀝有聲謂之痰飲飲後水流在脅下咳唾引痛謂之懸飲飲水流行歸於四肢當汗出而不汗出身體疼重謂之溢飲咳逆倚息氣短不得臥其形如腫謂之支飲眉批四飲為大綱實不盡此所以下出諸條而互證之其人素日肌肉豐盛今忽瘦削此由脾虛不能化谷食宿水停肌肉不生也水走腸間瀝瀝有聲如此謂之痰飲飲之行走於心下小腸之間者也飲後水流脅下咳唾鼓動牽引作痛如此謂之懸飲飲之空懸於肝膽之經者也飲水流行歸於四肢當化汗外泄而不得汗出水浸肢節身體疼重如此謂之溢飲飲之流溢於四末者也咳嗽氣逆倚物布息氣道短促不得眠臥營衛郁遏其形如腫如此謂之支飲飲之支結於膽經而傷及肺臟者也支飲或左或右偏而不正如樹木之枝在木干之旁在左則右倚物息在右則左倚物息以足少陽之經下胸貫膈而循脅位在胸側水飲阻格膽經不降逆沖肺部肺無布息之地故咳喘而不臥也痰飲三水在心心下堅築短氣惡水不欲飲水在肺吐涎沫欲飲水水在脾少氣身重水在肝脅下支滿嚏而痛水在腎心下悸水在心火敗水凌濁陰填塞心下堅痞動築氣息促短惡水不欲飲水在肺氣滯津凝吐涎沫而欲飲水水在脾陽衰濕旺少氣而身重水在肝經氣迫急脅下支結滿硬嚏而振鼓作痛水在腎木鬱風搖心下悸動蓋飲食入胃脾陽蒸動化為精氣上歸於肺肺金清和將此精氣散布於五臟六腑十二經脈之中經絡臟腑皆得受氣氣降則化水水升又化氣水之在上氣方化而未盛故氣多而水少其象如霧氣之在下水方化而未盛故水多而氣少其形如瀆在上之氣有清有濁清者化而為神氣內歸於心肺濁者外泄而為汗在下之水有精有粗精者化而為精血內歸於腎肝粗者外滲而為溺至於脾胃濕盛而陽虛則氣水不化而凝為痰飲痰者氣不化水熏蒸於上而凝結者也故其質厚飲者水不化氣淫泆於下而停瘀者也故其質薄痰飲之家雖由於肺腎之陽虛而實原於脾胃之濕盛後世庸工乃有濕痰燥痰之説不通極矣痰飲四夫心下有留飲其人背寒冷如掌大心下火位而留飲居之是寒水之凌君火也太陽寒水之經行身之背其人背後寒冷正對心位其大如掌也留飲即痰飲之停留者上自心下下至小腸停留不散是謂諸飲之宗如水木之源本也自此而流於脅下則為懸飲歸於四肢則為溢飲結於胸旁則為支飲是諸飲之支如水木之支派也痰飲五留飲者脅下痛引缺盆咳嗽則轉甚足少陽之經自缺盆而入脅裡足厥陰之經自小腹而布脅肋脅下痛引缺盆者飲阻少陽之經經氣不舒故痛引缺盆咳嗽則經脈振動是以痛甚此痰飲之流於脅下而在肝膽之經者所謂懸飲也痰飲六胸中有留飲其人短氣而渴四肢歷節痛飲阻竅隧肺無降路津液凝滯故短氣而渴濕流關節故四肢歷節而疼痛此飲之自胸膈而流四肢所謂溢飲也痰飲七脈沉者有留飲眉批金鑑云宜另為一條與黃氏合原文緊接歷節痛之下火浮水沉自然之性也痰飲八膈上病痰滿喘咳吐發則寒熱背痛腰疼目泣自出其人振振身瞤悸必有伏飲膈上痰飲阻礙肺氣壅滿喘促咳嗽是土濕而胃逆也一旦痰氣上湧嘔吐發作胃氣逆升則太陽不降太陽寒水之經經氣鬱遏營衛易位則發熱而惡寒營陰束其衛陽是以發熱惡寒太陽行身之背逆而不降經氣壅迫故脊背疼痛胃逆則脾陷肝木抑遏陷於水位是以腰疼腎位於腰是謂水位肝竅於目腎主五液入肝為淚木鬱風動肝液升泄故目泣自出風木搖蕩故振振而瞤悸如此必有伏飲緣飲伏濕旺土木雙郁是以見證如此痰飲九夫病人飲水多必暴喘滿凡食少飲多水停心下甚者則悸微者短氣脈雙弦者寒也皆大下後虛脈偏弦者飲也病人陽虛濕旺火升作渴飲水一多不能消化水阻肺氣必暴生喘滿凡土虛食少而飲水多者水停心下郁其木氣甚者木鬱風動則生瞤悸微者肺金阻格必苦短氣水旺木鬱則脈必弦弦為木氣應見於左關若兩關雙弦者是水寒土濕木氣不達乙木鬱於左關而不升甲木鬱於右關而不降此皆大下後之虛脈若一手偏弦者此必飲邪之偏在一方郁其木氣也蓋飲泛土濕木氣必郁生氣不暢故見弦象左偏弦者飲在脾土右偏弦者飲在胃土也雙弦者即偏弦之重者微則偏弦甚則雙弦實同原也痰飲十脈弦數眉批金鑑以弦數之數字當是遲字之訛以下寒飲之字故疑之是未知少陽甲木不降之故也有寒飲冬夏難治弦數者少陽甲木不降相火逆升必有寒飲郁格冬時水旺下寒陽氣不蟄夏而水衰然相火升泄下寒愈劇皆難治也痰飲十一肺飲不弦但苦喘短氣肺病痰飲金能勝木故脈不弦但苦痰飲阻礙喘促短氣耳痰飲十二支飲亦喘而不能臥加短氣其脈平也支飲亦飲之偏結於肺部者故喘不能臥加以短氣其脈亦平而不弦也痰飲十三脈浮而細滑傷飲水飲在中郁格陽氣升浮不歸故如循貫珠纍纍聯屬流利不停其診曰滑而其中實有捍格之象水旺陰盛是以脈細痰飲十四病痰飲者當以溫藥和之痰飲者水寒土濕火冷金涼精氣堙郁所作當以溫藥和之寒消濕化自然渙解蓋土不得火濕氣滋生此痰飲化生之原也土濕則上不能生金痰凝於心胸下不能制水飲聚於腸胃肺冷故氣不化水熏蒸而為痰腎寒故水不化氣停瘀而為飲是以當溫也痰飲十五心下有痰飲胸脅支滿目眩苓桂朮甘湯主之心下有痰飲停瘀胃口土濕木鬱膽經莫降故胸脅偏支脹滿目珠眩運以君相同氣甲木失根君火亦騰神魂浮蕩無所歸宿是以發眩目者神魂之開竅故眩見於目苓桂朮甘湯朮甘補中而燥土苓桂瀉水而疏木也苓桂朮甘湯九十二方見傷寒太陽茯苓四兩桂枝三兩白朮三兩甘草二兩上四味以水六升煮取三升分溫三服小便則利痰飲十六夫短氣有微飲當從小便去之苓桂朮甘湯主之腎氣丸亦主之方見消渴微飲阻隔肺金不降是以短氣此緣土濕木鬱不能泄水當從小便去其水飲飲去而土燥則肺斂而氣降矣苓桂朮甘湯朮甘補中而燥土苓桂瀉水而疏木可以主之腎氣丸丹地苓澤清風而瀉濕附桂茱蕷暖水而榮木亦可以主之也痰飲十七病者脈伏其人欲自利利反快雖利心下續堅滿此為留飲欲去故也甘遂半夏湯主之留飲在下故脈伏而欲自利若利反捷快是留飲下行腸胃滋濡也雖水隨利下心下猶續續堅滿以水下未盡濁陰不得遽消然已非從前痞結之象此為留飲欲去故稍覺鬆軟也甘遂半夏湯甘遂半夏瀉水而滌飲甘草芍藥培土而瀉木蜂蜜滑腸而行水也眉批甘草與甘遂相反蓋借其反亂之勢以收拔正之功以蜜和之亦恐急烈太驟傷真氣也俗醫多認錯以為痰飲復聚甘遂半夏湯九十三甘遂大者二枚半夏十二枚以水一升煮取半升去滓芍藥五枚甘草如指大一枚炙上四味以水二升煮取半升去滓以蜜半升合藥汁煎取八合頓服之痰飲十八腹滿口舌乾燥此腸間有水氣己椒茵黃丸主之腸間有水阻遏中氣升降不行是以腹滿君相升逆故口舌乾燥己椒藶黃丸防己椒目瀉濕而行水葶藶大黃濬流而決壅也己椒藶黃丸九十四防己椒目葶藶大黃各一兩上四味末之蜜丸如梧子大先食飲服一丸日三服稍增口中有津液渴者加芒硝半兩痰飲十九脈沉而弦者懸飲內痛病懸飲者十棗湯主之水寒木鬱則脈沉而弦法當懸飲在脅咳唾引痛病懸飲者木旺土虛不能行水宜扶土而瀉水十棗湯芫遂大戟決渠而瀉水飲大棗補土而保脾精也十棗湯九十五方見傷寒芫花熬甘遂大戟各等分上三味搗篩以水一升五合先煮肥大棗十枚取八合去滓內藥末強人服一錢匕羸人服半錢匕平旦溫服之不下者明日更加半錢匕得快利後糜粥自養痰飲二十病溢飲者當發其汗大青龍湯主之小青龍湯亦主之水歸四肢當汗不汗而成溢飲病溢飲者當發其汗其陽氣鬱阻而肺熱者宜大青龍湯石膏麻桂清金而瀉營衛杏仁生薑利肺而降逆氣甘草大棗培土而補脾精也其陰氣衝逆而肺寒者宜小青龍湯麻桂芍藥發表而瀉營衛甘草半夏補中而降胃氣薑辛五味溫肺而下衝逆也大青龍湯九十六方見傷寒太陽麻黃六兩桂枝二兩石膏如雞子大碎杏仁四十枚去皮尖生薑三兩甘草二兩大棗十二枚上七味以水九升先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升取微汗汗多者溫粉粉之小青龍湯九十七方見傷寒太陽麻黃三兩桂枝三兩芍藥三兩甘草二兩半夏半升細辛三兩乾薑三兩五味三兩上八味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升痰飲二十一膈間支飲其人喘滿心下痞堅面色黧黑其脈沉緊得之數十日醫吐下之不愈木防己湯主之虛者即愈實者三日復發復與不愈者宜木防己湯去石膏加茯苓芒硝湯主之土濕胃逆不能行水故飲停胸膈阻格肺氣喘促壅滿膽胃填塞甲木莫降故盤結胃口心下痞堅水旺木鬱不能外華故面色黧黑其脈沉緊木防己湯人參桂枝補中而疏木防己石膏瀉水而清金也邪虛者病在膈間得之即愈邪實者土濕木鬱而生下熱暫時雖愈三日復發復與此湯不愈者宜木防己湯去石膏之清上加茯苓以瀉下濕芒硝以清下熱也面色黧黑者靈樞經脈足少陽厥陰之經病則面塵脫色蓋木主五色入心為赤入腎為黑以肝木藏血而華色木榮則陽火發露而光華木枯則陰水鬱埋而晦黑木者水母而子火火明而水黯故也得之數十日醫吐下之不愈者支飲黏瘀濕熱纏綿非用防己石膏不能瀉也實者三日復發以濕熱在下病根伏留而不除也木防己湯九十八木防已三兩石膏雞子大一枚人參四兩桂枝二兩上四味以水六升煮取二升分溫再服木防己去石膏加茯苓芒硝湯九十九木防已三兩人參四兩桂枝二兩茯苓四兩芒硝三合上五味以水六升煮取二升去滓內芒硝再微煎分溫再服微利則愈痰飲二十二假令瘦人臍下有悸吐涎沫而顛眩此水也五苓散主之瘦人氣弱不能消水水停木鬱風動根搖故臍下振悸肺氣不降津液淫蒸故湧吐涎沫君相失根神魂旋轉故顛冒眩暈此緣水泛而土濕五苓散二苓澤瀉利水而瀉濕白朮桂枝燥土而疏木也五苓散一百方見傷寒太陽茯苓三分豬苓三分去皮澤瀉一兩一分白朮三分桂枝二分上五味為末白飲服方寸匕日三服多服暖水汗出愈痰飲二十三卒嘔吐心下痞膈間有水眩悸者小半夏加茯苓湯主之卒然嘔吐心下痞悶膈間有水頭眩心悸者小半夏加茯苓湯生薑半夏降逆而止嘔茯苓泄水而消滿也小半夏加茯苓湯百一半夏一升生薑半斤茯苓四兩上三味以水七升煮取一升五合分溫再服痰飲二十四心下有支飲其人苦冒眩澤瀉湯主之飲停心下陽不歸根升浮旋轉則生冒眩此由土敗水侮故支飲上停澤瀉湯白朮補中而燥土澤瀉利水而排飲也澤瀉湯百二澤瀉五兩白朮二兩上二味以水二升煮取一升分溫再服痰飲二十五嘔家本渴渴者為欲解今反不渴心下有支飲故也小半夏湯主之嘔家津傷燥動本當發渴渴者為飲去而欲解也今嘔吐之後反不作渴此心下有支飲阻格君相之火逆刑肺金是以作渴渴而飲水不能消受是以作嘔新水雖吐而支飲未去是以嘔後不渴小半夏湯半夏生薑降沖逆而排水飲也小半夏湯百三半夏一升生薑半斤上二味以水七升煮取一升半分溫再服痰飲二十六先渴後嘔為水停心下此屬飲家小半夏加茯苓湯主之水停心下火升作渴飲而新水又停是以作嘔痰飲二十七支飲胸滿者厚朴大黃湯主之支飲居膽肺之部清氣鬱阻胸膈壅滿此胃土堙塞絶其降路也厚朴大黃湯枳朴降逆而消滿大黃瀉胃而通瘀也厚朴大黃湯百四此即小承氣湯而分量不同厚朴一尺枳實四枚大黃六兩上三味以水五升煮取二升分溫再服痰飲二十八支飲不得息葶藶大棗瀉肺湯主之方見肺癰支飲壅阻肺氣不得布息葶藶大棗瀉肺湯葶藶瀉濕而利肺氣大棗補土而保脾精也痰飲咳嗽二十九咳家其脈弦為有水十棗湯主之咳家脈弦此為有水緣濕旺木鬱是以脈弦疏泄不行是以有水宜十棗湯補土而瀉水也痰飲咳嗽三十夫有支飲家咳煩胸中痛者不卒死至一百日或一歲宜十棗湯咳煩胸痛者支飲阻格膽肺不降也其病雖久而支飲未去猶宜十棗湯也痰飲咳嗽三十一久咳數歲其脈弱者可治實大數者死其脈虛者必苦冒其人本有支飲在胸中故也治屬飲家久咳數歲是肺胃之常逆也其脈弱者土金未敗猶為可治實大數者肺胃上逆陽氣絶根土敗於甲木金敗於相火是以死也其脈虛者必苦昏冒以其人本有支飲在胸中格其陽氣故也治法屬之飲家痰飲咳嗽三十二咳逆倚息不得臥小青龍湯主之咳嗽氣逆倚物布息不得眠臥此支飲在膈氣阻而不降也小青龍湯麻黃桂芍發汗而泄水五味薑辛下氣而止咳甘草半夏補中而降逆也痰飲咳嗽三十三青龍湯下已多唾口燥寸脈沉尺脈微手足厥逆氣從小腹上衝胸咽手足痹其面翕熱如醉狀因復下流陰股小便難時覆冒者與茯苓桂枝五味甘草湯治其氣衝青龍湯服下之後若多唾口燥寸脈沉而尺脈微手足厥逆氣從少腹上衝胸咽是汗後陽亡而風木鬱沖也傷寒汗後陽亡土濕水寒木鬱風動則發奔豚此亦奔豚之大意也多唾口燥者風木耗津而肺氣上熏也寸沉而尺微上下之陽俱虛也手足厥逆土敗而四肢失溫也氣從少腹上衝胸咽風木之上奔也其面翕熱如醉狀因復下流陰股陽明循面下行風木鬱沖陽明逆行故面熱升已而降則流於陰股手足痹者汗泄血中溫氣經絡閉塞而不行也小便難者土濕木鬱不能疏泄也時覆冒者飲阻陽氣升浮無根也此宜與茯苓桂枝五味甘草湯治其沖氣茯苓桂枝瀉水而下乙木之沖甘草五味培土而降辛金之逆也茯苓桂枝五味甘草湯百五茯苓四兩桂枝四兩去皮五味半升甘草三兩炙上四味以水八升煮取三升去滓分溫三服痰飲咳嗽三十四沖氣即低而反更咳胸滿者用桂苓五味甘草湯去桂加乾薑細辛以治其咳滿服桂苓五味甘草後沖氣即低而反更咳嗽而胸滿者乙木雖降而辛金更逆也用桂苓五味甘草去桂加乾薑細辛利肺而降逆以治其咳滿也苓甘五味薑辛湯百六茯苓四兩五味半升甘草三兩乾薑三兩細辛三兩上五味以水八升煮取三升去滓溫服半升日三服痰飲咳嗽三十五咳滿即止而更復渴沖氣復發者以細辛乾薑為熱藥也服之當遂渴而渴反止者為支飲也支飲者法當冒冒者必嘔嘔者復內半夏以去其水服苓甘五味薑辛後咳滿即止設其更覺發渴沖氣復發者以細辛乾薑本為熱藥服之熱傷肺津應當遂時作渴津亡燥動風木乃發若渴反止者此為支飲內停也支飲格其陽氣法當昏冒冒者胃氣升逆必作嘔吐嘔者復內半夏以去其水飲而止嘔吐也苓甘五味加薑辛半夏湯百七茯苓四兩甘草三兩五味半升乾薑三兩細辛三兩半夏半升上六味以水八升煮取三升去滓溫服半升日三服痰飲咳嗽三十六水去嘔止其人形腫者加杏仁主之其證應內麻黃以其人遂痹故不內之若逆而內之者必厥所以然者以其人血虛麻黃髮其陽故也眉批似宜用青龍卻不敢用麻黃故仿小青龍去麻桂白芍而加苓杏服苓甘五味薑辛半夏後水去嘔止其人形腫者此衛氣之郁宜加杏仁利肺壅而瀉衛郁腫家應用麻黃以瀉衛氣以其人服小青龍後陽隨汗泄手足麻痹故不內之若逆而內之者必手足厥冷所以然者以汗瀉血中溫氣其人陰中之陽已虛麻黃復瀉其血中之陽氣故也苓甘五味加薑辛半夏杏仁湯百八細辛三兩甘草三兩五味半升乾薑三兩茯苓四兩半夏半升杏仁半升去皮上七味以水一斗煮取三升去滓溫服半升日三服痰飲咳嗽三十七若面熱如醉此為胃熱上衝熏其面加大黃以利之服小青龍後其面翕熱如醉此胃熱上衝熏蒸其面若服苓甘五味薑辛半杏之後此證猶存宜加大黃以利之則胃熱清矣苓甘五味加薑辛半杏大黃湯百九茯苓四兩甘草三兩炙五味半升乾薑三兩細辛三兩半夏半升洗杏仁半升去皮尖大黃三兩上八味以水一斗煮取三升去滓溫服半升日三服附方外臺茯苓飲七眉批外臺祕要唐王燾撰方多古人祕方與千金並傳可備採擇治心胸中有停痰宿水自吐出水後心胸間虛氣滿不能食消痰氣令能食茯苓三兩人參三兩白朮三兩枳實二兩橘皮二兩半生薑四兩上六味以水六升煮取一升八合分溫三服如人行八九里進之
