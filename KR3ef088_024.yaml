body:
  text: 卷二十四禽獸魚蟲果食菜谷禁忌凡飲食滋味以養於生食之有妨反能有害自非服藥煉液焉能不飲食乎切見時人不嫺調攝疾疢競起若恐是莫字不因食而生苟全其生須知切忌者矣所食之味有與病相宜有與身相害若得宜則益體害則成疾以此致危例皆難療凡煮藥飲汁以解毒者雖云救急不可熱飲諸毒病得熱更甚宜冷飲之肝病禁辛心病禁咸脾病禁酸肺病禁苦腎病禁甘春不食肝夏不食心秋不食肺冬不食腎四季不食脾辨曰春不食肝者為肝氣旺脾氣敗若食肝則又補肝脾氣敗尤甚不可救又肝旺之時不可以死氣入肝恐復魂也若非旺時即虛以肝補之佳餘臟準此凡肝臟自不可輕啖自死者彌甚凡心皆為神識所舍勿食之使人來生復其對報矣凡肉及肝落地不著塵土者不可食之豬肉落水浮者不可食豬肉及魚若狗不食鳥不啄者不可食豬肉不幹火炙不動見水自動者不可食之肉中有如朱點者不可食之六畜肉熱血不斷者不可食之父母及身本命肉眉批如子鼠丑牛之類皆以本命所屬而論食之令人神魂不安食肥肉及熱羹不得飲冷水諸五臟及魚投地塵土不汙者不可食之穢飯餒肉臭魚食之皆傷人自死肉口閉者不可食之六畜自死及疫死則有毒不可食之獸自死北首及伏地者食之殺人食生肉飽飲乳變成白蟲一作蠱疫死牛肉食之令病洞下亦致堅積宜利藥下之脯藏米甕中有毒及經夏食之發腎病治食自死六畜肉中毒方黃柏屑搗服方寸匕治食鬱肉漏脯中毒方郁肉密器蓋之隔宿者是也漏脯茅屋漏下沾著者是也燒犬屎酒服方寸匕每服人乳汁亦良飲生韭汁三升亦得治黍米中藏干脯食之中毒方大豆濃煮汁飲數升即解亦治貍肉漏脯等毒治食生肉中毒方掘地深三尺取其下土三升以水五升煮數沸澄清汁飲一升即愈治食六畜鳥獸肝中毒方水浸豆豉絞取汁服數升愈馬腳無夜眼者不可食之食酸馬肉不飲酒則殺人酸當作駿出秦穆公岐下野人傳蓋馬肉無不酸者馬肉不可熱食傷人心馬鞍下肉食之殺人白馬黑頭者不可食之白馬青蹄者不可食之馬肉豚肉共食飽醉臥大忌驢馬肉合豬肉食之成霍亂馬肝及毛不可妄食中毒害人治馬肝中毒未死方雄鼠糞二七粒末之水和服日再服又方人垢取方寸匕服之佳治食馬肉中毒欲死方香豉三兩杏仁三兩上二味蒸一食頃熟杵之服日再服又方煮蘆根飲之良疫死牛或目赤或黃食之大忌牛肉共豬肉食之必作寸白蟲青牛腸不可合犬肉食之牛肺從三月至五月其中有蟲如馬尾割去勿食食則損人牛羊豬肉皆不得以楮木桑木蒸炙食之令人腹內生蟲啖蛇牛肉殺人何以知之啖蛇者毛髮向後順者是也治啖蛇牛肉食之欲死方飲乳汁一升立愈又方以泔洗頭飲一升愈牛肚細切以水一斗煮取一升暖飲之大汗出愈治食牛肉中毒方甘草煮汁飲之即解羊肉其有宿熱者不可食羊肉不可共生魚酪食之害人羊蹄甲中有珠子白者名懸筋食之令人癲白羊黑頭食其腦作腸癰羊肝共生椒食之破人五臟豬肉共羊肝和食之令心悶豬肉以生胡荽同食爛人臍豬脂不可合梅子食之豬肉和葵食之少氣鹿肉不可和蒲白作羹食之發惡瘡麋脂及梅李子若妊婦食之令子青盲男子傷精麋肉不可合蝦及生菜梅李果食之皆病人痼疾人不可食熊肉令終身不愈白犬自死不出舌者食之害人食狗鼠余令人發瘻瘡治食犬肉不消心下堅或腹脹口乾大渴心急發熱妄語如狂或洞下方杏仁一升合皮熟研用以沸湯三升和取汁分三服利下肉片大驗婦人妊娠不可食兔肉山羊肉及鱉雞鴨令子無聲音兔肉不可合白雞肉食之令人面發黃兔肉著乾薑食之成霍亂凡鳥自死口不閉翅不合者不可食之諸禽肉肝青者食之殺人雞有六翮四距者不可食之烏雞白首者不可食之雞不可共胡蒜食之滯氣一云雞子山雞不可合鳥獸肉食之雉肉久食之令人瘦雞卵不可合鰲肉食之婦人妊娠食雀肉令子淫亂無恥雀肉不可合李子食之燕肉勿食入水為蛟龍所吞鳥獸有中毒箭死者其肉有毒解之方大豆煮汁及鹽汁服之解魚頭正白如連珠至脊上食之殺人魚頭中無腮者不可食之殺人魚無腸膽者不可食之三年陰不起女子絶生魚頭似有角者不可食之魚目合者不可食之六甲日勿食鱗甲之物魚不可合雞肉食之魚不得合鸕鷀肉食之鯉魚鮓不可合小豆藿食之其子不可合豬肝食之害人鯉魚不可合犬肉食之鯽魚不可合猴雉肉食之一云不可合豬肝食鯷魚不可合鹿肉食之令人筋甲縮青魚鮓不可合胡荽及生葵並麥中食之鰍鱔不可合白犬血食之龜肉不可合酒果子食之鱉目凹陷者及厭下有王字形者不可食之鱉眉批原字是其字自是鱉字肉不得合雞鴨子食之眉批雞子忌犬肉獺兔鯉鱉野雉芥李蔥蒜鴨子忌李子鱉肉野鴨忌木耳胡桃龜鱉肉不可合莧菜食之蝦無須及腹下通黑煮之反白者不可食之食膾飲乳酪令人腹中生蟲為瘕膾食之在心胸中不化吐復不出速下除之久成瘕病治之方橘皮一兩大黃二兩朴硝二兩上三味以水一大升煮至小升頓服即消食鱠多不消結為症病治之方馬鞭草上一味搗汁飲之或以薑葉汁飲之一升即消又可服吐藥吐之食魚後食毒兩種煩亂治之方橘皮濃煮汁服之即解食鯸魚中毒方蘆根煮汁服之即解蟹目相向足斑目赤者不可食之食蟹中毒治之方紫蘇煮汁飲之三升紫蘇子搗汁飲之亦良又方冬瓜汁飲二升食冬瓜亦可凡蟹未遇霜多毒其熟者乃可食之蜘蛛落食中有毒勿食之凡蜂蠅蟲蟻等集食上食之致瘻果子生食生瘡果子落地經宿蟲蟻食之者人大忌食之生米停留多日有損處食之傷人桃子多食令人熱仍不得入水浴令人病淋瀝熱病杏酪不熟傷人梅多食壞人齒李不可多食令人臚脹林禽不可多食令人百脈弱橘柚多食令人口爽不知五味梨不可多食令人寒中金瘡産婦亦不宜食櫻桃杏多食傷筋骨安石榴不可多食損人腹胡桃不可多食令人動痰飲生棗多食令人熱渴氣脹寒熱羸瘦者彌不可食傷人食諸果中毒治之方豬骨燒過上一味末之水服方寸匕亦治馬肝漏脯等毒木耳赤色及仰生者勿食菌仰卷及赤色者不可食食諸菌中毒悶亂欲死治之方人糞汁飲一升土漿飲二升大豆煮汁飲之服諸吐利藥並解食楓樹菌而哭不止治之以前方其食野芋煩毒欲死治之以前方其野芋根山東人名魁芋人種芋三年不收亦成野芋並殺人蜀椒閉口者有毒誤食之戟人咽喉氣病欲絶或吐下白沫身體痹冷急治之方肉桂煎汁飲之多飲冷水一二升或食蒜飲地漿或濃煮豉汁飲之並解正月勿食生蔥令人面生遊風二月勿食蓼傷人腎三月勿食小蒜傷人志性四月八月勿食胡荽傷人神五月勿食韭令人乏氣力五月五日勿食一切生菜發百病六月七日勿食茱萸傷神氣八月九月勿食薑傷人神十月勿食椒損人心傷心脈十一月十二月勿食薤令人多涕唾四季勿食生葵令人飲食不化發百病非但食中藥中皆不可用深宜慎之時病差未健食生菜手足必腫夜食生菜不識人十月勿食被霜生菜令人面無光目澀心痛腰疼或發心瘧瘧發時手足十指爪皆青困委蔥韭初生芽者食之傷人心氣飲白酒食生韭令人病增生蔥不可共蜜食之殺人獨顆蒜彌忌棗合生蔥食之令人病生蔥和雄雞雉白犬肉食之令人七竅經年流血食糖蜜後四日內食生蔥韭令人心痛夜食諸薑蒜蔥等傷人心蕪青根多食令人氣脹薤不可共牛肉作羹食之成瘕病韭亦然蓴多病恐是食字動痔疾野苣不可同蜜食之作內痔白苣不可共酪同食作𧈟蟲黃瓜食之發熱病葵心不可食傷人葉尤冷黃背紫莖者勿食之胡荽久食之令人多忘病人不可食胡荽及黃花菜芋不可多食動病妊婦食薑令子余指蓼多食發心痛蓼和生魚食之令子奪氣陰核疼痛芥菜不可共兔肉食之成惡邪病小蒜多食傷人心力食躁或躁方豉濃煮汁飲之鉤吻與芹菜相似誤食之殺人解之方薺苨八兩上一味水六升煮取二升分溫二服鉤吻生地旁無他草其莖有毛以此別之菜中有水莨菪葉圓而光有毒誤食之令人狂亂如中風或吐血治之方甘草煮汁服之即解春秋二時龍帶精入芹菜中人偶食之為病發時手背腹滿痛不可忍名蛟龍病治之方硬糖二三升上一味日兩度服吐出如蜥蜴三五枚瘥食苦瓠中毒治之方梨根煮汁數服之解扁豆寒熱者不可食之久食小豆令人枯燥食大豆屑忌啖豬肉大麥久食令人作癬白黍米不可同飴蜜食亦不可合葵食之蓧麥面多食之令人發落鹽多食傷人肺食冷物冰入齒食熱物勿飲冷水飲酒食生蒼耳令人心痛夏月大醉汗流不得冷水洗著身及使扇即成病飲酒大忌灸腹背令人腸結醉後勿飽食發寒熱飲酒食豬肉臥秫稻穰中則發黃食飴糖飲酒大忌凡水及酒照見人影動者不可飲之醋合酪食之令人血瘕食白米粥勿食生蒼耳成走疰食甜粥已食鹽即吐犀角箸攪飲食沫出及澆地墳起者食之殺人飲食中毒煩滿治之方苦參三兩苦酒一升上二味煮三沸三上三下服之吐食出即差或以水煮亦得又犀角湯亦佳貪食食多不消心腹堅滿痛治之方鹽一升水二升上二味煮令鹽消分三服當吐食出便差礬石生入腹破人心肝亦禁水商陸以水服殺人葶藶子敷頭瘡藥成恐是氣字入腦殺人水銀入人耳及六畜等皆死以金銀著耳邊水銀則吐吐疑是出苦楝無子者殺人凡諸毒多是假毒以損元知時宜煮甘草薺苨汁飲之通治諸毒藥
