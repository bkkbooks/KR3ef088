body:
  text: 卷十七內傷雜病腹滿寒疝宿食二十五章腹滿寒疝宿食病之相因者也寒水風木之邪合而賊土土濕脾陷迫於風木之侵滯塞不運是以脹滿所謂腎氣實則脹者素問語雖寒水之侮土其中未嘗無木邪也風木上鬱而克濕土則為脹滿風木下鬱而陷寒水則為疝瘕寒疝者風木之下鬱於寒水而凝結者也土之所以化谷者火也寒盛火衰水穀不化是謂宿食宿食既停壅遏中氣變虛而為實故宜攻下攻下雖行而其始實屬寒因則此三證悉以寒為病本總因於少陰之勝趺陽之負也腹滿十七章腹滿一趺陽脈微弦法當腹滿不滿者必便難兩胠疼痛此虛寒從下上也當以溫藥服之趺陽胃脈在足趺上即衝陽也微弦者肝膽之氣也脈見微弦則木邪剋土戊土賊於甲木胃逆而濁氣不降法當腹滿若不腹滿者則甲木不賊戊土乙木必賊己土脾陷而清氣不升法當便難以脾陷肝鬱不能行其疏泄之令也肝膽之脈行於脅肋若見兩胠疼痛此虛寒之氣從下而上也當以溫藥服之溫暖水土以舒木氣也蓋木生於水木氣之郁必因水寒水位在下木位在左右脅肋之間兩胠疼痛是木氣之郁此必寒水之氣從下而上侵於木位也腹滿二寸口脈弦者即脅下拘急而痛其人嗇嗇惡寒也趺陽以候陽明寸口以候太陰寸口脈弦者肝木之克脾土也木邪郁迫經氣不舒故脅下拘急而痛木鬱陽陷陰邪外束其人當嗇嗇惡寒也嗇嗇者皮毛振悚戰栗不寧之義也此申明上章之義也腹滿三腹滿時減復如故此為寒當與溫藥陽清而陰濁清則通而濁則塞中氣痞塞是以滿也腹滿時減復如故者陽有時而復故減陰有時而勝故復如故陰易勝而陽難復是以減不逾時而旋即如故此為陰勝而內寒非有陳宿之阻格當與溫藥以驅寒邪也腹滿四夫中寒家喜缺其人清涕出色和者善嚏缺者開口出氣靈樞口問衛氣晝行於陽夜行於陰陰者主夜夜者臥陽者主上陰者主下故陰氣積於下陽氣未盡陽引而上陰引而下陰陽相引故數缺中寒之家陰氣下盛招引陽氣引則陽陷而陽性升浮隨引即升一陷一升是以有缺常引常升故喜缺也緣其陰盛陽衰升氣少而降令多不必日暮而陰常司權故也清涕出者肺氣之上熏也肺氣鬱阻不得下達則上熏鼻竅而生清涕鼻孔窄狹積氣不能暢泄故沖激而為嚏噴以其中氣虛寒樞軸不運肺無下降之路因而逆行上竅肺氣熏沖是以清水常流而嚏噴恆作然欲涕而即出猶是上焦陽氣之稍盛者陽稍盛則顏色和也腹滿五中寒其人下利以裡虛也欲嚏不能此人肚中寒中寒其人大便下利以其里陽之虛也若欲嚏不能此人肚中陽虛而寒盛也靈樞口問陽氣和利滿於心出於鼻則為嚏嚏者肺氣逆行蓄極而通而泄路迫狹故激而為響至於欲嚏不能則氣虛寒盛較上之善嚏者又不如也腹滿六病者痿黃燥而不渴胸中寒實而利不止者死病者痿弱發黃咽喉乾燥而實不覺渴是濕旺而土鬱也土氣困乏則痿靡不振木氣不達則入土化黃木主五色入土為黃木鬱風動則咽喉乾燥水勝土濕則不渴若胸中寒實而下利不止者火澌金冷土敗木賊陽無復機必主死也腹滿七夫瘦人繞臍痛必有風冷穀氣不行而反下之其氣必沖不沖者心下則痞瘦人陽氣衰乏繞臍痛楚腹中必有風冷之邪壅遏穀氣不得運行寒水風木合而賊土衝突擊撞是以痛也而反下之敗其微陽陰邪無制其氣必沖若不衝於膈上必填於心下心下痞硬之證於是作也腹滿八其脈數而緊乃弦狀如弓弦按之不移脈數弦者當下其寒脈緊大而遲者必心下堅脈大而緊者陽中有陰可下之其脈數而兼緊此乃弦脈其狀如弓弦硬直按之不能移動是中氣虛寒木邪剋土之診脈數弦者寒氣凝結當以溫藥下其積寒脈緊大而遲者濁陰上逆必心下痞堅以大為陽明之脈胃氣上逆壅礙膽經降路甲木逼迫胃口結滯故心下堅硬緊大而遲則心下之堅全是陰邪結聚緣陽位一虛則陰邪乘虛而上湊非沖塞於胸膈則痞結於心下也凡脈大而緊者是為陽中有陰可以溫藥下之傷寒脈法緊則為寒內外之寒皆令脈緊外緊而內大者陰盛而外束也陽為陰束鼓宕不能外發故內大而為緊內緊而外大者陰盛而內格也陽為陰格浮動不能內交故外大而內緊積陰內凝非下不去是以可下下宜溫藥大黃附子湯是其法也腹滿九病者腹滿按之不痛為虛痛者為實可下之舌黃未下者下之黃自去病者腹中脹滿按之不痛為虛虛滿而未至滯塞也痛者為實實滿而已至壅阻也陳宿凝瘀是可下之舌黃者濕氣乘心故舌起黃胎以心竅於舌土性濕而色黃也痛滿因於氣滯氣滯必緣土濕舌胎黃色濕之外候其未下者下之濕氣內瀉則黃色外退矣腹滿十腹中寒氣雷鳴切痛胸脅逆滿嘔吐附子粳米湯主之腹中寒氣雷鳴切痛者水寒木鬱肝氣梗澀而怫怒衝突必欲強行氣轉腸鳴聲如雷引排觸擊撞是以痛切胸脅逆滿嘔吐者膽胃上逆經絡壅塞濁氣熏沖則生嘔吐附子粳米湯粳米甘棗補土而緩中半夏附子降逆而驅寒也附子粳米湯百二十九附子一枚炮半夏半升甘草一兩大棗十枚粳米半升上五味以水八升煮米熟湯成去滓溫服一升日三服腹滿十一心胸中大寒痛嘔不能飲食腹中寒上衝皮起出見有頭足上下痛而不可觸近大建中湯主之心胸大寒痛嘔不能飲食者土火俱敗寒水上凌胃氣奔逆不能下降也腹中寒氣上衝皮起頭足出見上下走痛而不可觸近者寒水與風木合邪肆行無畏排擊衝突勢不可當也大建中湯膠飴人參培土而建中乾薑蜀椒補火而溫寒也大建中湯百三十乾薑四兩蜀椒二合炒去汗人參一兩上三味以水四升煮取二升去滓內膠飴一升微火煎取一升半分溫再服如一炊頃可飲粥二升後更服當一日食糜粥溫覆之腹滿十二寒氣厥逆赤丸主之寒氣厥逆寒氣在內手足厥冷也四肢秉氣於脾胃寒水侮土四肢失秉是以厥逆寒水上凌心火澌敗是宜瀉寒水而護心君赤丸茯苓烏頭瀉水而驅寒濕半夏細辛降濁而下衝氣真朱保護心君而止疼痛也赤丸百三十一茯苓四兩烏頭二兩半夏四兩細辛一兩上四味末之內真朱為色煉蜜丸如麻子大先食酒下三丸日再夜一服不知稍增之以知為度真朱即硃砂非寶珠也腹滿十三脅下偏痛發熱其脈緊弦此寒也以溫藥下之宜大黃附子湯脅下偏痛發熱其脈緊弦此脾土寒濕肝木鬱遏以溫藥下其濕寒則愈矣宜大黃附子湯辛附降逆而驅寒大黃下積而破結也大黃附子湯百三十二大黃三兩附子三枚炮細辛二兩上三味以水五升煮取二升分溫三服若強人煮取二升半分溫三服服後如人行四五里進一服腹滿十四腹滿痛發熱十日脈浮而數飲食如故厚朴七物湯主之腹滿痛發熱十日脈浮而數者外感風邪經腑皆郁經氣不泄故發熱脈浮腑氣不通故腹滿而痛而飲食如故則內證非寒厚朴七物湯薑桂甘棗解表而和中枳朴大黃瀉滿而攻裡也以小承氣而合薑桂甘棗重用生薑亦溫下法也厚朴七物湯百三十三厚朴半斤枳實五枚大黃三兩桂枝二兩甘草三兩大棗十枚生薑五兩上七味以水一斗煮取四升溫服八合日三服嘔者加半夏五合下利去大黃寒多者加生薑至半斤腹滿十五痛而閉者厚朴三物湯主之痛而內閉不通必鬱而生熱直用寒瀉不須溫下厚朴三物湯枳朴瀉其滿大黃通其閉也厚朴三物湯百三十四此即小承氣湯而分兩不同厚朴八兩枳實五枚大黃四兩上三味以水一斗二升先煮二物取五升內大黃煮取三升溫服一升以利為度腹滿十六腹滿不減減不足言當須下之宜大承氣湯方在痙病腹滿時減已復如故此為寒也今腹滿不減雖少減而究不足言減此非虛寒是實邪也內實故常滿而不減當須下之宜大承氣湯也腹滿十七按之心下滿痛者此為實也當下之宜大柴胡湯心下滿痛者少陽之經郁迫陽明之腑也少陽之經由胃口而行兩脅膽胃上逆經腑壅塞故心下滿痛此為實也法當下之宜大柴胡湯柴芩芍藥清解少陽之經枳實大黃寒瀉陽明之腑半夏薑棗降逆而補中也大柴胡湯百三十五柴胡半斤黃芩三兩芍藥三兩半夏半升洗生薑五兩大棗十二枚枳實四枚炙大黃二兩上八味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服寒疝三章寒疝一腹痛脈弦而緊弦則衛氣不行即惡寒緊則不欲食邪正相搏即為寒疝寒疝繞臍痛若發則白津出手足厥冷其脈沉緊者大烏頭煎主之腹痛脈弦而緊者肝脈弦腎脈緊寒水風木之邪合而剋土是以腹痛弦則木鬱陽陷陰乘陽位外束衛氣故衛氣不行陽郁不達是以惡寒緊則寒水侮土胃氣上逆故不欲食清陽下陷上與陰邪相爭不能透圍而出木氣鬱淪永墜寒水之中即為寒疝疝瘕同類皆腎肝陰邪所凝結也寒疝之病水木合邪以侵土位常苦繞臍疼痛若發則木氣疏泄腎精不藏溲出白液手足厥冷其脈沉緊者水寒而木鬱也宜大烏頭煎蜂蜜緩急迫而潤風木烏頭瀉濕淫而溫寒水也白津出素問玉機真臟論脾傳之腎名曰疝瘕少腹冤熱而痛出白白津即白淫之類也大烏頭煎百三十六烏頭大者五枚熬去皮不㕮咀上以水三升煮取一升去滓內蜜二升煎令水氣盡取二升強人服七合弱人服五合不差明日更服不可一日再服寒疝二寒疝腹中痛逆冷手足不仁若身疼痛灸刺諸藥不能治抵當烏頭桂枝湯主之寒疝腹中痛手足逆冷不仁者腎肝之邪合而賊土土敗而四肢失養也或身上疼痛灸刺諸藥不能治是臟病而經亦郁病根在裡故但以灸刺諸藥治其表不能愈也抵當烏頭桂枝湯烏頭驅寒而逐濕桂枝疏木而通經也烏頭桂枝湯百三十七烏頭三枚桂枝三兩去皮芍藥三兩甘草二兩大棗十二枚生薑三兩上桂枝五味以水七升微火煮取三升去滓烏頭一味以水二升煎減半去滓以桂枝湯五合合煎令得一升後初服二合不知即服三合又不知復加至五合其知者如醉狀得吐者為中病寒疝三寒疝腹中痛及脅痛裡急者當歸生薑羊肉湯主之寒疝腹中痛及脅痛裡急者風木寒鬱而克濕土也當歸生薑羊肉湯當歸滋木而息風生薑羊肉行鬱而溫寒也當歸生薑羊肉湯百三十八當歸三兩生薑五兩羊肉一斤上三味以水八升煮取三升溫服七合日三服若寒多者加生薑成一斤痛多而嘔者加橘皮二兩白朮一兩加生薑者亦加水五升煮取三升二合服之宿食五章宿食一問曰人病有宿食何以別之師曰寸口脈浮而大按之反澀尺中亦微而澀故知有宿食大承氣湯主之方在痙病宿食在胃郁格表陽故寸口脈浮大阻礙裡氣故按之梗澀尺中亦微而澀者尺中主裡也此段見傷寒可下中宿食二脈緊如轉索無常者有宿食也脈緊頭痛風寒腹中有宿食不化也脈緊如轉索無常者錘輪索轉而不定愈轉則愈緊也以水寒土濕則食停不化宿食在中土氣鬱滿乙木抑遏陷於寒水不能上達是以脈緊甚而木鬱陽陷陰邪外乘頭痛風寒形似外感實乃腹中有宿食不化也宿食三脈數而滑者實也此有宿食下之愈宜大承氣湯脈數而滑者宿食在中陽氣鬱格則脈滑數宿食四下利不欲食者此有宿食也當下之宜大承氣湯此段見傷寒可下中宿食傷其胃氣陳腐不化故惡聞食臭宿食五宿食在上脘當吐之宜瓜蒂散此段見傷寒可吐中宿食未消而在上脘阻礙糧道法當吐之宜瓜蒂散瓜蒂散百三十九方見傷寒太陽瓜蒂一分熬赤小豆一分煮上二味杵為散取一錢匕以香豉一合用熱湯七合煮作稀糜去滓取汁和散溫頓服之不吐者少加之以快吐為度而止附方外臺柴胡桂枝湯十二治心腹卒痛者柴胡四兩黃芩兩半半夏二合半生薑兩半人參兩半甘草一兩大棗六枚桂枝兩半芍藥兩半上九味以水六升煮取三升溫服一升日三服
