body:
  text: 卷十一內傷雜病消渴小便不利淋十三章消渴癃淋者皆厥陰之病也厥陰風木之氣性主疏泄泄而不藏津液失亡則為消渴泄而不通川瀆瘀塞則為癃淋其標是燥其本則濕消渴者肺胃之燥也癃淋者肝脾之濕也燥勝其濕則有消而無淋濕勝其燥則有淋而無消燥濕相敵上下不交則消見於上淋見於下上下之機緘總在乎厥陰有合病者有分病者其分合之概則有消渴也有消渴而小便不利也有消渴而小便反多也有小便不利也有淋也有淋而消渴也病機不一而厥陰為病則一緣厥陰乙木位居水火之中火盛於上則風木疏泄而病消渴水盛於下則風木鬱遏而病癃淋無異故也消渴一厥陰之為病消渴氣上衝心心中疼熱飢而不欲食食則吐蛔下之利不止此段見傷寒厥陰厥陰之經以風木而孕君火肝藏血心藏液病而風動火炎血液耗傷津亡肺燥則生消渴風木不舒奔騰擊撞故氣上衝心心中疼熱木鬱剋土飲食不消故胃口雖飢而腹不欲食木鬱蠹化是生蛔蟲食下不消必復嘔出蛔隨嘔上故食則吐蛔下之脾敗肝鬱風木疏泄故下利不止厥陰不病則已病則必見諸證外感內傷無有不然後世粗工不解以為傷寒之病金匱此條系後人誤從傷寒採入是於傷寒雜病一絲不曉何敢妄言無忌一至於此消渴二寸口脈浮而遲浮即為虛遲即為勞虛即衛氣不足勞則營氣竭趺陽脈浮而數浮即為氣數即消穀而大便堅氣盛則溲數溲數即堅堅數相摶即為消渴寸口脈浮而遲浮即為表氣之虛弱遲即為裡氣之勞傷表陽虛弱即衛氣不足里陰勞傷則營血枯竭趺陽脈浮而數浮即為陽氣之盛數即為消穀而大便堅陽氣盛則溲溺數溲溺數則大便堅大便之堅與小便之數相合津液滲泄即為消渴蓋消渴之病在胃不在脾素問陰陽別論二陽結謂之消二陽者陽明也手陽明以燥金主令金燥則消水而便堅足陽明從燥金化氣土燥則消穀而溲數消渴者手足陽明之合氣而燥結於腸胃者也太陰行氣於三陰脈候於寸口陽明行氣於三陽脈候於趺陽太陰主升陰中之陽升於脈絡則經氣旺陽明主降陽中之陽降於腸胃則腑氣旺太陰虛而經中之氣衰是以寸口浮遲衛氣不足而營氣消竭此以虛勞傷其營衛營衛耗弱乃發熱作渴之原傷寒所謂諸弱發熱弱者必渴是也陽明盛而腑中之氣旺是以趺陽浮數戊土溲數而庚金大堅此以燥熱爍其津液津液枯涸及消穀引飲之根故消渴之病太陰衰而陽明盛經氣虛而腑氣實所謂壯火之食氣者也消渴三趺陽脈數胃中有熱即消穀引飲大便必堅小便即數趺陽脈數則胃中有熱胃熱即善飢善渴消穀而引飲谷消水化中氣有餘則谷傳於後而大便必堅水滲於前而小便即數便堅溲數土金俱燥是以消渴也淋四淋之為病小便如粟狀少腹弦急痛引臍中淋之為病溺孔艱澀如粟粒阻梗而不利也乙木鬱陷故少腹弦急肝氣賊脾故痛引臍中土升則木達水寒土濕脾氣下陷乙木抑遏不能上達鬱怒而賊己土是以少腹弦急而痛引臍中也膀胱者州都之官津液藏焉氣化則能出蓋化水者肺金也泄水者肝木也土濕則金逆於上不能化水木陷於下不能泄水小便所以不利也木以疏泄為性土濕木鬱疏泄不行而強欲泄之愈泄則愈梗愈梗則愈泄是以頻數而痛澀溫氣遏陷鬱而為熱是以黃赤而閉癃此與痢家之墜痛一理痢病於後而淋病於前也其燥熱在肝而濕寒在脾後世庸工專以寒瀉而治淋痢殺人多矣淋五淋家不可發汗發汗則必便血淋家土濕木鬱怒生風燥汗之再亡血中溫氣風木愈郁疏泄失藏必便血也此段見傷寒不可汗中消渴六渴欲飲水口乾舌燥者白虎加人參湯主之方見暍病此段見傷寒陽明渴欲飲水口乾舌燥者金被火刑熱傷肺氣不能化生津液澤臟腑而潤口舌也白虎加人參湯知母石膏瀉熱而清金參甘梗米益氣而培土土旺金生氣充津化解渴除煩之聖法也消渴七渴欲飲水不止者文蛤散主之渴欲飲水不止水盛土濕火升而刑肺也文蛤散利水而瀉濕止渴而清煩也傷寒意欲飲水反不渴者服文蛤散若不差者與五苓散文蛤散證即五苓散證之輕者上燥下濕故意欲飲水而反不渴其渴欲飲水不止實非真渴也文蛤散五十七方見傷寒太陽文蛤上一味杵為散以沸湯五合和服方寸匕消渴八渴欲飲水水入則吐者名曰水逆五苓散主之方在痰飲此段見傷寒太陽渴欲飲水水入則吐者以有停水在內兩水莫容是以吐出五苓散二苓澤瀉利水而瀉濕白朮桂枝燥土而疏木也消渴小便不利九脈浮小便不利微熱消渴者宜利小便發汗五苓散主之方在痰飲此段見傷寒太陽脈浮小便不利微熱消渴者濕盛於下火升而不降也宜利小便以瀉下焦之濕發汗以瀉上焦之濕五苓散上下滲瀉使濕淫盡化汗溺而去止濕盛發渴之神方也人參白虎證是燥盛作渴文蛤五苓豬苓證是濕盛作渴消渴小便不利十脈浮發熱渴欲飲水小便不利豬苓湯主之此段見傷寒陽明濕盛於下陽氣鬱格故脈浮發熱濕旺木鬱風燥亡津故渴欲飲水木鬱不能泄水故小便不利豬苓湯二苓滑澤利水而瀉濕阿膠滋木而清風也豬苓湯五十八方見傷寒陽明豬苓一兩茯苓一兩澤瀉一兩滑石一兩阿膠一兩上五味以水四升先煮四味取二升去滓內阿膠烊消盡溫服七合日三服消渴十一男子消渴小便反多以飲一斗小便一斗腎氣丸主之凡消渴之病率小便不行緣土濕木遏郁生風燥上而津液消耗則為消渴下而疏泄不行則小便不利男子消渴而小便反多者乙木善泄而癸水失藏也小便之通塞司於膀胱而膀胱之開闔職在三焦靈樞本輸三焦者入絡膀胱約下焦實則閉癃虛則潰溺以水性下潤而火性上炎水欲降而火升之則溲溺不至遺失故三焦之火能約小便夫水性善藏火性善泄素問靈蘭秘典膀胱者州都之官津液藏焉氣化則能出矣三焦者決瀆之官水道出焉火盛土燥則肺氣降灑而化水火旺水暖則肝氣升達而水泄水土溫燥金生木泄皆三焦之力也膀胱主藏三焦主出乃火實而水虛反閉癃而不出火虛而水實反遺溺而不藏此何以故蓋蟄藏者腎之能也傳輸者膀胱之事也火藏於腎則水道清利而不塞癸水溫暖則乙木榮暢善於泄水火泄於膀胱則水府熱塞而不通所謂實則閉癃者三焦之火不藏於腎而泄於膀胱也夫三焦之火本藏於腎今何緣而泄於膀胱則厥陰之咎也以腎主蟄藏肝主疏泄水中之火旺藏於少陰是謂腎氣腎氣溫暖木榮風靜則癸水善藏而木不能泄腎氣凘寒木鬱風作則乙木善泄而水不能藏風木疏泄必由水寒而寒有微甚之差則泄有通塞之殊其腎水微寒而相火未至極衰則木陷於水而生下熱泄而不通乃病淋澀所謂實則閉癃者木愈泄而水愈藏也其腎水極寒而相火不存微焰則木鬱於水而無下熱泄而不藏乃病注傾所謂虛則遺溺者水莫藏而木善泄也消渴者厥陰風木之病厥陰水母而子火病則風木疏泄火不根水下寒而上熱上熱則善渴故飲水一斗下寒則善溲故小便一斗診要經終論厥陰終者中熱而善溺是也而木鬱風動之由全因土濕土濕之由全以水寒水寒者腎氣之敗也腎氣丸附子桂枝溫腎氣而達木山萸薯蕷斂肝氣而攝水茯苓澤瀉滲己土而瀉濕地黃丹皮滋乙木而清風也腎氣丸五十九附子一兩桂枝一兩薯蕷四兩山茱萸四兩茯苓三兩澤瀉三兩丹皮三兩乾地黃八兩上八味末之煉蜜和丸梧子大酒下十五丸日再服消渴小便不利十二小便不利者有水氣其人若渴栝蔞瞿麥丸主之小便不利者內有水氣在下郁其乙木其人若渴是寒濕格其君相之火上爍肺津也栝蔞瞿麥丸瞿苓附子瀉水而溫腎寒薯蕷栝蔞斂金而清肺燥也此與腎氣丸證皆上有燥熱下有濕寒彼則小便反多此則小便不利緣彼無水氣則上燥偏多此有水氣則下濕偏盛燥多則風木上達而善泄濕多則風木下鬱而不能泄也栝蔞瞿麥丸六十栝蔞根二兩薯蕷三兩瞿麥一兩茯苓三兩附子一枚炮上五味末之煉蜜和丸梧子大飲服二丸日三服不知增至七八丸以小便利腹中溫為知小便不利十三小便不利蒲灰散主之滑石白魚散茯苓戎鹽湯並主之小便不利以土濕木遏鬱而生熱熱傳己土而入膀胱是以小便黃赤黃者濕土之下傳赤者君火之下郁也君火胎於乙木故木鬱則生下熱木氣遏陷泄而不通故水道淋澀蒲灰散蒲灰鹹寒而通淋澀滑石淡滲而瀉濕熱也滑石白魚散滑石滲濕而瀉熱白魚發灰利水而開癃也茯苓戎鹽湯苓術燥土而瀉濕戎鹽利水而清熱也蒲灰散六十一蒲灰半斤滑石一斤上二味杵為散飲服方寸匕日三服滑石白魚散六十二滑石一斤白魚一斤亂髮一斤燒上三味杵為散飲服方寸匕日三服茯苓戎鹽湯六十三茯苓半斤白朮二兩戎鹽彈丸大一枚上三味先將茯苓白朮煎成入戎鹽再煎分溫三服戎鹽即青鹽也
