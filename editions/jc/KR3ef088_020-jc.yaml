body:
  text: 卷二十婦人妊娠十一章胎元化生非有他也氣以煦之血以濡之而已氣惡其滯滯緣於濕血恐其鬱郁因於風妊娠養胎之要燥土而行滯潤木而達郁無餘蘊矣血統於乙木氣統於辛金而肺病則濕肝病則燥以足厥陰主令於風木手太陰化氣於濕土故行氣以燥土為先行血以潤木為首仲景於妊娠之門溫涼燥潤四法俱備大要在建中而培土中氣健旺而後用涼潤於東南以治木火則血調矣用溫燥於西北以治金水則氣調矣氣血均調而胎元化育妊娠何得有餘病也妊娠一妊娠一師曰婦人得平脈陰脈小弱其人渴不能食無寒熱名妊娠桂枝湯主之方見下利於法六十日當有此證設有醫治逆者卻一月加吐下則絕之婦人得平和之脈而尺脈小弱其人渴不能食外無寒熱表證此名妊娠難經命門者諸神精之所舍原氣之所繫也男子以藏精女子以系胞蓋子宮者少陰腎之位也故脈見於尺胎之初結氣血凝蹇不復流溢故脈形小弱胎妊方成中氣壅滿胃逆不降故噁心嘔吐不能甘食胃逆則金火皆升是以發渴桂枝湯甘草大棗補其脾精桂枝芍藥調其肝血生薑降逆止嘔妊娠初治之良法也於妊娠之法六十日間當有此證設有醫治之逆者卻一月之內而見此證加以吐下之條者日期淺近而吐下大作此中氣之敗不關胎故則調燮中氣絕其病本也妊娠二症痼二婦人宿有症病經斷未及三月而得漏下不止胎動在臍上者此為症痼害妊娠六月動者前三月經水利時胎也下血者後斷三月衃也所以血不止者其症不去故也當下其症桂枝茯苓丸主之婦人宿有症痼之病經斷未及三月之久而得漏下不止胎動在臍上者此為症痼之害蓋症痼不在子宮所以受胎將及三月胎氣漸大與症痼相礙此後經血被症痼阻格不得滋養胞宮是以漏下不止妊娠六月胎動者前三月經水利時之胎也經漏下血者後斷經三月之衃也後斷經三月前經利三月合為六月其初漏下之血塊乃後斷三月化胎之餘血凝而成衃者也所以此後之血不止者無胎時竅隧空虛而莫阻胎成血阻而病漏下此以其症不去也當下其症症因土濕木鬱而結桂枝茯苓丸桂枝芍藥疏木而清風丹皮桃仁破瘀而行血茯苓瀉水而滲濕以漸而消磨之此妊娠除症之法也桂枝茯苓丸百五十一桂枝芍藥桃仁去皮尖熬牡丹皮茯苓等分上五味末之煉蜜丸如兔屎大每日食前服一丸不知加至三丸妊娠三胎脹三婦人懷妊六七月脈弦發熱其胎愈脹腹痛惡寒者少腹如扇所以然者子臟開故也當以附子湯溫其臟木鬱則脈弦木鬱陽陷故發熱而惡寒木鬱剋土故胎脹而腹痛木鬱風生故少腹涼氣如扇所以然者土濕水寒肝木不榮陷而生風疏泄失藏致令子臟開張故也當以附子湯溫其腎臟苓附瀉水而驅寒參術補土而益氣芍藥斂木而息風水溫土燥木榮風息則寒熱止而痛脹消矣附子湯百五十二方見傷寒少陰金匱失載此取傷寒方補附子二枚去皮茯苓三兩人參二兩白朮四兩芍藥三兩上五味以水八升煮取三升去滓溫服一升日三服妊娠四胞阻四師曰婦人有漏下者有半產後因續下血都不絕者有妊娠下血者假令妊娠腹中痛為胞阻膠艾湯主之非經期而下血如器漏水滴謂之漏下土弱木鬱不能養胎則胎落而半產半產後肝脾遏陷陽敗而不能溫升因續下血不止肝脾陽衰胎成氣滯木鬱血陷故妊娠下血如宿症漏下之類假令妊娠腹中疼痛而下血此為胞氣阻礙經血不得上行而下也胞阻之病因木鬱風動經脈寒澀而成膠艾湯芎地歸芍養血而行瘀澀阿膠艾葉潤燥而溫寒凝甘草補土而暖肝氣木達則阻通矣膠艾湯百五十三阿膠二兩艾葉三兩甘草二兩芎藭二兩乾地黃六兩當歸三兩芍藥四兩上七味以水五升清酒三升合煮取三升去滓內膠令消盡溫服一升日三服妊娠五腹痛五婦人懷妊腹中㽲痛當歸芍藥散主之胎成氣滯濕土賊於風木則腹中㽲痛當歸芍藥散芎歸芍藥潤肝而行瘀苓澤白朮瀉濕而燥土也當歸芍藥散百五十四當歸三兩芍藥一斤芎藭三兩茯苓四兩澤瀉四兩白朮四兩上六味杵為散取方寸匕酒和日三服妊娠六嘔吐六妊娠嘔吐不止乾薑人參半夏丸主之中焦鬱滿胃氣上逆則嘔吐不止乾薑人參半夏丸乾薑人參溫中而益氣半夏薑汁降逆而止嘔也乾薑人參半夏丸百五十五乾薑一兩人參一兩半夏二兩上三味末之以生薑汁糊為丸如梧子大飲服十丸日三服按此方以生薑汁煉蜜為丸治反胃嘔吐甚良加茯苓愈妙妊娠七小便七妊娠小便難飲食如故當歸貝母苦參丸主之水生於肺金而瀉於肝木妊娠中氣鬱滿升降失職金逆而生上熱木陷而生下熱源流堙塞故小便艱難當歸貝母苦參丸當歸滋木而息風貝母瀉熱而清金苦參瀉濕而利水也當歸貝母苦參丸百五十六當歸四兩貝母四兩苦參四兩上三味末之煉蜜丸如小豆大飲服三丸加至十丸妊娠八水氣八妊娠有水氣身重小便不利灑淅惡寒起即頭眩葵子茯苓散主之妊娠內有水氣身體沉重土濕木鬱疏泄不行故小便不利木鬱陽陷陰氣外束故灑淅惡寒水邪阻格陽氣升浮故起即頭眩葵子茯苓散葵子茯苓滑竅而瀉水也葵子茯苓散百五十七葵子一斤茯苓三兩上二味杵為散飲服方寸匕日三服小便利即愈妊娠九婦人妊娠宜常服當歸散主之胎之結也賴木氣以生之藉土氣以養之妊娠所以多病者土濕而木燥也燥則鬱熱而剋土故妊娠所以宜常服者培養土木之劑也當歸散白朮燥土歸芍潤木芎藭黃芩清熱而行瘀土旺木榮妊娠無餘事矣當歸散百五十八當歸一斤芍藥一斤芎藭一斤黃芩一斤白朮半斤上五味杵為散酒服方寸匕日再服妊娠常服即宜產胎無疾苦產後百病悉主之妊娠十養胎九妊娠養胎白朮散主之胎之所以失養者土濕水寒而木氣鬱結也妊娠養胎燥土暖水疏木散結而已矣白朮散朮椒燥土而暖水芎藭疏木而達郁牡蠣消瘀而散結斂神而保精養胎之善方也白朮散百五十九白朮蜀椒芎藭牡蠣等分上四味杵為散酒服一錢匕日三服夜一服但苦腹痛加芍藥心下毒痛倍加芎藭心煩吐痛不能食飲加細辛一兩半夏大者二十枚服之後更以醋漿水服之若嘔以醋漿水服之服不解者小麥汁服之已後渴者大麥粥服之病雖愈服之勿置妊娠十一傷胎腹滿十婦人傷胎懷身腹滿不得小便從腰以下重如有水氣狀懷身七月太陰當養不養此心氣實當刺瀉勞宮及關元小便微利則愈婦人傷胎以致懷身腹滿不得小便從腰以下沉重如有水氣之狀懷身七月手太陰之經當養而不養此濁陰上逆填於陽位心氣鬱塞而成實也蓋胎之結也一月二月木氣生之三月四月火氣長之五月六月土氣化之七月八月金氣收之九月十月水氣成之五氣皆足而胎完矣足太陰以濕土主令手太陰從濕土化氣懷身七月正手太陰當養之時而氣虛濕旺故當養不養濕旺則氣滯不能化水故腹滿而便癃下重而如水狀濕氣凝滯火無降路必克辛金而生上熱故心氣成實勞宮者手厥陰之穴脈動於掌心刺勞宮以瀉厥陰之滯則心亦瀉矣以君相之火同氣也關元任脈之穴在臍下三寸小腸之募刺關元以瀉小腸之滯則心亦瀉矣以丙丁之火同氣也氣通水化小便微利濕氣滲泄則病愈矣
