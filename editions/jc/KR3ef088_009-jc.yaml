body:
  text: 卷九內傷雜病奔豚四章奔豚之證水寒土濕而風木鬱發者也木生於水而長於土水寒則不生土濕則不長生長不遂則木鬱而風動動而不已則土崩堤壞而木邪奔騰直衝於胸膈心腹劇痛鼻口火發危困欲死不可名狀病勢之惡未有若此之甚者也而氣機將作則悸動先生悸動者風木之振搖也蓋驚悸奔豚俱緣亡陽驚悸即奔豚之前矛奔豚即驚悸之後勁同聲一氣之邪非有二也其中吐衄之條往往相兼而見不吐衄而瘀腐即為吐膿之證耳大凡虛勞內傷之家必有驚悸奔豚之病奔豚或有時作止而驚悸則無刻不然其時常驚悸而奔豚不作者己土未敗而風木不能遽發也然悸動未息則奔豚雖不發作而發作之根未嘗不在當其少腹硬塊歲月增長即不必發作而禍根已伏不可不察也奔豚一師曰奔豚病從少腹起上衝咽喉發作欲死復還止皆從驚恐得之難經腎之積名曰奔豚發於少腹上至心下若豚狀或上或下無時傷寒霍亂理中丸加減若臍上築者腎氣動也傷寒臍下悸者必發奔豚其實根原於腎而病發於肝非純為腎家之邪也病從少腹而起上於胸膈而衝於咽喉喘呼閉塞七竅火生木氣奔騰勢如驚豚若脅若腹若心若頭諸處皆痛發作欲死凶惡非常及其氣衰而還諸證乃止其原皆從驚恐得之蓋五臟之志腎主恐而肝主驚驚則氣亂恐則氣下驚恐之時肝腎之氣亂其生髮之常而為淪落之勢生氣亦遂陷於重淵日月積累漸成硬塊難經以為腎積究竟是木陷於水而成積聚也其結於少腹堅硬不移者奔豚之本其衝於咽喉奔突不安者奔豚之標其標不無燥熱而其本則全是濕寒以少陽甲木下行而溫癸水水暖木榮則膽壯而不生驚恐甲木拔根相火升泄膽肝皆寒則驚恐作焉人之倉卒驚恐而振慄戰搖者水凘而膽寒也奔豚二奔豚氣上衝胸腹痛往來寒熱奔豚湯主之奔豚之發木勝而土敗也木邪奔發氣上衝胸脾土被賊是以腹痛肝膽同氣木氣上衝膽木不得下行經氣鬱迫故往來寒熱以少陽之經居半表半裡之間表陽里陰迭為勝負則見寒熱之往來厥陰風木之氣風動血耗木鬱熱發奔豚湯甘草補土而緩中生薑半夏降胸膈之沖逆黃芩生葛清膽胃之鬱熱芎歸芍藥疏木而潤風燥李根白皮清肝而下奔氣也奔豚湯四十四甘草二兩半夏四兩生薑四兩芍藥二兩當歸二兩芎藭二兩黃芩二兩生葛五兩甘李根白皮一升上九味以水二升煮取五升溫服一升日三夜一服奔豚三發汗後燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心灸其核上各一壯與桂枝加桂湯主之此段見傷寒太陽傷寒燒針發汗汗後陽虛脾陷木氣不舒一被外寒閉其針孔風木鬱動必發奔豚若氣從少腹上衝心胸便是奔豚發矣宜灸其核上各一壯以散外寒即以桂枝加桂湯疏風木而降奔沖也桂枝加桂湯四十五方見傷寒太陽桂枝五兩芍藥三兩甘草二兩炙大棗十二枚生薑三兩上五味以水七升微火煮取三升去滓溫服一升奔豚四發汗後臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之汗亡血中溫氣木鬱風動搖盪不寧則生振悸輕則枝葉振惕而悸在心下重則根本撼搖而悸在臍間若臍下悸生則奔豚欲作矣苓桂甘棗湯茯苓桂枝瀉癸水而疏乙木甘草大棗補脾精而滋肝血也茯苓桂枝甘草大棗湯四十六方見傷寒太陽茯苓半斤桂枝四兩甘草二兩大棗十五枚上四味以甘瀾水一斗先煮茯苓減二升內諸藥煮取三升去滓溫服一升日三服作甘瀾水法取水二斗置大盆內以勺揚之水上有珠子五六千顆相逐遂取用之
