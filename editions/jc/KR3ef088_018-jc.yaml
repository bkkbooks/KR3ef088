body:
  text: 卷十八內傷雜病趺蹶手指臂腫轉筋狐疝蛔蟲七章趺蹶手指臂腫轉筋狐疝蛔蟲皆寒濕之病也趺蹶之病寒濕在足太陽之經手指臂腫寒濕在手太陰之臟轉筋之病寒濕在足厥陰之經狐疝之病寒濕在足少陰之經蛔蟲之病寒濕在足厥陰之臟凡此五者經臟非同而病氣則同也假使土燥而水暖則五者不生矣趺蹶一章趺蹶一師曰病趺蹶其人但能前不能卻刺腨入二寸此太陽經傷也病趺蹶其人但能前不能卻者足趺硬直能前步而不能後移也緣筋脈寒濕縮急不柔是以不能後卻陽明行身之前筋脈松和則能前步太陽行身之後筋脈柔濡則能後移今能前而不能卻是病不在前而在後太陽經傷也太陽之經入膕中貫腨內出外踝至小指之外側刺腨入二寸瀉太陽之寒濕筋柔則能卻矣腨足肚也刺腨者合陽承筋之間也此臟腑經絡篇所謂濕傷於下寒令脈急者也手指臂腫一章手指臂腫二病人常以手指臂腫動此人身體瞤瞤者藜蘆甘草湯主之手指臂者手三陽三陰經之所循手之三陰自胸走手手之三陽自手走頭經氣通暢則不腫經絡壅阻不能流行則氣血蓄積結而為腫氣壅而莫泄故鼓鬱而為動也動則瞤瞤振搖而不寧此以胸有瘀濁阻格經脈氣道不通故至於此藜蘆甘草湯藜蘆吐其瘀濁甘草和其中氣也藜蘆甘草湯百四十藜蘆甘草原方闕載轉筋一章轉筋三轉筋之為病其人臂腳直脈上下行微弦轉筋入腹者雞屎白散主之轉筋之為病其人臂腳硬直不能屈伸其脈上下直行微帶弦象此厥陰肝經之病也肝主筋筋脈得濕則攣縮而翻轉也轉筋入腹則病勢劇矣雞屎白散瀉其濕邪筋和而舒矣雞屎白散百四十一雞屎白上為散取方寸匕取水八合和溫服狐疝一章狐疝四陰狐疝氣者偏有小大時時上下蜘蛛散主之陰狐疝氣者疝結陰囊出沒不測狀似妖狐也左右二丸偏有大小時時上下出入無常此少陰厥陰兩經之病由水寒木陷肝氣下鬱而發蜘蛛散蜘蛛破瘀而消腫桂枝疏木而升陷也蜘蛛散百四十二蜘蛛十四枚熬焦桂枝半兩上二味為散取八分一匕飲和日再服蜜丸亦可蛔蟲三章蛔蟲五問曰病腹痛有蟲其脈何以別之師曰腹中痛其脈當沉若弦反洪大故有蛔蟲腹中痛者腎肝之邪水寒而木鬱也腎脈沉肝脈弦是其脈當沉若弦乃反洪大是木鬱而生上熱也木鬱熱閉則蟲生故有蛔蟲也蛔蟲六蛔蟲之為病令人吐涎心痛發作有時毒藥不止甘草粉蜜湯主之蛔蟲之為病令人吐涎沫而心痛以肝心子母之臟氣通於心其經夾胃口而貫膈正由心旁蛔者木氣所化木鬱而上衝故心痛也心病則火炎而刑金津液不布故涎沫上湧蛔有動止故發作有時毒藥不止者但知殺蟲而木鬱不達也甘草粉蜜湯甘草補土白粉殺蟲蜂蜜潤燥而清風滑腸而下積也甘草粉蜜湯百四十三甘草二兩粉一兩蜜四兩上三味以水三升先煮甘草取二升去滓內粉蜜攪令和煎如薄粥溫服一升差即止蛔蟲七蛔厥者當吐蛔令病者靜而復時煩此為臟寒蛔上入其膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅丸主之此段見傷寒厥陰篇蛔厥者有蛔蟲而四肢厥冷其證當見吐蛔蛔蟲在內令病者有時靜而復有時煩此因臟寒不能安蛔蛔蟲避寒就溫上入其膈故煩蛔蟲得溫而安須臾復止及其得食臟寒不能消化隨即嘔出嘔時氣衝蛔蟲蛔蟲擾亂是以又煩蛔聞食氣之上隨嘔而出故其人當自吐蛔烏梅丸烏梅薑辛殺蛔止嘔而降沖人參桂歸補中疏木而潤燥椒附暖水而溫下寒連柏瀉火而清上熱也蓋厥陰之病水寒不能生木木鬱而熱發故上有燥熱而下有濕寒烏梅丸上清燥熱而下溫濕寒蛔厥之神方也烏梅丸百四十四方見傷寒烏梅三百枚細辛六兩乾薑十兩人參六兩桂枝六兩當歸四兩蜀椒四兩去目附子六兩炮黃連一斤黃柏六兩上十味異搗篩合治之以苦酒浸烏梅一宿去核蒸之五升米下飯熟搗成泥和藥令相得內臼中與蜜杵二千下丸如梧子大先食飲服十丸日三服稍加至二十丸禁生冷滑臭等物
