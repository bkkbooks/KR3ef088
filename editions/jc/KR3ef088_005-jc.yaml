body:
  text: 卷五外感雜病瘧病五章瘧者陰陽之交爭也暑蒸汗泄浴於寒水寒入汗孔藏於腸胃之外秋傷於風則成瘧病衛氣離則病休衛氣集則病作衛氣晝行於陽二十五周夜行於陰二十五周寒邪在經得陽而外出得陰而內薄其淺在陽分則晝與衛遇而日作其深在陰分則夜與衛遇而暮作邪中於頭項者衛氣至頭項而病邪中於腰脊者衛氣至腰脊而病其後客於脊背也循膂而下其氣日低故其作日晏其前行於臍腹也循腹而上其氣日高故其作日早其內薄於五臟橫連於募原也道遠而行遲不能與衛氣日遇故間日乃作岐伯析其理仲景傳其法理明而法良瘧無不愈之病矣瘧病一師曰瘧脈自弦弦數者多熱弦遲者多寒弦小緊者下之差弦遲者可溫之弦緊者可發汗針灸之浮大者可吐之弦數者風發也以飲食消息止之弦為少陽之脈寒邪在經以類相從內舍三陰少陽居二陽三陰之間內與邪遇相爭而病作故瘧脈自弦少陽甲木從相火化氣其初與邪遇衛氣鬱阻不得前行漸積漸盛內奪陰位陰氣被奪外乘陽位裹束衛氣閉藏而生外寒衛氣被束竭力外發重圍莫透鼓盪不已則生戰慄及其相火鬱隆內熱大作寒邪退敗盡從熱化則衛氣外發而病解此痎瘧之義也但相火不無虛實弦數者火勝其水其病多熱弦遲者水勝其火其病多寒弦而小緊者腑熱重而表寒輕下之則差弦遲者內寒可溫其里弦緊者外寒可發汗針灸以散其表浮大者宿物內阻可吐之弦數者木鬱而風發也以飲食消息而止之如梨漿瓜汁清潤甘滑之品息其風燥經所謂風淫於內治以甘寒是也瘧病二師曰陰氣孤絕陽氣獨發則熱而少氣煩冤手足熱而欲嘔名曰癉瘧若但熱不寒者邪氣內藏於心外舍分肉之間令人消爍肌肉素問瘧論其但熱而不寒者陰氣先絕陽氣獨發則少氣煩冤手足熱而欲嘔名曰癉瘧癉瘧者肺素有熱氣盛於身厥逆上衝中氣實而不外泄因有所用力腠理開風寒舍於皮膚之內分肉之間而發發則陽氣盛陽氣盛而不衰則病矣其氣不及於陰故但熱而不寒氣內藏於心而外舍於分肉之間令人消爍肌肉故名曰癉瘧癉瘧但熱不寒緣其陽盛陰虛肺火素旺汗出竅開風寒內入淺居皮中閉其衛氣衛陽郁發熱傷肺氣手足如烙煩冤欲嘔以陰氣先虛而邪客又淺是以但熱無寒其熱內蓄於心外舍分肉之間令人消爍肌肉是癉瘧之義也瘧病三溫瘧者其脈如平身無寒但熱骨節疼煩時嘔白虎加桂枝湯主之瘧論先傷於風而後傷於寒故先熱而後寒亦以時作名曰溫瘧溫瘧者得之冬中於風寒氣藏於骨髓之中至春陽氣大發邪氣不能自出因遇大暑腦髓爍肌肉消腠理發泄或有所用力邪氣與汗皆出此病藏於腎其氣先從內出之於外也如是者陰虛而陽盛陽盛則熱矣衰則氣復反入入則陽虛陽虛則寒矣故先熱而後寒名曰溫瘧溫瘧先熱後寒緣冬月中風泄其衛氣風愈泄而衛愈閉遏其營血鬱而為熱後傷於寒皮毛斂束而風不能泄營熱更郁營血司於肝木而生於腎水冬時腎水蟄藏而肝木已枯此熱遂藏骨髓之中至春乙木萌生陽氣大發骨髓之熱可以出矣腎主骨髓乙木生於腎水故骨髓之熱當隨木氣外出而外為寒束不能自出因遇大暑腦髓燔爍肌肉消減之時腠理發泄邪可出矣即不遇大暑或有所用力煩勞氣蒸汗流邪亦出矣熱邪與汗皆出表裡如焚於是陽盛而陰虛物極必反陽氣盛極而衰復反故位陰氣續復漸而翕聚是以寒生此溫瘧之義也溫瘧即癉瘧之輕者其熱未極則陽衰陰復能作後寒是謂溫瘧熱極陰亡後寒不作是謂癉瘧曰身無寒但熱仲景指溫瘧之重者而言即癉瘧也骨節者身之溪谷腎水之所潮汐熱極水枯故骨節煩疼嘔者熱盛而胃逆也白虎加桂枝湯石膏知母清金而瀉熱甘草粳米益氣而生津桂枝行經而達表也風寒在表故熱藏骨髓桂枝解散風寒引骨髓之熱外達於皮毛也白虎加桂枝湯十六石膏一斤知母六兩甘草二兩炙粳米二合桂枝三兩上五味以水一斗煮米熟湯成去滓溫服一升日三服瘧病四瘧多寒者名曰牝瘧蜀漆散主之瘧論瘧先寒而後熱者夏傷於暑腠理開發因遇夏氣淒滄之水寒藏於腠理皮膚之中秋傷於風則病成矣夫寒者陰氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱也病以時作名曰寒瘧先寒後熱緣陽為陰束故閉藏而為寒陽氣鼓發故鬱蒸而為熱陽虛不能遽發故寒多而熱少陽敗而不發則純寒而無熱瘧多寒者陰盛而陽虛也是其寒邪凝瘀伏於少陽之部必當去之蜀漆散雲母除其濕寒龍骨收其濁瘀蜀漆排決積滯以達陽氣也蜀漆散十七蜀漆洗去腥雲母燒二日夜龍骨等分上三味杵為散未發前以漿水服半錢匕溫瘧加蜀漆半分臨發時服一錢匕瘧病五病瘧以月一日發當以十五日愈設不瘥當月盡解如其不瘥當云何師曰此結為癥瘕名曰瘧母急治之宜鱉甲煎丸病瘧以此月之初一日發五日一候三候一氣十五日氣候一變故當愈設其不瘥再過一氣月盡解矣如其仍然不瘥此其邪氣盤郁結為癥瘕名曰瘧母當急治之宜鱉甲煎丸鱉甲行厥陰而消癥瘕半夏降陽明而消痞結柴胡黃芩清瀉少陽之表熱人參乾薑溫補太陰之裡寒桂枝芍藥阿膠疏肝而潤風燥大黃厚朴瀉胃而清郁煩葶藶石葦瞿麥赤硝利水而瀉濕丹皮桃仁烏扇紫葳蜣螂鼠婦蜂窠蟅蟲破瘀而消症也鱉甲煎丸十八鱉甲十二分炙半夏一分柴胡六分黃芩三分人參一分乾薑三分桂枝三分阿膠三分炙芍藥五分大黃三分厚朴三分葶藶一分熬石韋三分去毛瞿麥二分赤硝十二分桃仁四分烏扇三分燒紫葳三分蜣螂六分熬鼠婦三分熬峰窠四分炙蟅蟲五分熬丹皮五分上二十三味為未取煅灶下灰一斗清酒一斛五斗浸灰俟酒盡一半著鱉甲於中煮令泛爛如膠漆絞取汁內諸藥煎為丸如梧桐子大空心服七丸日三服眉批見涵初等欲加減此方直是非聖無法孫真人亦只酌換兩味何況凡庸小柴胡桂枝合大承湯三方去甘草之和緩枳實之破氣千金去赤硝鼠婦加海藻大戟咸能軟堅破其堅壘加減亦善附方外臺柴胡去半夏加栝蔞根湯三方見傷寒少陽小柴胡湯加減治瘧病發渴者亦治勞瘧柴胡八兩黃芩三兩人參三兩甘草二兩生薑三兩大棗十二枚栝蔞根四兩上七味以水一斗二升煮取六升去滓再煎取三升溫服一升日三服外臺柴胡桂薑湯四方見傷寒少陽治瘧寒多微有熱或但寒不熱服一劑如神柴胡八兩黃芩三兩甘草三兩炙桂枝三兩去皮乾薑二兩牡蠣二兩栝蔞根四兩上七味以水一斗煮取六升去滓再煎取三升溫服一升日三服初服微煩復服汗出便愈眉批外臺秘要唐王燾撰多載古人秘方其方自有所本尚有牡蠣湯一方專治牝瘧多寒者亦外臺方牡蠣四兩麻黃四兩去節甘草二兩蜀漆三兩上四味以水八升先煮蜀漆麻黃去上沫得六升內諸藥煮取二升溫服一升若吐則勿更服黃氏不錄此方以有柴胡桂薑湯足以概括此方也其意重在和解溫散寒邪故無取麻黃仲景自有蜀漆散治牝瘧故不載此方
