body:
  text: 卷二十一婦人產後十一章婦人產後血室空洞陰虛之病固多而溫氣亡泄陽虛之病亦自不少產後三病痙冒便難皆陰虛而兼陽弱者也至於胃實腹痛血瘀惡露未嘗不用瀉下此以物聚而成實耳若非陳宿凝聚不得實也故產後之病切以中氣為主蓋血亡木枯乃中氣克傷之本徒知木燥而不知土虛非良工矣產後一三病十一問曰新產婦人有三病一者病痙二者病鬱冒三者大便難何謂也師曰新產血虛多汗出喜中風故令病痙亡血復汗寒多故令鬱冒亡津液胃燥故大便難新產血虛多汗易感風邪風閉皮毛血虛筋燥經脈攣縮故令病痙亡血復汗陽泄汗多木遏陽陷不能外發陰邪閉束清氣幽埋故令神昏而鬱冒汗亡津液腸胃乾燥故竅澀而便難此新產婦人之三病也產後二鬱冒十二產婦鬱冒其脈微弱嘔不能食大便反堅但頭出汗所以然者血虛而厥厥而必冒冒家欲解必大汗出以血虛下厥孤陽上出故頭汗出所以產婦喜汗出者亡陰血虛陽氣獨盛故當汗出陰陽乃復大便堅嘔不能食小柴胡湯主之方在嘔吐產婦陽陷而病鬱冒溫氣亡泄故其脈微弱胃氣上逆故嘔不能食血脫腸燥故大便反堅陽不歸根故頭上汗出所以然者血性溫暖而胎君火血脫則溫氣亡瀉寒盛而發厥逆厥則木遏陽陷必生鬱冒冒家欲解陽氣外達必大汗出以其發於群陰之中透圍而出故作大汗也血虛下厥孤陽不歸泄而失藏故頭上汗出蓋陰中之陽下陷則病鬱冒陽中之陽上逆則見頭汗也所以產婦喜汗出者以其亡陰血虛陽不歸根獨盛於上蒸泄皮毛故當汗出陽隨汗泄與陰氣相平陰陽之顛倒而反常者乃復其本位也其大便堅硬嘔不能食者膽胃上逆飲食不下宜小柴胡湯柴芩半夏清膽火而降胃逆薑甘參棗補脾陽而滋肝血也產後三胃實發熱十三病解能食七八日更發熱者此為胃實大承氣湯主之方在痙病鬱冒病解嘔止能食七八日後更發熱者此產後陽虛飲食不消宿谷壅阻陽格於外而發熱也病本為虛而宿食停留則為胃實大承氣下其宿食則陽秘而熱止矣產後四腹痛十四產後腹中㽲痛當歸生薑羊肉湯主之方在寒疝並治腹中寒疝虛勞不足產後陽亡土濕血虛木燥濕土遏陷風木不達郁迫擊沖則病腹痛當歸生薑羊肉湯當歸滋風木而潤燥生薑羊肉溫肝脾而行郁治腹痛血枯之良法亦寒疝虛勞之善方也產後五腹痛煩滿十五產後腹痛煩滿不得臥枳實芍藥散主之產後腹痛煩躁脹滿不得眠臥是木燥而剋土土鬱而氣滯也枳實芍藥散瀉土鬱而清木燥也枳實芍藥散百六十枳實燒令黑勿太過芍藥等分上二味杵為散服方寸匕日三服並主癰膿以麥粥下之產後六瘀血十六師曰產婦腹痛法當以枳實芍藥散假令不愈者此為腹中有瘀血著臍下宜下瘀血湯主之產婦腹痛法當以枳實芍藥散雙瀉土木之郁假令不愈者此為腹中有瘀血著於臍下肝氣鬱阻而為痛也宜下瘀血湯桃仁蟅蟲破其瘀血大黃下其症塊也下瘀血湯百六十一大黃三兩桃仁二十枚蟅蟲二十枚去足上三味末之煉蜜和為四丸以酒一升煎一丸取八合頓服之瘀血下如豚肝亦主經水不利產後七惡露不盡十七產後七八日無太陽證少腹堅痛此惡露不盡不大便煩躁發熱切脈微實再倍發熱日晡時煩躁者不食食則譫語至夜即愈宜大承氣湯主之熱在裡結在膀胱也產後七八日無太陽表證但覺少腹堅痛此惡露之不盡也其證不大便煩躁而發熱若切其脈或覺微實再患加倍發熱日晡時益以煩躁者此陽明之腑熱胃氣鬱滿必當不食食則中氣愈郁燥熱逆沖而作譫語至夜而陽消陰長則愈是宜大承氣湯瀉其腑熱以其熱在胃裡結在膀胱之腑也蓋胃腸內實燥土剋水病及膀胱膀胱燥結肝木失滋故血道瘀澀惡露不行木氣遏陷少腹堅痛也大承氣瀉陽明之熱故膀胱清而惡露下若有太陽表證太陽者膀胱之經是宜解表之後用桃核承氣抵當湯丸以下瘀血此無太陽證全是陽明之累及膀胱故但清陽明膀胱自愈也產後八中風十八產後中風續續數十日不解頭微疼惡寒時時有熱心下悶乾嘔汗出雖久陽旦證續在耳可與陽旦湯即桂枝湯方在下利產後太陽中風續續數十日不解頭痛惡寒時時有熱心下壅悶乾嘔汗出此皆太陽中風之證日期雖久太陽之陽旦證續在耳可與陽旦湯以解其表陽旦湯即桂枝湯傷寒太陽篇傷寒脈浮自汗出反與桂枝湯欲攻其表此誤也問曰證象陽旦按法治之而增劇答曰病證象桂枝是陽旦即桂枝義甚明白喻嘉言無知妄作乃有桂枝加黃芩之論又造陰旦之方庸愚狂繆何至於此產後九中風發熱十九產後中風發熱面正赤喘而頭痛竹葉湯主之產後中風發熱面色正赤喘而頭痛此陽虛土敗水泛胃逆肺氣壅滿陽郁頭面而不降也竹葉湯竹葉桔梗涼肺而下氣生薑葛根清胃而降逆附子溫寒而暖水桂防燥濕而達木甘棗人參補中而培土也蓋產後中氣虛弱一感風邪郁其裡氣脾肝下陷而生寒胃膽上逆而生熱其發熱面赤喘促頭痛皆陽逆上熱之證即其胃逆而上熱知其脾陷而下寒非寒水下旺君相之火不得格鬱而不降也竹葉湯百六十二竹葉一把葛根三兩桔梗一兩生薑五兩附子一枚炮桂枝一兩防風一兩人參一兩甘草一兩大棗十五枚上十味以水一斗煮取二升半分溫三服溫覆使汗出頭項強用大附子一枚破之如豆大入前藥揚去沫嘔者加半夏半升洗產後十中虛煩嘔二十婦人乳中虛煩亂嘔逆安中益氣竹皮大丸主之婦人乳子中氣虛弱胃土不降相火上炎而生煩亂濁氣熏沖而作嘔逆宜安中益氣竹皮大丸竹茹石膏止嘔而清煩甘草桂枝補中而下衝白薇涼金而退熱也竹皮大丸百六十三生竹茹二分石膏二分桂枝一分甘草七分白薇一分上五味末之棗肉和丸彈子大以飲服一丸日三夜二服有熱倍白薇煩喘者加柏實一分產後十一下利二十一產後下利虛極白頭翁加甘草阿膠湯主之產後陽衰土濕木鬱生熱風木疏泄而病下利亡血之後復苦泄利虛憊極矣宜白頭翁湯清其濕熱加甘草以培中氣阿膠以滋風木也白頭翁加甘草阿膠湯百六十四白頭翁三兩黃連三兩黃柏三兩秦皮三兩甘草二兩阿膠二兩上六味以水七升煮取二升半內膠令消盡分溫三服附方千金三物黃芩湯十三治婦人在草蓐自發露得風四肢苦煩熱頭痛者與小柴胡湯頭不痛但煩者此湯主之黃芩一兩苦參二兩乾地黃四兩上三味以水六升煮取三升溫服一升多吐下蟲千金內補當歸建中湯十四治婦人產後虛羸不足腹中刺痛不止吸吸少氣或苦少腹中急痛引腰背不能飲食產後一月日得服四五劑為善令人強壯當歸四兩桂枝三兩芍藥六兩甘草二兩大棗十二枚生薑三兩上六味以水一斗煮取三升溫分三服一日令盡若大虛加飴糖六兩湯成內之於火上暖令飴消若去血過多崩傷內衄不止加地黃六兩阿膠二兩合八味湯成內阿膠若無當歸以芎藭代之若無生薑以乾薑代之
