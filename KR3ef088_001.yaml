body:
  text: 卷一臟腑經絡十六章臟腑經絡隱不可見然有其外著者焉若聲臭色脈若寒熱痛癢若喜怒愛憎若便溺飲食是皆可即顯以知微者但粗工不解耳先師張仲景究天人之際通神明之德於臟腑經絡之內示望聞問切之法是亦長桑見物之神丹太真燭怪之靈犀也古聖賢四診玄機悉在於此此論不可不熟也呂覽語臟腑經絡一問曰上工治未病何也師曰夫治未病者見肝之病知肝傳脾當先實脾四季脾王不受邪即勿補之中工不曉相傳見肝之病不解實脾惟治肝也餘臟準此五行生剋肝木剋土脾土剋水腎水剋火心火剋金肺金剋木克其所勝故以病傳之見肝之病知脾土被賊先實其脾是謂未病而早醫土旺四季其時脾不受邪即勿補之中工未曉相傳之義見肝之病不解實脾惟治肝也是以肝病未已脾病復起餘臟準此類推此引難經文臟腑經絡二問曰病有急當救里救表者何謂也師曰病醫下之續得下利清穀不止身體疼痛者急當救里後身體疼痛清便自調者急當救表也此段見傷寒太陽篇而語稍不同傷寒表病醫誤下之瀉其脾陽續得下利清穀不止而身體疼痛表證猶在者表裡俱病然急當救里救里之後身體疼痛表證未解清便自調里證已愈然後急當救表也臟腑經絡三夫病痼疾加以卒病當先治其卒病後乃治其痼疾也病有新舊治有先後此定法也臟腑經絡四問曰經云厥陽獨行何謂也師曰此為有陽無陰故稱厥陽陽性上行有陰以吸之則升極而降陰性下行有陽以煦之則降極而升有陽無陰則陽有升而無降獨行於上故稱厥陽臟腑經絡五問曰陽病十八何謂也師曰頭痛項腰脊臂腳掣痛陰病十八何謂也師曰咳嗽上氣喘噦咽痛腸鳴脹滿心痛拘急五臟病各有十八合為九十病人又有六微微有十八病合為一百八病五勞七傷六極婦人三十六病不在其中清邪居上濁邪居下大邪中表小邪中里䅽飥之邪從口入者宿食也五邪中人各有法度風中於前寒中於暮濕傷於下霧傷於上風令脈浮寒令脈急霧傷皮腠濕流關節食傷脾胃極寒傷經極熱傷絡䅽與馨同經絡在外為陽頭項腰脊臂腳六者掣痛是謂陽經之六病陽有三陽太陽陽明少陽三經一經六病三六十八此陽病之十八也五臟在內為陰咳嗽上氣喘促噦逆咽痛腸鳴脹滿心痛拘急是為陰臟之六病陰有三陰太陰少陰厥陰三經一經六病三六十八此陰病之十八也五臟之病非第各有十八一臟之病虛則六氣乘我實則我乘六氣合之本氣自病亦有六條是為三六十八五臟病各有十八合為九十病也人又有六微難經心脈急甚者肝邪干心也心脈微急者膽邪干小腸也凡臟邪則甚腑邪則微故六腑之病謂之六微一腑之病虛則六氣乘我實則我乘六氣合之本氣自病亦有六條是為三六十八六腑病各有十八合為一百八病也此三陽三陰五臟六腑之中於五邪虛實相乘之大數也五勞五臟之勞病六極六腑之極病七傷飲食憂勞飢飽房室經絡營衛氣血之損傷五勞七傷解見虛勞婦人三十六病解見婦人妊娠産後虛勞皆本內傷不關外邪故另當別論不在其中五邪維何清邪居於上濁邪居於下大邪中於表小邪中於里䅽飥之邪從口入者宿食也是謂五邪五邪中人各有一定之法度風為大邪中於身前多得之日早寒為小邪中於身後多得之日暮濕為濁邪傷於下焦霧為清邪傷於上部此五邪中人之部位也風則令脈浮虛是謂大邪之中表寒則令脈緊急是謂小邪之中里霧則傷其皮腠居於上而中於表濕則流於關節居於下而中於里食則傷其脾胃入於口而中於中此五邪中人之處所也邪雖有五不過寒熱二者而已五邪中人總之極寒則內傷於經極熱則外傷於絡也臟腑經絡六問曰病人有氣色見於面部願聞其説師曰鼻頭色青腹中痛苦冷者死鼻頭色微黑者有水氣色黃者胸上有寒色白者亡血也設微赤非時者死其目正圓者痙不治又色青為痛色黑為勞色赤為風色黃者便難色鮮明者有留飲靈樞五閲五使脈出於氣口色見於明堂靈樞五色明堂者鼻也青為木色鼻頭色青是木邪剋土當腹中痛若腹裡苦冷者則水寒木枯土敗火熄於法當死黑為水色鼻頭色微黑者必有水氣黃為土色鼻雖土位而實竅於肺肺位在胸色黃者土冷胃逆傳於肺部法應胸上有寒也白為金色木藏血而主色色白者血亡木枯而金氣乘之故白而不華傷寒脈法所謂面白脫色也設色見微赤而非其應見之時者則死蓋亡血之家緣於土敗胃逆肺金失斂又見赤色則火不歸水逆刑肺金而吐衄之病無有止期是其中氣崩潰陽根下斷必主死也足太陽之脈起於目之內眥上巔下項而行身後素問診要經終論太陽之脈其終也戴眼反折瘈瘲瘈急瘲緩痙者頸項強急脊背反折緣太陽之脈屈而不伸也筋脈急縮上引目系開而不闔故其目正圓直視不瞬此太陽之脈終故不治也又青為木色木枯當衝擊而為痛黑為水色水寒則虛損而為勞黃為土色土濕則鬱結而便難鮮明為留飲之色留飲在中故鮮明而不黯淡也此望而知之之法也臟腑經絡七師曰病人語聲寂寂然喜驚呼者骨節間病語聲喑喑然不徹者心膈間病語聲啾啾然細而長者頭中病素問金匱真言論東方青色入通於肝其病發驚駭陰陽應象論在體為筋在臟為肝在聲為呼五臟生成論諸筋者皆屬於節語聲寂寂然喜忽然驚呼者肝之聲也肝主筋而筋會於節故為骨節間病肺主聲位在心膈之上語聲喑喑然不徹者此心膈間病肺氣不清故聲音不亮也頭痛者響震則頭鳴而痛劇故語聲啾啾細長此頭中之病不敢高聲語也此聞而知之之法也臟腑經絡八師曰息搖肩者心中堅息引胸中上氣者咳息張口短氣者肺痿唾沫喘息搖肩者心中堅滿氣無降路故逆沖而肩搖也息引胸中上氣者氣逆必生咳嗽也息張口短氣者肺痿而胸滿清氣堙塞常生唾沫也此亦聞而知之之法也臟腑經絡九師曰吸而微數此病在中焦實也當下之則愈虛者不治在上焦者其吸促在下焦者其吸遠此皆難治呼吸動搖振振者不治吸氣微數此中焦盛實肺氣不降下之腑清而氣降則愈矣若中虛而吸數此氣敗而根絶法為不治氣逆於上焦者其吸促氣陷於下焦者其吸遠此皆中氣之敗也升降失職最難治也呼吸動搖振振者真氣拔根脫亡不久此不治也此亦聞而知之之法也臟腑經絡十師曰五臟病各有所得者愈五臟病各有所惡各隨其所不喜者為病病者素不應食而反暴思之必發熱也五臟病各有所得者愈如肝虛得春而愈心虛得夏而愈燥盛得濕而愈濕盛得燥而愈也五臟之病各有所惡惡則不喜本其所惡而反得之則隨其所不喜而為病如病者素不應食是食為所惡而反暴思之是必臟腑之發熱也此問而知之之法也臟腑經絡十一夫諸病在臟欲攻之當隨其所得而攻之如渴者與豬苓湯方在消渴余皆仿此諸病在臟欲攻下之當隨其所應得而攻之如渴者是內有濕邪格其君相之火上爍肺津應得豬苓湯則按法與之也余皆仿此此亦問而知之之法也臟腑經絡十二師曰寸口脈動者因其王時而動假令肝王色青四時各隨其色肝色青而反色白非其時色脈皆當病寸口脈動者因其旺時而動如木旺於春則肝脈動火旺於夏則心脈動金旺於秋則肺脈動水旺於冬則腎脈動土旺於四季則脾脈動也動者一氣獨旺鼓動而有力也脈既應時色亦應脈四時各隨其色假令肝旺則色應青而反色白是木衰而金賊也凡色不應脈皆當病也此望而知之切而知之之法也臟腑經絡十三問曰有未至而至有至而不至有至而不去有至而太過何謂也師曰冬至之後甲子夜半少陽起少陽之時陽始生天氣溫和以未得甲子天因溫和此為未至而至也以得甲子而天未溫和此為至而不至也以得甲子而天大寒不解此為至而不去也以得甲子而天溫如盛夏五六月時此為至而太過也難經冬至後得甲子少陽旺復得甲子陽明旺復得甲子太陽旺復得甲子太陰旺復得甲子少陰旺復得甲子厥陰旺旺各六十日六六三百六十日以成一歲此天人之所同也五行之序成功者退將來者進冬至之後甲子之日夜半之時少陽初起少陽之時一陽始生天氣漸向溫和節候之正也以未得甲子而天因溫和來氣太早此為未應至而已至也以得甲子而天未溫和來氣太遲此為應至而不至也以既得甲子而天大寒不能解此為已至而不去也以方得甲子而天溫如盛夏五六月時此為應至而太過也此天氣之不正天人同氣人之六氣隨天之六氣而遞遷難經少陽之至乍大乍小乍短乍長陽明之至浮大而短太陽之至洪大而長太陰之至緊大而長少陰之至緊細而微厥陰之至沉短而敦人氣不正則脈不應時而太過不及之診見矣此亦切而知之之法也臟腑經絡十四師曰病人脈浮者在前其病在表浮者在後其病在裡腰痛背強不能行必短氣而極也寸在前主表尺在後主裡病人脈浮者在前其病在表浮者在後其病在裡表病則腰痛背強不能行足太陽行身之背挾脊抵腰而走足也里病則短氣而極手太陰肺主宗氣而行呼吸也前後俱浮則表裡兼病肺之臟與太陽之經氣逆而不降故也此亦切而知之之法臟腑經絡十五問曰寸口脈沉大而滑沉則為實滑則為氣實氣相摶血氣入臟即死入腑即愈此為卒厥何謂也師曰唇口青身冷為入臟即死如身和汗自出為入腑即愈寸口脈沉大而滑沉則為腎水之實滑則為肝木之氣此緣水寒木陷鬱而欲升故見沉滑實氣相摶必傷中焦血氣血氣傷深而入臟即死傷淺而入腑即愈此為卒然厥僕何以辨其入臟入腑或死或愈也蓋脾竅於口而主肌肉唇舌者肌肉之本也唇口青是土敗而木賊身冷是火敗而水旺此為臟陰之盛入臟即死也如身和汗出而不冷此為腑陽之盛入腑即愈也此亦切而知之之法臟腑經絡十六問曰脈脫入臟即死入腑即愈何謂也師曰非為一病百病皆然譬如浸淫瘡從口流向四肢者可治從四肢流來入口者不可治病在外者可治入里者即死脈脫者脈虛脫而不實也入臟者陰勝則死入腑者陽復則愈凡病在外者傷淺可治入里者傷深則死浸淫瘡解見瘡癰此亦切而知之之法所謂四診也夫人稟五常因風氣而生長風氣雖能生萬物亦能害萬物如水能浮舟亦能覆舟若五臟元真通暢人即安和客氣邪風中人多死千般疢難不越三條一者經絡受邪入臟腑為內所因也二者四肢九竅血脈相傳壅塞不通為外皮膚所中也三者房室金刃蟲獸所傷以此詳之病由都盡若人能慎養不令邪風乾忤經絡適中經絡未流傳腑臟即醫治之四肢才覺重滯即導引吐納針灸膏摩勿令九竅閉塞更能無犯王法禽獸災傷房室勿令竭乏服食節其冷熱苦辛酸甘不遺形體有衰病則無由入其腠理腠者是三焦通會元真之處為血氣所注理者是皮膚臟腑之紋理也黃氏無此條依要略本補之以待考焉
