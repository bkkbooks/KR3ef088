body:
  text: 卷十五內傷雜病肺痿肺癰咳嗽上氣十三章肺痿肺癰者咳嗽上氣之標咳嗽上氣者肺痿肺癰之本肺痿之病內亡津液而傷火燥肺癰之病外感風邪而傷濕熱溯其原委即咳嗽上氣之積漸而成者而咳嗽上氣之由來則因於胃氣之逆也故仲景諸方溫涼補瀉立法非一而總以中氣為主未有土死而金生者亦未有土生而金死者見子而顧母仲景諸方未嘗瀉金而敗土也蓋咳嗽痰喘悉緣中氣之敗後世庸工但知清金瀉火不知照顧中氣其下者復加以滋陰補水之藥中氣淪亡未有不死者虛勞咳嗽未必即死而最難逃者庸工之毒手橫覽夭枉惕目驚心天乎人乎可不解也肺痿肺癰五章肺痿一問曰熱在上焦者因咳為肺痿肺痿之病從何得之師曰或從汗出或從嘔吐或從消渴小便利數或從便難又被快藥下利重亡津液故得之曰寸口脈數其人咳口中反有濁唾涎沫者何師曰為肺痿之病若口中辟辟燥咳即胸中隱隱痛脈反滑數此為肺癰咳唾膿血脈數虛者為肺痿數實者為肺癰熱在上焦者因咳嗽而為肺痿肺痿之病由於津亡而金燥也溯其原來或從汗出而津亡於表或從嘔吐而津亡於裡或從消渴便數而津亡於前或從胃燥便難津液原虧又被快藥下利重亡津液而津亡於後故得之也寸脈虛數咳而口中反有濁唾涎沫者此為肺痿若口中辟辟乾燥咳即胸中隱隱作痛脈反滑數此為肺癰脈數而虛者為肺痿脈數而實者為肺癰肺痿因於燥熱故數虛而無膿肺癰因於濕熱故數實而有膿也蓋痿者痿軟而不振也人之所以精神爽健者肺氣清也肺熱而金爍則氣耗而體倦是以痿靡而廢弛也素問痿論肺主身之皮毛肺熱葉焦則皮毛虛弱急薄著則生痿躄也肺者臟之長也心之蓋也有所失亡所求不得則發肺鳴鳴則肺熱葉焦故曰五臟因肺熱葉焦發為痿躄此之謂也五臟各有痿而五臟之痿則以肺痿為根緣肺主氣而氣化津所以浸灌五臟五臟之氣皆受於肺氣耗而津枯五臟失滋是以痿也五臟之痿因於肺熱而肺熱之由則又原於陽明之燥故治痿獨取陽明陽明雖化氣於燥金而燥金實受氣於陽明以金生於土故也肺癰二問曰病咳逆脈之何以知其為肺癰當有血膿吐之則死其脈何類師曰寸口脈微而數微則為風數則為熱微則汗出數則惡寒風中於衛呼氣不入熱過於營吸而不出風傷皮毛熱傷血脈風舍於肺其人則咳口乾喘滿咽燥不渴多唾濁沫時時振寒熱之所過血為之凝滯蓄結癰膿吐如米粥始萌可救膿成則死寸口脈微而數微則為風泄於表數則為熱鬱於裡微為風泄則竅開而汗出數為熱鬱則陰束而惡寒風則傷衛風愈泄而衛愈閉呼氣不能入熱則傷營衛鬱閉而營莫泄吸氣不能出也出氣為呼風泄於外譬猶呼氣泄而不開是呼氣不入入氣為吸氣閉於內譬猶吸氣閉而不泄是吸氣不出風邪外傷其皮毛熱邪內傷其血脈風傷皮毛故風舍於肺皮毛閉塞肺氣壅阻則生咳嗽口乾喘滿咽燥不渴多吐濁沫時時振寒熱傷血脈故熱過於營血脈凝滯瘀蒸腐敗化為癰膿癰膿蓄結吐如米粥始萌可救膿成則死蓋肺癰之病因胸膈濕盛外感風邪肺氣壅遏濕鬱為熱表則寒熱兼作里則瘀濁淫蒸營血腐爛化而為膿久而肺臟潰敗是以死也肺痿三肺痿吐涎沫而不咳者其人不渴必遺尿小便數所以然者以上虛不能制下故也此為肺中冷必眩多涎唾甘草乾薑湯以溫之若服湯已渴者屬消渴肺痿之病金被火刑必咳而渴若但吐涎沫而不咳者則其人不渴必當遺尿而小便數所以然者以上虛不能制下氣不攝水故也此為肺中寒冷必頭目眩暈多吐涎唾以其肺胃寒滯陽不歸根是以發眩氣不四達是以多涎甘草乾薑湯甘草補中而培土乾薑溫肺而降逆也此肺痿之寒者甘草乾薑湯百十方見傷寒太陽甘草四兩乾薑二兩上㕮咀以水三升煮取一升五合去滓分溫再服原方闕載取傷寒補肺癰四咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者為肺癰桔梗湯主之咳而胸滿振寒者肺氣鬱阻陽為陰閉也脈數者肺氣不降金被火刑也咽乾不渴者咽燥而肺濕也時出濁唾腥臭者肺金味辛而氣腥痰涎瘀濁鬱蒸而腐化也久而癰膿上吐形如米粥此為肺癰桔梗湯桔梗行瘀而排膿甘草泄熱而保中也桔梗湯百十一方見傷寒少陰桔梗一兩甘草二兩上二味以水三升煮取一升分溫再服則吐膿血也肺癰五肺癰喘不得臥葶藶大棗瀉肺湯主之肺癰喘不得臥肺鬱而氣逆也此緣土虛濕旺濁氣痞塞腐敗瘀蒸肺無降路葶藶大棗瀉肺湯大棗補脾精而保中氣葶藶破肺塞而排膿穢也葶藶大棗瀉肺湯百十二葶藶熬令黃色搗丸如彈子大大棗十二枚上先以水三升煮棗取二升去棗內葶藶煮取一升頓服咳嗽上氣八章咳嗽上氣六上氣喘而躁者為肺脹欲作風水發汗則愈咳嗽上氣喘而躁煩者此為肺脹而氣阻也氣為水母此欲作風水以風中皮毛遏閉肺氣不能調水道而輸膀胱也素問五臟生成論咳嗽上氣厥在胸中過在手陽明太陰手陽明升則化氣手太陰降則化水咳嗽上氣辛金不降無以行水欲作風水之兆也發汗以瀉其皮毛而消肺脹則愈矣咳嗽上氣七上氣面浮腫肩息其脈浮大不治又加利尤甚咳嗽上氣壅於頭面是以浮腫喘息肩搖是謂肩息其脈浮大者陽根下絕此為不治又加下利中氣敗泄尤為甚也咳嗽上氣八咳而上氣此為肺脹其人喘目如脫狀脈浮大者越婢加半夏湯主之咳而上氣此為肺氣脹滿其人喘阻肺氣上衝目如脫狀脈浮大者是表邪外束而裡氣上逆也越婢加半夏湯薑甘大棗培土而和中石膏麻黃清金而發表半夏降逆而下衝也越婢加半夏湯百十三麻黃六兩石膏半斤甘草二兩大棗十五枚生薑三兩半夏半升上六味以水六升先煮麻黃去上沫內諸藥煮取三升分溫三服咳嗽上氣九肺脹咳而上氣煩躁而喘脈浮者心下有水小青龍加石膏湯主之肺脹咳而上氣煩躁而喘脈浮者此心下有水阻格金火降路氣阻而發喘咳肺熱而生煩躁也小青龍加石膏湯甘草麻桂補中氣而瀉營衛芍藥半夏清膽火而降胃逆薑辛五味下衝氣而止咳喘石膏涼肺蒸而除煩躁也積水化汗而外泄諸證自愈矣小青龍加石膏湯百十四麻黃三兩桂枝三兩甘草三兩芍藥三兩半夏半升細辛三兩乾薑三兩五味半升石膏二兩上九味以水一斗先煮麻黃去上沫內諸藥煮取三升強人服一升羸者減之日三服小兒服四合咳嗽上氣十咳而脈浮者厚朴麻黃湯主之咳而脈沉者澤漆湯主之咳而脈浮者其病在上是表邪外束裡氣上逆肺金鬱格而不降也厚朴麻黃湯麻黃髮表而散寒石膏小麥清金而潤燥樸杏薑辛半夏五味破壅而降逆也咳而脈沉者其病在下是水邪上泛相火壅阻肺金傷克而不歸也澤漆湯人參甘草補中而培土生薑半夏降逆而驅濁紫參白前清金而破壅桂枝黃芩疏木而瀉火澤漆決瘀而瀉水也脈法浮為在表表有寒邪故用麻黃厚朴麻黃湯百十五厚朴五兩杏仁半升半夏半升乾薑二兩細辛二兩五味半升石膏如雞子大小麥一升麻黃四兩上九味以水一斗二升先煮小麥熟去滓內諸藥煮取三升溫服一升日三服澤漆湯百十六澤漆一升以東流水五斗煮取一斗五升人參三兩甘草三兩生薑五兩半夏半升白前五兩紫參五兩桂枝三兩黃芩三兩上九味㕮咀內澤漆汁中煮取五升溫服五合至夜盡咳嗽上氣十一咳而上氣喉中水雞聲射干麻黃湯主之風寒外閉肺氣鬱阻逆沖咽喉瀉之不及以致呼吸堵塞聲如水雞此緣陽衰土濕中氣不運一感外邪裡氣愈郁胃土上逆肺無降路而皮毛既闔不得外泄是以逆行上竅沖塞如此射干麻黃湯射干紫菀款冬五味細辛生薑半夏下衝逆而破壅塞大棗補土而養脾精麻黃髮汗而瀉表寒也此即傷風齁喘之證射干麻黃湯百十七射干十二枚紫菀三兩款冬三兩五味半升細辛三兩生薑四兩半夏半升大棗七枚麻黃四兩上九味以水一斗二升先煮麻黃兩沸去上沫內諸藥煮取三升分溫三服咳嗽上氣十二火逆上氣咽喉不利止逆下氣者麥門冬湯主之土虛胃逆相火莫降刑剋辛金肺氣逆沖上竅壅塞故火逆上氣咽喉不利麥門冬湯甘棗參粳補中而化氣麥冬半夏清金而降逆也麥門冬湯百十八麥門冬七升半夏一升人參二兩甘草二兩粳米三合大棗十二枚上六味以水一斗二升煮取六升溫服一升日三夜一服咳嗽上氣十三咳逆上氣時時唾濁但坐不得眠皂莢丸主之咳逆上氣時時唾濁但能坐而不得眠此肺氣之壅閉也皂莢丸利氣而破壅故能主之皂莢丸百十九皂莢八兩刮去皮用酥炙上一味末之蜜丸梧子大以棗膏和藥服三丸日三夜一服附方千金生薑甘草湯八治肺痿咳唾涎沫不止咽燥而渴生薑五兩甘草四兩人參三兩大棗十五枚上四味以水七升煮取三升分溫三服千金炙甘草湯九方見傷寒少陽治肺痿涎唾多心中溫溫液液者方在虛勞外臺桔梗白散十方見傷寒太陽治咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者為肺癰桔梗三分貝母三分巴豆一分去皮熬研如脂上三味為散強人飲服半錢匕羸者減之病在膈上者吐膿在膈下者瀉出若下多不止飲冷水一杯即定肺癰胸脹滿一身面目浮腫鼻塞清涕出不聞香臭酸辛咳逆上氣喘鳴迫塞葶藶大棗瀉肺湯主之此條系黃氏所缺依要略本補之
