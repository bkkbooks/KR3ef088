body:
  text: 卷八內傷雜病驚悸吐衄下血瘀血十八章驚悸吐衄下血瘀血病雖不一而原則無二驚悸之家風木鬱動營血失斂往往上溢而下泄不溢不泄則蓄結而內瘀內瘀不去久成痃癖痃癖漸大多至殞命而亡身故瘀血之病由於吐衄吐衄之病根於驚悸驚悸之病起於虛勞虛勞之病根於中氣之敗蓋水寒土濕不能榮木肝膽動搖必生驚悸驚悸既作風木疏泄擾而不靜經絡堙郁凝而不流以既凝之血而得疏泄之令未有不吐衄而便瀉者也吐下不行勢必積聚而為瘀血瘀血一成是為心腹之疾事如養虎矣驚悸吐衄之法全以中氣為主溫養保固不可涼瀉及成瘀血不得不下但以下之後病去而人不殞亡人存而年不夭折則善之善矣驚悸四章驚悸一寸口脈動而弱動則為驚弱則為悸傷寒脈法陰陽相搏名曰動陽動則汗出陰動則發熱若數脈見於關上上下無頭尾如豆大厥厥動搖者名曰動也動者動蕩而不寧弱者濡弱而不暢也蓋胃土不降濁陰升塞膽木不得下根則浮蕩而為動動即虛飄而驚生肝木不得上達則抑鬱而為弱弱即振搖而悸作而總緣土氣之濕濕則中氣堙塞而木鬱故也是以虛勞之家中氣羸困升降失職肝膽不榮無不有驚悸之證驚悸之人營血瘀蓄風火鼓扇往往有吐衄之條仲景列驚悸於虛勞之後吐衄之先蓋虛勞驚悸吐衄之病實一本而同源者也後世不解以為陰虛反以清涼滋潤之藥斃其性命庸工代起述作相承億萬生靈胥罹其禍愚妄之罪罄竹難書矣驚悸二師曰病有奔豚有吐膿有驚怖有火邪此四部病皆從驚發得之奔豚者肝木之邪陽亡土敗水寒木鬱風動根搖奔衝心肺是謂奔豚言其勢如奔豚也吐膿者驚悸之家氣動血撓離經郁蓄湧溢陽竅是為吐衄不經吐衄郁礙陽氣陽鬱熱發淫蒸腐化隨吐而上是謂吐膿驚怖者水寒土濕胃氣不降膽木失根神魂振惕是謂驚怖火邪者火劫發汗陽敗驚生迷亂昏狂臥起不安是謂火邪此四部之病異派同源悉屬肝膽肝膽主驚皆由木氣受傷驚發於肝膽而得之也驚悸三火邪者桂枝去芍藥加蜀漆龍骨牡蠣救逆湯主之傷寒太陽篇傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆龍骨牡蠣救逆湯主之火邪者以火劫發汗而中火邪也傷寒太陽病以火熏之不得汗其人必躁到經不解必清血名為火邪汗多亡陽土敗胃逆君相飛騰神魂浮蕩是以驚生濁陰上逆化生痰涎迷塞心宮是以狂作桂枝去芍藥加蜀漆龍骨牡蠣救逆湯蜀漆吐腐敗而療狂龍骨牡蠣斂神魂而止驚去芍藥者以其酸寒而瀉陽氣也桂枝去芍藥加蜀漆龍骨牡蠣救逆湯三十九方見傷寒太陽桂枝三兩去皮甘草二兩炙生薑三兩大棗十二枚蜀漆三兩洗去腥龍骨四兩牡蠣五兩熬上為末以水一斗二升先煮蜀漆減二升內諸藥煮取三升去滓溫服一升驚悸四心下悸者半夏麻黃丸主之陽衰土濕升降失政冒土上逆心下鬱塞礙厥陰升路風木上行不得順達鬱勃鼓蕩是以心下悸動半夏麻黃丸半夏降胃逆而驅濁陰麻黃瀉堙塞而開徑路也驚悸之證土濕胃逆陽氣升泄神魂失藏多不能寐靈樞邪客衛氣獨衛其外行於陽不得入於陰行於陽則陽氣盛不得入於陰陰虛故目不瞑飲以半夏湯一劑陰陽已通其臥立致正此義也內傷外感驚悸之證皆少陽之陽虛土敗胃逆膽木失根故也惟少陽傷寒小建中炙甘草二證是少陽之陽旺者足少陽化氣於相火汗下傷中陽亡土敗甲木拔根相火升炎故以生地芍藥瀉其相火此在內傷必是火敗以傷寒表邪郁其相火是以火旺也然火自旺而土自虛非表裡陽盛者小建中炙甘草皆培土而瀉火除此無陽旺之驚悸矣後世庸工歸脾加減天王補心之方滋陰瀉陽誤盡天下蒼生至今海內宗之加以俗子表章其禍愈烈此關天地殺運非一人之力所能挽也半夏麻黃丸四十半夏麻黃等分上二味末之煉蜜和丸小豆大飲服三丸日三服吐衄下血瘀血十四章吐衄下血一寸口脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相摶此名曰革婦人則半産漏下男子則亡血此段見虛勞中亡血之病無不由於虛寒虛寒之原無不由於中氣之敗其亡於吐衄非無上熱上熱者火烈金燔而不降其中下則虛寒也其亡於便溺非無下熱下熱者水冷木鬱而不升其中上則虛寒也中氣者升降水火之樞軸樞軸不轉則火浮而水沉此亡血之原也中氣虛寒陽明不降而辛金逆郁為上熱而沸湧太陰不升而乙木陷郁為下熱而注泄外證以弦大之脈毫不露虛寒之形此所以後世方書專事清涼千手雷同萬不一生也不知弦則為減減則為寒大則為芤芤則為虛於弦大之中而得虛寒之義則金逆於上而寸大者上熱而非下熱也木陷於下而尺弦者下熱而非上熱也吐衄下血二病人面無色無寒熱脈沉弦者衄煩咳者必吐血浮弱手按之絶者下血肝藏血而主色面無色者血鬱欲脫而不外華也無寒熱者病系內傷無外感表證也腎脈沉肝脈弦脈沉而弦者水寒不能生木木鬱於水而不升也腎肝之陰沉實於下不能上吸陽氣金逆而不降故血外溢而上衄加以煩躁咳嗽肺胃沖逆必吐血也心肺之脈俱浮浮弱而手按之絶者金火雙敗不能歸根陽氣升泄而不降也心肺之陽浮虛於上不能下呼陰氣木陷而不升故血內溢而下泄血之在下則藏於木血之在上則斂於金而總統於土靈樞中焦受氣取汁變化而赤是謂血其亡於吐衄者陽明之不降也脫於便溺者太陰之不升也太陰陽明之不治中氣之敗也衄血三師曰尺脈浮目睛暈黃衄未止暈黃去目睛慧了知衄今止金性收斂木性疏泄衄血之病木善泄而金不斂也其原總由於土濕土濕而陽明不降則辛金上逆而失其收斂太陰不升則乙木下陷而行其疏泄木生於水尺脈浮者木陷於水郁動而欲升也肝竅於目目睛暈黃者土濕而木鬱也肝主五色入脾為黃難經語木鬱而剋土黃為土色土敗故色隨木現暈者日外雲氣圍繞如環白睛肺氣所結手太陰從濕土化氣濕氣上淫溢於辛金之位故白睛黃氣如日外之環暈遮蔽陽光黯淡不清濕氣堙郁肺金失其降斂之性是以病衄暈黃既去雲霧消而天光現故目睛慧了此其濕邪已退木達風清金斂政肅是以衄止也衄血四又曰從春至夏衄者太陽從秋至冬衄者陽明衄者陽經之病靈樞百病始生卒然多食飲則腸滿起居不節用力過度則絡脈傷陽絡傷則血外溢血外溢則衄血陰絡傷則血內溢血內溢則後血陽絡者陽經之絡即太陽陽明之絡也少陽半表半裡陰陽相平故無衄證傷寒衄證獨在陽明太陽二經素問陰陽離合論太陽為開陽明為闔開主表中之表故春夏之衄屬之太陽闔主表中之裡故秋冬之衄屬之陽明衄血五衄家不可發汗汗出必額上陷脈緊急直視不能眴不得眠此段在傷寒不可汗中汗下忌宜篇衄家營血上流陽氣升泄汗之陽亡必額上塌陷經脈緊急目睛直視不能眴轉不得眠睡血所以灌經脈而滋筋膜素問五臟生成論諸脈者皆屬於目肝受血而能視血隨汗亡筋脈枯燥故脈緊直視不能運轉陽氣潛藏則善寐陽根泄露而不藏故不得眠精血陰也而內含陽氣失精亡血之病人知精血不失亡而不知其所以泄者陰中之陽氣也是以失精亡血之家脾腎寒濕飲食不化者陰中之陽氣敗也氣所以熏膚而充身額上塌陷者陽分之氣脫也吐衄六亡血家不可發其表汗出即寒栗而振此段見傷寒不可汗中汗釀於血而醞於氣亡血家血亡氣泄汗之再泄其氣陽亡火敗故寒栗而振搖經所謂奪血者勿汗也氣陽也而其涼肅而降斂者精血滋生之本也血陰也而其溫暖而升發者神氣化育之原也故氣降則水生血升則火化水盛則寒而寒胎於肺氣之涼火旺則熱而熱胎於肝血之溫亡血之家名為亡陰而實則亡陽以亡其血中之溫氣也再發其表血愈泄而陽愈亡是以寒栗而振也吐血七夫吐血咳逆上氣其脈數而有熱不得臥者死吐血咳逆上氣肺金之逆也其脈數而身熱躁煩而不臥則土敗陽亡拔根而外泄無復歸宿之望是以死也吐血之死死於中氣困敗陽泄而根斷也後世庸工以為陰虛火旺而用清潤其書連屋而充棟其人比肩而接踵遂使千古失血之家盡死其手此是幾許痛苦隋書語不可説也吐血八夫酒客咳者必致吐血此因極飲過度所致也酒之為性善生上熱而動下濕酒客咳者濕盛胃逆而肺氣不降也咳而不已收令失政必致吐血此因極飲過度濕滋土敗肺胃沖逆所致也人知酒為濕熱之媒不知酒後煩渴飲冷食涼久而脾陽傷敗必病濕寒庸工以為積熱傷陰最誤天下也瘀血九病人胸滿唇痿舌青口燥但欲漱水不欲咽無寒熱脈微大來遲腹不滿其人言我滿為有瘀血胸滿者胃逆而濁陰不降也脾竅於口其華在唇素問語唇痿者脾陷而下唇不舉也心竅於舌青為肝色舌青者木枯而火敗也口燥者肺津不升也但欲漱水不欲咽者口燥而腹濕也無寒熱者非表證也脈微大而來遲者里陽不居而表陽亦復不盛也腹不滿其人言我滿者陰凝而氣滯也此為內有瘀血蓋血以陰質而含陽氣溫則流行寒則凝結血之瘀而不行者臟陰盛而腑陽衰陽衰陰盛濕旺土鬱故胃逆而胸滿脾陷而唇痿肝主五色而司營血血行於脈而脈主於心血瘀而木鬱於脈故色見而青發於舌厥陰以風木之氣血瘀則木遏而風動風動而耗肺津是以口燥而漱水陰旺土濕是以漱水而不咽臟腑堙郁中氣莫運按之虛空而自覺壅塞是不滿而言滿也瘀血十病者如有熱狀煩滿口乾燥而渴其脈反無熱此為陰伏是瘀血也當下之如有熱狀者無熱而似熱也煩滿者丁火不降則心煩辛金不降則胸滿也口乾燥渴即上章之口燥而欲漱水也其脈反無熱者內原無火故脈不洪數也此為陰氣伏留營血瘀澀阻格陽氣逆而不降故見以上諸證是瘀血也法當下之下瘀血湯見婦人産後血之吐衄溲便必因先瘀而不行血已郁矣而不亡於吐衄則血瘀於上不亡於溲便則血瘀於下瘀而不去較之外亡者更重不得不下也凡驚悸吐衄瘀血往往相兼而見虛勞之家必有驚悸吐衄之條驚悸皆同而吐衄或不盡然不知吐衄不見則瘀血內凝矣始若抱卵終如懷子環臍結硬歲月增添此病一成未有長生者也男子猶少婦人最多初瘀失下後治頗難也吐衄十一心氣不足吐血衄血大黃黃連瀉心湯主之肺金不降相火失斂郁生上熱而病吐衄熱傷心氣故心氣不足大黃黃連瀉心湯瀉心火以救心氣火瀉而氣復則瀉亦成補亡血皆虛寒病此用三黃者經所謂急則治其標也大黃黃連瀉心湯四十一傷寒大黃黃連瀉心湯無黃芩大黃二兩黃連一兩黃芩一兩上三味以水三升煮取一升頓服之亦主霍亂吐血十二吐血不止者柏葉湯主之吐血不止者中寒胃逆而肺金失斂也柏葉湯乾薑溫中而降逆柏艾馬通斂肺而止血也柏葉湯四十二柏葉三兩乾薑三兩艾三把上三味以水五升取馬通汁一升合煮取一升分溫再服馬通即馬屎也下血十三下血先血後便此近血也赤小豆當歸散主之方在狐惑下血先血而後便者此近血在大便之下者也脾土濕陷肝氣抑遏木鬱風動疏泄失藏則便近血赤小豆當歸散小豆利水而燥濕土當歸養血而潤風木也下血十四下血先便後血此遠血也黃土湯主之下血先便而後血者此遠血在大便之上者也便血之證總緣土濕木遏風動而疏泄也其木氣沉陷而風泄於魄門則便近血其木氣鬱沖而風泄於腸胃則便遠血黃土湯黃土朮甘補中燥濕而止血膠地黃芩滋木清風而瀉熱附子暖水土以榮肝木也下血之家風木鬱遏未嘗不生燥熱仲景所以用膠地黃芩而風木鬱遏而生燥熱全由水土之濕寒仲景所以用朮甘附子蓋水土溫暖乙木榮暢萬無風動血亡之理風淫不作何至以和煦之氣改而為燥熱哉燥熱者水寒土濕生氣不遂乙木鬱怒而風動也後世醫書以為腸風專用涼血驅風之藥其命名立法荒陋不通至於脾腎濕寒之故則絲毫不知而一味涼瀉何其不安於下愚而敢於妄作耶黃土湯四十三灶中黃土半斤甘草三兩白朮三兩附子三兩炮阿膠三兩地黃三兩黃芩三兩上七味以水八升煮取三升分溫三服亦主吐衄
