body:
  text: 卷十內傷雜病水氣三十二章水氣之病陽衰土濕氣鬱而水泛者也或內停於臟腑或外溢於經絡內則有氣血之分外則有風濕之辨風濕之清濁不同氣血之上下異位上下之界以腰為準腰上為陽是謂氣分腰下為陰是謂血分氣分之病發其汗孔血分之病利其水道而上下疏通總以保中為主中氣輪轉血溫而升則汗出氣清而降則便通蓋水病不離氣氣病不離水氣水一物以上下而異名耳中焦氣水之交所以降氣化水升水化氣之原也未有中氣不敗而氣水獨病於上下者治水氣之病而敗中氣則人亡矣後世庸工加減八味之法輕者偶服可愈重病而久服之以濕土而得地黃未有不死者俗子見其偶效以為良方誤人甚多八味之方制於仲景使其可以治水仲景何以不用而待下士加減乎水氣一師曰病有風水有皮水有正水有石水有黃汗風水者水之閉於風邪皮水者水之溢於皮膚正水者水之正病於肺腎石水者水之凝結於腎臟黃汗者水之內入於汗孔者也水氣二風水其脈自浮外證骨節疼痛惡風皮水其脈亦浮外證胕腫按之沒指不惡風其腹如鼓不渴當發其汗正水其脈沉遲外證自喘石水其脈自沉外證腹滿不喘黃汁其脈沉遲身發熱胸滿四肢頭面腫久不愈必致癰膿風水者風鬱其水也素問水熱穴論勇而勞甚則腎汗出腎汗出逢於風內不得入於臟腑外不得越於皮膚客於玄府行於皮里傳為胕腫本之於腎名曰風水所謂玄府者汗孔也風襲皮毛故其脈自浮濕流關節故骨節疼痛病因風得是以惡風皮水者水之溢於皮膚外與風水同處其脈亦浮水氣泛溢營衛郁阻故皮肉胕腫按之沒指不因風得故不惡風水脹於腹是以如鼓水旺土濕是以不渴風水皮水皆外在皮里法當發汗正水者水之正病於肺腎少陰水旺故其脈沉遲水上連肺氣道壅遏故外證自喘水熱穴論肺者太陰也少陰者冬脈也其本在腎其末在肺皆積水也故水病下為胕腫大腹上為喘呼不得臥者標本俱病此水之自下而泛濫於上者石水者水之凝結於腎如石之堅腎氣實則脹故外證腹滿上不至肺是以不喘黃汗者汗出而浴水入汗孔浸於經絡水旺陰盛故其脈沉遲水遏陽氣不得外達故身發熱土濕胃逆肺氣不降是以胸滿濁氣上壅故頭面腫土敗不能行氣於四肢故四肢腫久而不愈濕鬱為熱肌肉腐爛必致癰膿也水氣三寸口脈沉滑者中有水氣兩目腫大有熱名曰風水視人之目窠上微腫如蠶新臥起狀其頸脈動時時咳按其手足上陷而不起者風水寸口脈沉者腎陰之盛滑者風客皮毛水氣內鬱而動蕩也是謂中有水氣面目腫大身上有熱名曰風水視人之目窠上微微壅腫如蠶之新臥起狀其頸脈振動時時咳嗽按其手足上陷而不起者是風水也視人之目窠上至末靈樞論疾診尺篇文水脹篇素問平人氣象論皆有此段而語稍不同素問評熱病論諸有水氣者微腫先見於目下也水者陰也目下亦陰也腹者至陰之所居故水在腹者必使目下腫也其氣上逆故口苦舌乾臥不得正偃正偃則咳出清水也此論風水岐伯曰病名為風水頸脈者足陽明之人迎動於結喉之旁頸脈動時時咳者胃氣之上逆按其手足陷而不起者腫之堅厚也水氣四太陽病脈浮而緊法當骨節疼痛反不疼身體反重而酸其人不渴汗出即愈此為風水惡寒者此為極虛發汗得之渴而不惡寒者此為皮水身腫而冷狀如周痹胸中窒不能食反聚痛暮躁不得眠此為黃汗痛在骨節咳而喘不渴者此為脾脹其狀如腫發汗則愈然諸病此者渴而下利小便數者皆不可發汗太陽病脈浮而緊是傷寒之脈法當骨節疼痛今反不疼身體反重著而酸其人不渴是非傷寒乃水氣在內發汗則愈此為風水也其惡寒者此為陽氣極虛而又發汗亡陽而得之其渴而不惡寒者衛陽未泄此為皮水若身體胕腫寒冷狀如周痹隨經脈上下而痛作胸中窒塞不能下食氣反聚痛於膈上暮躁不得眠睡此為黃汗若痛在骨節咳而發喘口不渴者此為脾脹以濕土壅阻肺氣鬱礙故咳喘俱作其狀亦如胕腫乃內脹而非外腫也以上諸證皆發汗以泄其水氣則愈然諸病此者設若渴而下利小便數者津液內耗不可發汗也水氣五脈浮而洪浮則為風洪則為氣風氣相搏風強則為癮疹身體為癢癢者為泄風久為痂癩氣強則為水難以俯仰風氣相系身體洪腫汗出乃愈惡風則虛此為風水不惡風者小便通利上焦有寒其口多涎此為黃汗脈浮而洪浮則為風邪之外襲洪則為衛氣之內郁風性疏泄氣性斂閉外風與內氣相搏風泄於外氣閉於內營鬱熱作透出汗孔而見紅斑是謂痧疹氣之為性愈泄則愈斂若風強而外泄氣強而內閉則紅斑不出其風強而氣不能全閉紅斑半出出而不透隱見於皮膚之內是為癮疹氣不透出則鬱而為癢癢者名為泄風泄風者風之半泄而未透也素問風論外在腠理則為泄風是也泄風不愈營血之鬱熱莫宣久而肌肉腐潰則為痂癩義詳風論素問名為癩風亦曰脈風脈要精微論謂脈風成為癩是也金匱此段見傷寒脈法蓋肺竅於鼻司衛氣而主皮毛衛氣鬱故皮腫毛落而鼻壞法當瀉衛氣之閉遏清營血之鬱熱則瘡癩平矣若氣強而風不能半泄則氣閉而為水以氣為水母氣行則水行氣鬱則水鬱也氣水鼓脹故難以俯仰風氣摶結兩相維繫營衛郁阻氣水不行故身體洪腫汗出而水氣外泄腫乃愈也惡風者是其表氣之虛得風則衛氣愈閉而病加是以惡之此為風水不惡風者小便通利上焦有寒肺氣不降其口多涎此為黃汗黃汗者土濕木鬱而生下熱上原無熱惟有寒也水氣六趺陽脈當伏今反緊本自有寒疝瘦腹中痛醫反下之即胸滿短氣趺陽脈當伏今反數本自有熱消穀小便數今反不利此欲作水趺陽脈當伏今反緊緊則為寒本自當有寒疝瘕腹中疼痛醫不用溫而反下之土敗胃逆即胸滿而短氣也趺陽脈當伏今反數數則為熱本自當有內熱消穀小便數今反小便不利此欲作水也蓋素有伏氣者趺陽脈亦當有伏留之象而伏氣有寒熱之不同寒伏則脈緊此當有寒疝瘕腹中痛醫反下之即胸滿而短氣熱伏則脈數此當有積熱消水穀而便數今反不利此水穀不消內原無熱欲作水也水氣七寸口脈浮而遲浮脈則熱遲脈則潛熱潛相摶名曰沉趺陽脈浮而數浮脈即熱數脈即止熱止相摶名曰伏沉伏相摶名曰水沉則絡脈虛伏則小便難虛難相摶水走皮膚即為水矣寸口脈浮而遲浮脈即為陽盛而上熱遲脈即為陰盛而下潛上熱與下潛相摶是陰氣不升其名曰沉趺陽脈浮而數浮脈即為陰虛而上熱數脈即為陽盛而上止上熱與上止相摶是陽氣不降其名曰伏陰之下沉與陽之上伏相摶則陰中無陽而水不化氣其名曰水陰升於上是謂清陽水升而化陽氣故絡脈充滿陰沉而不升則絡脈虛陽降於下是謂濁陰氣降而化陰水故小便通利陽伏而不降則小便難絡脈之虛與小便之難相摶則水不滲於膀胱而逆走於皮膚即為水矣摶者合也水病原於下寒今陽氣伏止於上而不下交陰氣沉潛於下而不上交則水不能化氣而水道瘀塞絡脈空虛積水無下泄之路盛滿莫容則避實而走虛遊溢於經絡而浸淫於皮膚必然之勢也水氣八寸口脈弦而緊弦則衛氣不行即惡寒水不沾流走於腸間弦為肝脈緊為腎脈寸口脈弦而緊腎肝陰盛營陰束其衛陽衛氣不行即見惡寒陽氣敗沒陰水泛濫停瘀而不沾流故走於腸間瀝瀝有聲也水氣九少陰脈沉而緊緊則為痛沉則為水小便即難少陰脈沉而緊陰旺而水寒也緊則寒氣凝澀而為痛沉則陰氣結澌而為水水寒木鬱膀胱不泄小便即難也水氣十脈得諸沉當責有水身體腫重水病脈出者死脈得諸沉陰旺水寒不能化氣當責有水水溢皮膚身體腫重是其證也水病脈沉若脈出者陽根下斷升浮無歸法當死也水氣十一夫水病人目下有臥蠶面目鮮澤脈伏其人消渴病水腹大小便不利其脈沉絶者有水可下之目下陽中之陰位水氣上溢陰位先凝故目下臃腫如臥蠶也水氣浸潤故面目鮮澤所謂色鮮明者有留飲也首卷臟腑經絡語脈伏者伏留而不動也消渴者水泛而火逆木鬱而風動也如此法當病水若腹大而小便不利其脈沉絶者此為有水可下之也水氣十二問曰病下利後渴而飲水小便不利腹滿因腫者何也答曰此法當病水若小便自利及汗出者當自愈病下利後陽亡土濕木鬱風動渴而飲水小便不利腹滿因致胕腫者此法當病水若內而小便自利及外而汗出者自當平愈是以水病有發汗利水之法也水氣十三心水者其身重而少氣不得臥煩而躁其人陰腫心水者水滅火也陰盛陽虛故身重而少氣陽不根陰故煩躁不得臥寐火種下絶肝腎寒凝故陰器腫大也水氣十四肝水者其腹大不能自轉側脅下腹痛時時津液微生小便續通肝水者水乘木也木鬱賊土是以腹大肝脈自少腹而循脅肋行身之側脾脹肝鬱經脈迫急故不能轉側而脅腹時痛也風木疏泄故時時津液微生於上小便續通於下也水氣十五肺水者其身腫小便難時時鴨溏肺水者水乘金也肺主氣衛氣不行故其身腫氣生水肺氣不化故小便難肺為太陰化氣於濕土下與大腸相表裡大腸燥金亦從濕化收斂失政故時時鴨溏水氣十六脾水者其腹大四肢苦重津液不生但苦少氣小便難脾水者水侮土也脾為太陰濕土水盛土濕乙木不達鬱怒而賊脾土脾氣脹滿是以腹大脾主四肢濕流關節故四肢苦重木鬱風動肺津傷耗故津液不生脾土被賊困乏衰倦故苦少氣土濕木鬱不能泄水故小便難水氣十七腎水者其腹大臍腫腰痛不得溺陰下濕如牛鼻上汗其足逆冷面反瘦腎水者水自傷也水盛而侮土土濕木鬱是以腹大臍居上下之交中氣所在寒水侮土中氣崩潰是以臍腫臍腫腹大總緣土敗所謂腎氣實則脹也腰者腎之府也水旺木鬱陷於腎部盤塞不舒是以腰痛乙木不能疏泄故不得溺腎開竅於二陰前陰者宗筋之聚肝之所司也水寒土濕肝木鬱陷濕氣外蒸故陰下濕如牛鼻上汗腎脈自足走胸寒水下旺經脈不升故其足逆冷陽明行身之前循面下項陽明從燥金化氣是為燥土水侮土敗太陰濕土之部無不胕腫而燥被濕奪亦當腫及陽明之分但陽明為三陽之長首面又六陽之會以燥土而居陽盛之地是以面部不腫陽明太陰同主肌肉水勝土負肌肉消減故面部不腫反見其瘦也素問陰陽別論三陰結謂之水三陰者太陰也手太陰肺不能行水足太陰脾不能制水陰氣凝結是以水泛究竟化水者脾肺司水者腎也然則太陰者水病之標少陰者水病之本手之少陰是為丁火足之少陰是為癸水丁火不根於癸水之中此少陰水病所由作也水盛則滅火而侮土水澌土敗堤防崩毀水病既成不可醫矣治法補火燥土以制癸水而橫流倒注實因水竅不開則條達厥陰以通疏泄之路不易之訣也厥陰風木性主疏泄汗溺皆司汗孔尿孔水之去路也水氣十八問曰病者苦水面目身體四肢皆腫小便不利脈之不言水反言胸中痛氣上衝咽狀如炙肉當微咳喘審如師言其脈何類師曰寸口脈沉而緊沉為水緊為寒沉緊相摶結在關元始時尚微年盛不覺陽衰之後營衛相干陽損陰盛結寒微動腎氣上衝咽喉塞噎脅下急痛醫以為留飲而大下之氣系不去其病不除復重吐之胃家虛煩咽燥欲飲水小便不利水穀不化面目手足浮腫又與葶藶丸下水當時如小差食飲過度腫復如前胸脅苦痛象若奔豚其水揚溢則咳喘逆當先攻擊沖氣令止乃治咳咳止其喘自差先治新病病當在後病者苦水面目身體四肢皆腫小便不利是水也乃脈之不言水反言胸中痛氣上衝咽喉狀如炙肉當微作咳喘緣其寸口脈沉而緊沉為水盛緊為寒凝沉緊相摶水寒結在任脈之關元始時病氣尚微年方盛壯不知覺也及乎年邁陽衰之後營衛俱虛兩相干礙是時陽損陰盛關元之結寒微微動作腎中陰氣隨而上衝是以咽喉塞噎狀如炙肉水寒木鬱故脅下急痛醫不知是結寒以為留飲而大下之寒氣維繫而不去其病不能除也復重吐之以傷胃氣胃逆而生虛煩咽燥而欲飲水其小便不利前無滲泄之路而水穀陳宿不能腐化水溢經絡是以面目手足浮腫醫又與葶藶丸下水積水初下當時如小差遇食飲過度傷其脾胃水氣泛濫腫復如前風木鬱沖胸脅苦痛象若奔豚升突其水邪上騰揚溢胸膈壅其肺氣故咳嗽喘逆俱作治法當先攻擊沖氣令止乃後治咳咳止其喘自差先治其沖氣之新病咳喘之病當在後也腎肝沖氣因於下有結寒當以溫暖腎肝之藥下其沖氣水氣十九師曰寸口脈沉而遲沉則為水遲則為寒寒水相摶趺陽脈伏水穀不化脾氣衰則鶩溏胃氣衰則身腫少陽脈卑少陰脈細男子則小便不利婦人則經水不通經為血血不利則為水名曰血分寸口脈沉而遲沉則陰盛而為水遲則陽虛而為寒寒水相摶陰盛陽奔故趺陽脈伏水穀不化太陰主內脾氣衰則濕旺而鶩溏陽明主外胃氣衰則陽敗而身腫於是少陽之脈卑相火虛而形於左關少陰之脈細寒水旺而現於尺中寒氣下凝男子得此則小便不利婦人得此則經水不通經水為血血原於腎而藏於肝水暖木榮則血流而水利水寒木鬱則血瘀而水凝緣血中溫氣實胎君火火敗血瘀水病必作故經脈不利則為水寸口主血此以血分之寒而病水根起於下焦者也水氣二十師曰寸口脈遲而澀遲則為寒澀為血不足趺陽脈微而遲微則為氣遲則為寒寒氣不足則手足逆冷手足逆冷則營衛不利營衛不利則腹滿脅鳴相逐氣轉膀胱營衛俱勞陽氣不通即身冷陰氣不通即骨疼陽前通則惡寒陰前通則痹不仁陰陽相得其氣乃行大氣一轉其氣乃散實則失氣虛則遺溺名曰氣分寸口脈遲而澀遲則為陰盛而寒澀則為血之不足趺陽脈微而遲微則為氣之不足遲則為陽虛而寒寒旺而氣血不足則手足厥逆而寒冷手足逆冷則營衛凝澀而不利營衛不利經絡壅塞則臟腑郁遏而腹滿肝司營血而行於左脅肺司衛氣而行於右脅中氣脹滿礙左升右降之路則兩脅滯氣雷鳴相逐下轉於膀胱營衛之氣不得順行逼而下轉俱致勞傷而鬱結不行堵塞膀胱注泄之路此水病之所以作也衛鬱而陽氣不通即內陷而身冷營鬱而陰氣不通即外束而骨痛陽欲前通而未能遽通則寒栗而不舒陰欲前通而未能遽通則麻痹而不仁必陰陽和調而相得其氣乃行陰不乘陽則衛氣外行陽不乘陰則營氣內行是謂相得行則大氣一轉膀胱之滯氣乃散散則滯氣泄於二陰之竅實則失氣於後陰虛則遺溺於前陰滯氣泄則水道通矣趺陽主氣此因氣分之寒而病水根原於上焦者也二章總承以上諸水證雖有表裡之辨臟腑之別名目非一證狀不同其究不過血分氣分二者而已氣分之病心肺之陽虛血分之病腎肝之陰盛也血分病水因於腎寒血以水為母而火為子水陰而火陽往往下寒而上熱若氣分病水則火滅而陽亡上下俱寒也水氣二十一師曰諸有水者腰以下腫當利小便腰以上腫當發汗乃愈諸有水者腰以下腫是氣鼓也氣鼓因於土濕而氣陷腰以上腫是水脹也水脹因於土虛而水逆蓋氣中之水降則水不上逆水中之氣升則氣不下陷水位於下氣所化也氣清則化水循經而降至腰以下而水成矣氣位於上水所生也水溫則化氣循臟而升至腰以上而氣成矣氣之在上清者歸於心肺而化神氣濁者外發而為汗水之在下精者入於腎肝而化精血粗者外滲而為溺其所以上下升降化生氣水者中氣之旺也中焦氣水之交氣水未分非水非氣其象如漚中氣衰敗升降失職氣陷於下膀胱閉癃水竅不開則腰以下腫故當利水水逆於上玄府緻密汗孔不泄則腰以上腫故當發汗腰以下腫所謂血分也腰以上腫所謂氣分也水病非一隨處異名約而言之氣分血分盡之矣水氣二十二風水脈浮身重汗出惡風者防己黃耆湯主之方在濕病腹痛者加芍藥此段見濕病風水脈浮身重汗出惡風者汗出當風竅閉汗回浸淫經絡是謂風水風性發揚是以脈浮水性沉著是以身重風性疏泄是以汗出病因風得是以惡風防己黃耆湯木甘燥土而補中黃耆益衛而發表防己利水而瀉濕也土濕木鬱肝氣賊脾則病腹痛芍藥瀉木而清風也水氣二十三風水惡風一身悉腫脈浮不渴續自汗出無大熱越婢湯主之風水惡風一身悉腫者水脹於經絡也續自汗出無大熱者表鬱熱作熱蒸於內風泄於外是以汗出而泄之不透故外無大熱越婢湯麻黃石膏發表而清熱薑甘大棗補土而和中也越婢湯四十七麻黃六兩石膏半斤甘草二兩大棗十五枚生薑三兩上五味以水七升先煮麻黃去上沫內諸藥煮取三升分溫三服惡風加附子一枚風水加白朮四兩水氣二十四皮水為病四肢腫水氣在皮膚中四肢聶聶動者防己茯苓湯主之陽受氣於四肢皮水為病陽衰濕旺故四肢腫水氣在皮膚之中郁遏風木之氣故四肢聶聶動搖左傳風淫未疾譬之樹在風中根本未動而枝葉先搖防己茯苓湯甘草補中而培土黃耆桂枝宣菅衛之郁防己茯苓瀉皮膚之水氣也防己茯苓湯四十八防已三兩茯苓六兩黃耆三兩桂枝三兩甘草二兩上五味以水六升煮取二升分溫三服水氣二十五厥而皮水者蒲灰散主之方在消渴水在皮膚阻遏陽氣不得四達故四肢厥冷蒲灰散蒲灰滑石利水而瀉濕也水氣二十六里水者一身面目黃腫其脈沉小便不利故令病水假令小便自利此亡津液故令渴越婢加朮湯主之里水水在臟腑之裡即正水石水及五臟之水也一身面目黃腫水旺土濕木鬱為黃緣木主五色入土化黃也陰盛故脈沉木氣遏陷莫能疏泄小便不利故令病水假令小便自利此亡肺家津液故令作渴便利口渴則水不但在裡而亦在表脈必兼浮不全是沉宜越婢加朮湯薑甘大棗補土而和中麻黃石膏發表而清熱白朮生津而止渴也越婢加朮湯四十九麻黃六兩石膏半斤生薑三兩甘草二兩大棗十二枚白朮四兩上六味以水六升先煮麻黃去上沫內諸藥煮取三升分溫三服水氣二十七里水越婢加朮湯主之甘草麻黃湯亦主之里水越婢加朮湯主小便自利而渴者甘草麻黃湯主小便不利而無渴者皆用麻黃使里水化汗而外泄也甘草麻黃湯五十甘草二兩麻黃四兩上二味以水五升先煮麻黃去上沫內甘草煮取三升溫服一升重覆汗出不汗再服慎風寒水氣二十八水之為病其脈沉小屬少陰浮者為風無水虛腫者為氣水發其汗即已脈沉者宜麻黃附子湯脈浮者宜杏子湯水之為病其脈沉小屬之少陰腎脈沉小也浮者為風風性發揚也無水虛腫者名為氣水其實是氣而非水也凡此諸證發其汗即已但脈有浮沉則藥有溫清之不同耳脈沉者宜麻黃附子湯溫中下而發表浮者宜杏子湯清中上而發表也麻黃附子湯五十一方見傷寒少陰即麻黃附子甘草湯而分兩不同麻黃三兩甘草一兩附子一枚炮上三味以水七升先煮麻黃去上沫內諸藥煮取二升半溫服八合日三服杏子湯五十二方見傷寒太陽原方缺載取傷寒麻杏石甘湯補杏子五十枚麻黃四兩石膏半斤碎綿裹甘草二兩炙上四味以水七升先煮麻黃減二升去上沫內諸藥煮取二升去滓溫服一升水氣二十九問曰黃汗之為病身體腫發熱汗出而渴狀如風水汗沾衣色正黃如柏汁脈自沉何從得之師曰以汗出入水中浴水從汗孔入得之宜黃耆芍藥桂酒湯主之黃汗為病身體胕腫發熱汗出而渴狀如風水汗沾衣上色正黃如柏汁此以汗出入水水從汗孔入里浸淫經絡阻其營衛衛鬱而為腫營鬱而為熱經熱鬱蒸泄而為汗肌肉滋濕汗色正黃緣脾為濕土而主肌肉土濕木鬱則發黃色木主五色入土化黃故也木鬱風動是以發渴木氣遏陷是以脈沉黃耆芍藥桂酒湯黃耆桂枝行營衛之郁遏芍藥苦酒瀉經絡之瘀熱也黃耆芍藥桂酒湯五十三黃耆五兩芍藥三兩桂枝三兩上三味以苦酒一升水七升相合煮取三升溫服一升當心煩服至六七日乃解若心煩不止者以苦酒阻故也苦酒即醋也水氣三十黃汗之病兩脛自冷假令發熱此屬歷節食已汗出又身常暮盜汗出者此營氣也若汗出已反發熱者久久其身必甲錯發熱不止者必生惡瘡若身重汗出已輒輕者久久必身瞤瞤即胸中痛又從腰以上必汗出下無汗腰臗弛痛如有物在皮中狀劇者不能食身疼重煩躁小便不利此為黃汗桂枝加黃耆湯主之黃汗之病經熱內郁而不外達故兩脛自冷假令發熱是寒濕格其陽氣外熱內寒此屬歷節黃汗外冷內熱食後水穀未消中氣脹滿經熱愈郁皮毛蒸泄是以汗出又暮常盜汗出者此衛氣不斂營氣之外泄也若汗出之後反更發熱者經熱不為汗減久而營血瘀蒸不能外華皮腠肌膚枯澀必生甲錯發熱不止血肉腐潰必生惡瘡若身體沉重汗後輒輕者濕隨汗泄暫時輕鬆久而汗奪血虛木枯風作必生瞤動瞤即風木鬱沖胸中疼痛風木升泄故汗出腰半以上風木鬱勃經絡鼓蕩故腰臗弛痛如有物在皮中濕遏經絡故身體疼重煩躁濕旺木鬱故小便不利此為黃汗宜桂枝加黃耆湯薑甘大棗培土而和中芍藥桂枝通經而瀉熱黃耆助衛氣以達皮毛輔以熱粥而發微汗以瀉經絡之鬱熱也桂枝加黃耆湯五十四桂枝三兩芍藥三兩甘草二兩大棗十二枚生薑三兩黃耆二兩上六味以水八升煮取三升溫服一升須臾食熱稀粥一升余以助藥力取微汗若不汗更服水氣三十一氣分心下堅大如盤邊如旋杯桂甘薑棗麻附細辛湯主之氣分清陽之位而濁氣痞塞心下堅大如盤邊如旋杯此下焦陰邪逆填陽位必緣土敗而水侮也桂甘薑棗麻附細辛湯甘棗培其土虛附子溫其水寒麻黃瀉其滯氣薑桂細辛降其濁陰也桂甘薑棗麻附細辛湯五十五桂枝三兩生薑三兩甘草二兩大棗十二枚麻黃二兩附子一枚炮細辛二兩上七味以水七升先煮麻黃去上沫內諸藥煮取二升分溫三服當汗出如蟲行皮中即愈水氣三十二心下堅大如盤邊如旋杯水飲所作枳朮湯主之心下堅大如盤邊如旋杯此緣水飲所作以水旺土濕胃氣上逆壅阻膽經下行之路因而痞結心下堅硬不消枳朮湯枳實瀉水而消痞白朮燥土而補中也枳朮湯五十六枳實七枚白朮二兩上二味以水五升煮取三升分溫三服腹中軟即當散也
