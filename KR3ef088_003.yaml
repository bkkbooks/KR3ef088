body:
  text: 卷三外感雜病中風歷節九章中風歷節之病皆內傷濕寒而外感風邪者也濕寒流關節而傷筋骨則病歷節濕寒浸臟腑而淫經絡則病中風風為陽邪其傷在上濕為陰邪其傷在下中風未嘗不病足然究竟足輕而手重歷節則全在足而不在手蓋中風之家陽虛濕旺上下表里無處不傷故手足皆病歷節之家中上二焦猶可支持寒濕獨甚於下故足病而手無恙也中風之病仲景未嘗立法然苓桂術甘茯苓四逆八味腎氣之方皆中風必須之法即有上熱煩躁之證而中下濕寒則無不悉同上部稍清即宜大用溫燥不可久服陰藥也中風三章中風一夫風之為病當半身不遂或但臂不遂者此為痹脈微而數中風使然風之為病或中於左或中於右手足偏枯是謂半身不遂其初先覺麻木麻木者氣滯而不行也肺主氣而血中之溫氣實為肺氣之根右麻者肺氣之不行左麻者肝氣之不行麻之極則為木氣鬱於經絡之中阻滯不運衝於汗孔簌簌靡寧狀如亂針微刺之象是謂之麻久而氣閉不通肌肉頑廢痛癢無覺是謂之木靈樞決氣上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣物之潤澤莫過於氣筋膜之柔而不枯者氣以煦之血以濡之也血隨氣動氣梗則血瘀氣血雙阻筋膜失養一被外風乘襲而內風感應則病偏枯內風者厥陰風木之氣也氣鬱而血凝血凝而木鬱風傷衛氣遏逼營血木氣愈郁木鬱生風津液耗傷筋膜焦縮故病偏枯其在經絡未嘗非燥而在臟腑則全是濕緣濕土塞滿肺金不得降斂故氣阻而生麻肝木不得升達故血鬱而生風而土濕之由全因腎水之寒水寒土濕此金木堙郁之原也若或但一臂不遂者此為痹非風也痹者風寒濕三者合而痹其血脈也若脈微而數則中風使然矣風因虛中是以脈微風動而不息是以脈數風隨八節而居八方冬至在北夏至在南春分在東秋分在西立春東北立夏東南立秋西南立冬西北靈樞九宮八風風從其所居之鄉來為實風主生長養萬物從其沖後來為虛風傷人者也主殺主害故聖人避風如避矢石焉其有三虛而偏中於風邪則為擊僕偏枯矣歲露論乘年之衰逢月之空失時之和因為賊風所傷是謂三虛中風二寸口脈浮而緊緊則為寒浮則為虛寒虛相摶邪在皮膚浮者血虛絡脈空虛賊邪不泄或左或右邪氣反緩正氣即急正氣引邪喎僻不遂邪在於絡肌膚不仁邪在於經即重不勝邪入於腑即不識人邪入於臟舌即難言口即吐涎寸口脈浮而緊緊則為寒浮則為虛寒虛相摶則邪在皮膚而病中風蓋緊者營血之寒浮者營血之虛肝木藏血而胎君火火者血中溫氣之所化也溫氣不足故營血虛寒而脈見浮緊血虛寒盛則木鬱風動是以脈浮絡脈空虛一被外風感襲則內風鬱發而為賊邪賊邪不得外泄或入於左或入於右隨其正氣之偏虛而中之無一定也邪氣之所在氣留而血歸之氣血去而正歸邪則邪氣反緩而正氣即急正氣緊急而引其邪氣則邪處之筋長正處之筋短鼻口喎僻而不遂素問繆刺論邪中於經左盛則右病右盛則左病是也邪氣淺在於絡即肌膚痹著而不仁邪氣次在於經即身體遲重而不勝邪氣內入於腑則胃土上逆濁氣熏蒸化生痰涎堵塞心竅即昏憒不能識人邪氣內入於臟則脾土下陷筋脈緊急牽引舌本即蹇澀不能言語太陰脾脈上連舌本脾敗不以攝涎即口角涎流腑邪必歸於胃臟邪必歸於脾以胃敗而後邪侵於腑脾敗而後邪侵於臟也中風之病由於土濕土濕則木鬱而風動以風木而賊濕土胃逆則神迷脾陷則言拙是皆中氣之敗也中風三寸口脈遲而緩遲則為寒緩則為虛營緩則為血亡衛緩則為中風邪氣中經則身癢而癮疹心氣不足邪氣入中即胸滿而短氣寸口脈遲而緩遲則為氣血之寒緩則為營衛之虛營緩則為裡虛而亡血衛緩則為表虛而中風邪氣中於經絡風以泄之而衛氣愈斂閉遏營血不得外達則身癢而生癮疹癢者氣欲行而血不行也血鬱為熱發於汗孔之外則成紅斑衛氣外斂不能透發斑點隱見於皮膚之內是為癮疹營氣幽郁不得暢泄是以身癢若心氣不足邪氣乘虛而入中壅遏宗氣則胸膈脹滿而短氣不舒也歷節六章歷節一寸口脈沉而弱沉即主骨弱即主筋沉即為腎弱即為肝汗出入水中如水傷心歷節痛黃汗出故曰歷節寸口脈沉而弱腎主骨而脈沉故沉即主骨肝主筋而脈弱故弱即主筋沉即為腎骨屬於腎也弱即為肝筋屬於肝也此緣汗出而入水中如使水傷心氣則水邪隨脈而注筋骨以心主脈也筋骨既傷則歷節作痛以諸筋皆屬於骨節而濕邪傳流於關節也濕蒸皮毛黃汗乃出緣脾主肌肉其色為黃濕漬肌肉木氣不達木主五色入土化黃也歷節二趺陽脈浮而滑滑則穀氣實浮則自汗出少陰脈浮而弱弱則血不足浮則為風風血相摶即疼痛如掣趺陽脈浮而滑滑則陽盛而穀氣實浮則氣蒸而自汗出少陰脈浮而弱弱則為營血之不足浮則為風邪之外中風邪與血虛相合即筋骨疼痛如掣趺陽胃脈少陰腎脈腎水溫升則生肝木而化營血水寒不能生木是以血虛血中溫氣實胎君火血虛則溫氣不足最易感召陰邪水冷血寒郁格陽明胃氣不得下行故穀氣蒸泄自汗常出水濕之邪入於汗孔流注關節之中內與肝腎之寒合傷筋骨復得風邪外閉寒濕鬱發即筋骨掣痛而病歷節水暖血溫不作此病也歷節三盛人脈澀小短氣自汗出歷節疼不可屈伸此皆飲酒汗出當風所致也肥盛之人營衛本盛旺忽而脈候澀小短氣自汗歷節疼痛不可伸屈此皆飲酒汗出當風感襲皮毛所致風性疏泄故自汗出風泄而衛閉故脈澀小經脈閉塞肺氣不得下達故氣道短促素問飲酒中風則為漏風以酒行經絡血蒸汗出益以風邪疏泄自汗常流是為漏風汗孔不闔水濕易入此歷節傷痛之根也歷節四味酸則傷筋筋傷則緩名曰泄咸則傷骨骨傷則痿名曰枯枯泄相摶名曰斷泄營氣不通衛不獨行營衛俱微三焦無所仰四屬斷絶身體羸瘦獨足腫大黃汗出脛冷假令發熱便為歷節也肝主筋其味酸味酸則傷筋筋傷則緩弱不振其名曰泄腎主骨其味鹹味鹹則傷骨骨傷則痿軟不堅其名曰枯枯泄相合筋骨俱病名曰斷泄言其真氣斷絶於內而疏泄於外也筋骨者營衛之所滋養營虛血澀經脈不通則衛氣不能獨行營衛俱微無以充灌三焦三焦無所仰賴以致四肢失秉斷絶不通身體羸瘦獨足腫大黃汗出而脛自冷假令發熱便是歷節也黃汗之病兩脛自冷以其內熱不能外發也歷節之病兩脛發熱以其內寒鬱格陽氣也歷節五諸肢節疼痛身體尪羸腳腫如脫頭眩短氣溫溫欲吐桂枝芍藥知母湯主之諸肢節疼痛身體尪羸腳腫如脫頭眩短氣溫溫欲吐者濕傷關節則生疼痛營衛不行則肌肉瘦削濁陰阻格陽不下根則生眩暈氣不降斂則苦短促胃氣上逆則欲嘔吐桂枝芍藥知母湯朮甘培土以敵陰邪附子暖水而驅寒濕知母生薑清肺而降濁氣芍桂麻防通經而開痹塞也桂枝芍藥知母湯三桂枝四兩芍藥三兩麻黃二兩防風四兩甘草二兩白朮二兩生薑五兩知母四兩附子二兩炮上九味以水七升煮取二升溫服七合日三服歷節六病歷節不可屈伸疼痛烏頭湯主之濕寒傷其筋骨則疼痛不可屈伸烏頭湯甘草芍藥培土而滋肝黃耆麻黃通經而瀉濕烏頭開痹而逐寒也烏頭湯四烏頭五枚㕮咀以蜜二升煎取一升半出烏頭甘草三兩炙芍藥三兩黃耆三兩麻黃三兩上五味㕮咀四味以水三升煮取一升去滓內蜜煎中重煎之服七合不知盡服之亦治腳氣疼痛不可屈伸附方千金礬石湯一治腳氣衝心礬石二兩上一味以漿水一斗五升煎三五沸浸腳良崔氏八味丸二治腳氣上入少腹不仁方在消渴按中風之病仲景未嘗立方其證與八味甚合崔氏以之治歷節腳氣若以治中風則妙甚矣
