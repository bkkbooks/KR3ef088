body:
  text: 卷十六內傷雜病胸痹心痛短氣九章胸痹心痛之病濁陰逆犯清陽責在肝腎之陰盛心肺之陽虛而其原總由於中氣之敗胃逆則濁陰不降脾陷則清陽不升是寒水凌火風木賊土之根本也陽宜降也陽中之濁氣宜降而清氣不宜降陰宜升也陰中之清氣宜升而濁氣不宜升濁氣升而清氣降則陽陷於下而陰填於上清虛沖和之位變而為痞滿結硬之所陰賊橫逆宮城填塞君主失守陽神奔敗此胸痹心痛所由也失升降之職易陰陽之部非緣中氣虧敗何至於此仲景於散結開痹之中而示人參一湯所謂握要而警策者矣胸痹心痛一師曰夫脈當取太過不及陽微陰弦即胸痹而痛所以然者責其極虛也今陽虛知在上焦所以胸痹心痛者以其陰弦故也診脈當取其太過不及以定虛實寸為陽尺為陰寸旺於尺人之常也寸微是陽虛於上尺弦是陰盛於下弦為肝脈應見於左關尺弦者水寒不能生木木鬱於水而不升也木不升則脾必陷肝脾所以升清陽肝脾郁陷清陽不升是寸之所以微也陽不敵陰則陰邪上犯濁氣填塞是以胸痹宮城逼窄是以心痛所以然者責其上焦之清陽極虛也陽在上今寸微陽虛因知病在上焦其上焦所以胸痹而心痛者以其尺脈之弦陰盛而侵微陽上凌清位窒塞而不開衝擊而不寧也此脈之不及而病虛者胸痹短氣二平人無寒熱短氣不足以息者實也若夫平人外無寒熱之表證忽而短氣不足以息者此必隧道壅塞而不通或有宿物阻格而不達是實證也實則宜瀉當以行瘀開閉之方除舊布新之法排決郁陳則氣降而息順矣此脈之太過而病實者胸痹心痛短氣三胸痹之病喘息咳唾胸背痛短氣寸口脈沉而遲關上小緊數栝蔞薤白白酒湯主之胸痹之病凡喘息咳唾即胸背疼痛短氣喘促寸口之脈沉而遲關上之脈小而緊數是中氣不運濁陰上逆氣道痞塞而不通也栝蔞薤白白酒湯栝蔞滌瘀而清煩薤白白酒開壅而決塞也栝蔞薤白白酒湯百二十栝蔞實一枚搗薤白三兩白酒七斤上三味同煮取二升分溫再服胸痹心痛四胸痹不得臥心痛徹背者栝蔞薤白半夏湯主之胸痹不得眠臥心痛徹背者是陰邪上填沖逼心宮而胸膈痹塞氣無前降之路膈上莫容是以後衝於脊背也栝蔞薤白半夏湯栝蔞滌瘀而清煩薤白白酒半夏破壅而降逆也栝蔞薤白半夏湯百二十一栝蔞實一枚搗薤白三兩白酒一斗半夏半升上四味同煮取四升溫服一升日三服胸痹心痛五胸痹心中痞留氣結在胸胸滿脅下逆搶心枳實薤白桂枝湯主之人參湯亦主之胸痹心中痞塞濁氣留結在胸胸膈壅悶脅下氣逆上搶於心是皆膽胃逆升濁陰不降之故也枳實薤白桂枝湯枳朴薤白破壅塞而消痹結栝蔞桂枝滌濁瘀而下衝氣也人參湯參術燥土而益氣薑甘溫中而緩急亦主治之枳實薤白桂枝湯百二十二枳實四枚厚朴四兩栝蔞一枚搗薤白半斤桂枝一兩上五味以水五升先煮枳實厚朴取二升去滓內諸藥煮數沸分溫三服人參湯百二十三人參三兩白朮三兩甘草三兩乾薑三兩上四味以水八升煮取三升溫服一升日三服胸痹短氣六胸痹胸中氣塞短氣茯苓杏仁甘草湯主之橘枳生薑湯亦主之胸痹胸中氣塞短氣是土濕胃逆濁氣痞塞肺無降路是以短氣肺氣堙塞則津液凝瘀而化痰涎茯苓杏仁甘草湯杏仁利氣而破壅苓甘補土而瀉濕也橘枳生薑湯橘皮破凝而開鬱枳薑瀉滿而降濁也茯苓杏仁甘草湯百二十四茯苓三兩杏仁五十枚甘草一兩上三味以水一斗煮取五升溫服一升日三服不差更服橘枳生薑湯百二十五橘皮一斤枳實三兩生薑半斤上三味以水五升煮取二升分溫再服胸痹七胸痹緩急者薏苡附子散主之胸痹緩急者水土濕寒濁陰上逆肺氣鬱阻胸膈閉塞證有緩急不同而總屬濕寒薏苡附子散薏苡瀉濕而降濁附子驅寒而破壅也薏苡附子散百二十六薏苡十五兩附子十枚炮上二味杵為散服方寸匕日三服胸痹心痛八心中痞諸逆心懸痛桂枝生薑枳實湯主之心中痞塞諸氣上逆心懸作痛以膽胃不降胸膈鬱滿阻礙厥陰升路衝擊作疼桂枝生薑枳實湯枳薑降濁而瀉痞桂枝疏木而下衝也桂枝生薑枳實湯百二十七桂枝三兩生薑三兩枳實五兩上三味以水六升煮取三升分溫三服胸痹心痛九心痛徹背背痛徹心烏頭赤石脂丸主之寒邪沖逆凌逼心君故心背徹痛烏頭赤石脂丸烏附椒薑驅寒邪而降逆赤石脂護心君而止痛也烏頭赤石脂丸百二十八烏頭一分炮蜀椒一分一法二分乾薑一兩一法一分附子半兩一法一分赤石脂一兩一法二分上五味末之蜜丸如梧子大先食服一丸日三服不知稍加服附方九痛丸十一治九種心痛兼治卒中惡腹脹滿口不能言又治連年積冷流注心胸痛並冷氣上衝落馬墜車等皆主之附子三兩炮巴豆一兩去皮熬研如脂生狼牙一兩吳茱萸一兩人參一兩乾薑一兩上六味末之煉蜜丸如梧子大酒下強人初服三丸日三服弱者服二丸狼牙瘡家敷洗之藥用之心痛方中甚屬無謂去此一味換橘皮一兩減巴豆十分之七可也
