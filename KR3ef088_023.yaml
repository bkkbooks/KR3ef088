body:
  text: 卷二十三以下二卷有方無論不敢妄釋論者皆以為後人偽附多不載此二卷姑以古本所有錄之雜療方退五臟虛熱四時加減柴胡飲子方柴胡白朮各八分大腹檳榔四枚皮不用陳皮生薑各五分桔梗七分以上冬三月柴胡稍多柴胡陳皮大腹檳榔生薑桔梗枳實以上春三月比冬減白朮加枳實柴胡白朮陳皮大腹檳榔生薑桔梗枳實甘草以上夏三月比春多甘草仍用白朮柴胡白朮大腹檳榔陳皮生薑桔梗以上秋三月與冬同陳皮稍多上各㕮咀分為三貼一貼以水三升煮取二升分溫三服如人行四五里進一服如四體壅添甘草少許每貼分作三小貼以水一升煮取七合溫服再合滓為一服重煮都成四服長服訶黎勒丸方訶黎勒陳皮厚朴各三兩上三味末之煉蜜丸如梧子大酒飲服二十丸加至三十丸三物備急丸方大黃巴豆去皮心熬外研如泥乾薑各一兩上藥各須精新先搗大黃乾薑為未研巴豆內中合治一千杵用為散蜜和丸亦佳密器貯之莫令歇氣主心腹諸卒暴百病若中惡客杵心腹脹滿卒痛如錐刺氣急口噤停屍卒死者以暖水苦酒服大豆許三四丸或不能下捧頭起灌令下咽須臾當差如未差更與三丸當腹中鳴即吐下便差若口噤亦須折齒灌之治傷寒愈不復紫石寒食散方紫石英白石英赤石脂鍾乳煅栝蔞根防風桔梗文蛤鬼臼太乙餘糧燒各十分乾薑附子炮桂枝各四分上杵為散酒服方寸匕救卒死方薤搗汁灌鼻中雄雞冠割取血管吹內鼻中豬脂如雞子大苦酒一升煮沸灌喉中雞肝及血塗面上以灰圍四旁立起大豆二七粒以雞子白並酒和盡以吞之救卒死而壯熱者方礬石半斤以水一斗半煮消以漬腳令沒踝救卒死而目閉者方騎牛臨面搗薤汁灌耳中吹皂角末鼻中立效救卒死而張口反折者方灸手足兩爪後十四壯飲以五毒諸膏散有巴豆者救卒死而四肢不收失便者方馬屎一斗水三斗煮取二斗以洗之又取牛洞稀糞也一升溫酒灌口中灸心下一寸臍上三寸臍下四寸各一百壯差救小兒卒死而吐利不知是何病方狗屎一丸絞取汁以灌之無濕者水煮乾者取汁屍蹶脈動而無氣氣閉不通故靜而死也治方菖蒲屑內鼻孔中吹之令人以桂屑著舌下又方取左角發方寸燒末酒和灌令入喉立起救卒死客忤死還魂湯主之方麻黃三兩杏仁十七粒去皮尖甘草一兩炙上三味以水八升煮取三升去滓分令咽之通治諸感忤又方韭根一把烏梅七個吳茱萸半升炒上三味以水一斗煮之以病人櫛內中三沸櫛浮者生沉者死取三升去滓分飲之救自縊死旦至暮雖已冷必可治暮至旦少難也恐此當言忿氣盛故也然夏時夜短於晝又熱猶應可治又云心下若微溫者一日以上猶可治之方徐徐抱解不得截繩上下按被臥之一人以腳踏其兩肩手少挽其發當弦弦勿縱之一人以手按據胸上數動之一人摩捋臂脛屈伸之若已僵但漸漸強屈之並按其腹如此一炊頃氣從口出呼吸眼開而猶引按莫置亦勿苦勞之須臾可少與桂湯及粥清含與之令濡喉漸漸能咽吸稍止若向令兩人以管吹其兩耳朵好此法最善無不活者凡中暍死不可使得冷得冷便死療之方屈草帶繞暍人臍使三兩人溺其中令溫亦可用熱泥和屈草亦可扣瓦碗底按及車缸以著暍人臍令溺須得流去此謂道路窮卒無湯當令溺其中欲使多人溺取令溫若湯便可與之不可泥及車缸恐此物冷暍既在夏月得熱泥土暖車缸亦可用也救溺死方取灶中灰兩石余以埋人從頭至足水出七孔即活治馬墜及一切筋骨損方大黃一兩候湯成下敗蒲一握三寸即蒲席也桃仁四十九個去皮尖熬緋帛如手大燒灰亂髮如雞子大燒灰甘草如中指節炙銼久用炊單布一尺燒灰上七味以童子小便量多少煎湯成內酒一大盞次下大黃去滓分溫三服先銼敗蒲席半領煎湯浴衣被蓋覆須臾通利數行痛楚立差利及浴水赤勿怪即瘀血也
