body:
  text: 卷十二內傷雜病黃疸二十三章黃疸者水旺土濕外感風邪濕鬱為熱傳於膀胱者也水土合邪法當利水而燥土但高低不同表裡攸判其表在經絡發其汗孔里在膀胱利其小便高在上脘吐其敗濁低在下脘下其陳菀四路清泄黃疸無餘矣第黃生於土濕濕原於陽虛其小便清白腹滿欲利者是濕寒之黃也濕熱者黃疸之標證濕寒者黃疸之本色也濕寒之黃仲景未嘗立法然痙濕暍中桂附朮甘諸方具在推而擴之附子真武茯苓四逆亦何非濕寒之法也讀者變通而化裁之法不可勝用矣慎勿株守梔子大黃一法以概寒熱無定之黃疸也黃疸一寸口脈浮而緩浮則為風緩則為痹痹非中風四肢苦煩脾色必黃瘀熱以行寸口以候三陰寸口脈浮而緩浮則為表中於風緩則為肌膚之痹是為風痹非中風也風痹於表則四肢苦煩脾色必黃瘀熱以行蓋脾為濕土其色為黃脾氣內遏不得四達故濕瘀為熱黃色外發四肢秉氣於脾脾病不得行氣於四肢故四肢煩生素問平人氣象論溺黃赤安臥者黃疸目黃者曰黃疸靈樞論疾診尺身痛而色微黃齒垢黃爪甲上黃黃疸也黃疸者土濕而木鬱木主五色入土則化黃溺者肝木之疏泄目者肝木之開竅爪甲者筋之餘肝木之主司安臥者脾之倦肝木之傷克風木不郁不成黃疸也黃疸二趺陽眉批趺陽即陽明胃脈下利篇云少陰免趺陽者為順在足趺上之衝陽故曰趺陽脈緊而數數則為熱熱則消穀緊則為寒食即為滿尺脈浮為傷腎趺陽脈緊為傷脾風寒相摶食谷即眩穀氣不消胃中苦濁濁氣下流小便不通陰被其寒熱流膀胱身體盡黃名曰谷疸趺陽脈以候三陽趺陽脈緊而數數則為熱內熱則消穀緊則為寒內寒則不能消穀食即為滿尺脈之浮為風傷於腎上章寸口脈浮而緩浮則為風寸口關上尺中三部俱浮其尺中之浮乃風傷於腎趺陽脈緊為寒傷於脾緊為腎脈風邪外束郁其腎家之寒寒水侮土則脾氣受傷脾傷於寒故趺陽脈緊也外風與內寒相摶脾傷不能磨化故食谷則頭暈而目眩水穀不化中氣脹滿甲木不降是以目眩穀氣陳宿不消胃中敗濁化生瘀熱趺陽脈緊而數數則為熱熱在胃也緊則為寒寒在脾也濁氣下流出於溲溺則瘀熱泄矣而水道阻梗小便不通又無外泄之路其太陰少陰俱被寒傷瘀熱不能內入於臟因而外入於腑流於膀胱膀胱之瘀熱蒸於周身身體盡黃名曰谷疸冒熱入於膀胱水土合邪濕熱瘀蒸則病黃疸谷疸者胃熱脾寒穀氣不消之所致也黃疸三陽明病脈遲者食難用飽飽則發煩頭眩小便必難此欲作谷疸雖下之腹滿如故所以然者脈遲故也此段見傷寒陽明陽明燥土太陰濕土陽旺土燥則脈數陰旺土濕則脈遲陽明病脈遲者太陰盛而陽明虛也陽衰濕旺飲食不甘故難以致飽飽則脾不能化中焦鬱滿故心煩而頭眩土濕則木鬱不能疏泄小便必難濕無泄路而穀氣陳宿此欲作谷疸雖下之而腹滿如故所以然者以其脈遲而陰盛故也黃疸四心中懊憹而熱不能食時欲吐名曰酒疸心中懊憹煩熱不能下食時欲嘔吐名曰酒疸酒之為性最動下濕而生上熱醉醒之後往往煩渴飲冷傷其脾陽久而脾陽頽敗下濕愈滋上熱彌盛遂生懊憹煩熱嘔吐不食之證將來必病酒疸醫知其上焦之濕熱而昧其下焦之濕寒涼泄不已熱未去而寒愈增土崩陽絶則人亡矣酒家之病成於飲食之生冷酒家之命殞於藥餌之寒涼此千古之冤枉而人無知者良可哀也黃疸五夫病酒黃疸必小便不利其候心中熱足下熱是其證也酒疸陽敗土濕金鬱於上不能化津木遏於下不能泄水必小便不利胃逆而君火不降則心中熱脾陷而風木不升則足下熱木中孕火其氣本溫木陷於水溫郁為熱肝脈起於足大指腎脈起於足心故足下熱也緣其中氣頽敗不能升降陰陽故也黃疸六酒疸心中熱欲吐者吐之愈酒疸心中煩熱欲作嘔吐者吐之則愈緣其濕熱鬱蒸化生敗濁濁氣重心故欲作吐吐其腐敗則噁心嘔噦止矣黃疸七酒黃疸者或無熱靖言了了腹滿欲吐鼻燥其脈浮者先吐之沉弦者先下之酒疸或心中無熱靖言了了煩亂不生而腹滿欲吐此緣土濕而胃逆也肺金莫降津液不生是以鼻燥肺竅於鼻也其脈浮者濁瘀在心肺之部當先吐之脈沉弦者濁瘀在肝腎之部當先下之以腐敗郁阻心肺不降是以脈浮心肺之脈浮腎肝不升故脈沉弦腎脈沉肝脈弦吐下之後腐物湧泄則心肺下降而腎肝上升矣黃疸八酒疸下之久久為黑疸目青面黑心中如蒜齏狀大便正黑皮膚爪之不仁其脈浮弱雖黑微黃故知之酒疸下之敗其脾陽久而寒水侮土變為黑疸木主五色入土為黃入水為黑自入為青肝木藏血而華皮膚水土溫燥乙木榮達則五氣調和色不偏見其一色偏呈者一藏堙郁而木氣不達也下后土敗陽虧水邪上凌木鬱濕土之中則見黃色木鬱寒水之內則見黑色木氣自郁則見青色肝竅於目目青者肝氣抑鬱自現其色於本經之竅也陽明行身之前自面下項面黑者寒水風木之邪上乘戊土之位也谷入於胃而消於脾從土化氣故大便色黃正黑者水侮木賊而土敗也土生於火木賊而土負水勝則火熄心中火位而如啖蒜齏寒水滅火金氣無制故辛味見於心家金味辛也木鬱血凝不能滋榮皮膚故皮膚枯槁爪之不仁陽虛而不根於下故脈浮弱其色雖黑而黑中微見黃色故知是黃疸所變化也黃疸九額上黑微汗出手足中熱薄暮即發膀胱急小便自利名曰女勞疸腹如水狀不治足太陽之經起於睛明在目內眥上額交顛而後行於背太陽寒水之氣逆而不降則額見黑色濕氣蒸泄則微汗出手厥陰之經行手心而上中指脈動於勞宮在手心中足少陰之經起小指而走足心脈出於湧泉在足心中手中熱者少陽相火之陷也少陽與厥陰為表裡故熱在手心足中熱者厥陰風木之陷也乙木生於癸水木陷於水濕氣下郁故熱在足心日暮陽衰寒濕下動木火鬱陷是以病發木陷於水遏抑鼓蕩不得上達故膀胱迫急風木疏泄火敗水寒蟄藏失政故小便自利此名曰女勞疸女勞之家縱欲傷精泄其腎肝溫氣水寒木枯脾敗濕作則病黑疸久而腹如水狀鼓脹不消則水木為賊而中氣崩潰不可治也黃疸十師曰病黃疸發熱煩喘胸滿口燥者以病發時火劫其汗兩熱所得然黃家所得從濕得之一身盡發熱而黃肚熱熱在裡當下之病黃疸發熱煩喘胸滿口燥何遽至此此以疸病發時原有內熱復以火劫其汗兩熱相合表裡燔蒸肺金受傷故致於此然黃家所以得病從濕得之非從熱得濕鬱則為熱耳若一身盡發熱而黃肚皮又熱此濕熱在裡當下之也靈樞師傳胃中熱則消穀臍以上皮熱腸中熱則出黃如糜臍以下皮熱即此肚熱熱在裡之義也黃疸十一脈沉渴欲飲水小便不利者皆發黃脈沉者水盛而木陷也木鬱不能疏泄則小便不利風燥津亡則渴欲飲水濕熱在中而下無泄路凡有此證無不發黃黃疸十二腹滿舌痿黃躁不得睡屬黃家土鬱不運則病腹滿素問痿論治痿獨取陽明舌痿黃者土濕脹滿陽明上逆君火不得下降鬱於戊土之中火土合邪濕熱熏蒸故舌痿而發黃黃為土色而舌為心竅也火不根水故躁不得睡此屬黃家也黃疸十三黃疸之病當以十八日為期治之十日以上瘥反劇者為難治素問太陰陽明論脾者土也治中央當以四時長四臟各十八日寄治不得獨主於時也黃疸太陰濕土之病故以十八日為期土氣未敗治之十日以上當瘥反劇則土敗不應常期故為難治黃疸十四疸而渴者其疸難治疸而不渴者其疸可治發於陰部其人必嘔陽部其人振寒而發熱也疸而渴者濕蒸為熱濕為陽虛熱為火盛泄火則損其陽補陽則益其火故為難治疸而不渴者濕多熱少故為可治發於陰部其病在裡濕盛土鬱胃氣上逆必作嘔吐發於陽部其病在表濕旺經郁寒氣外襲必發熱而惡寒也黃疸十五谷疸之病寒熱不食食即頭眩心胸不安久久發黃為谷疸茵陳蒿湯主之谷疸之病濕盛而感風寒郁其營衛則病寒熱濕土鬱滿不甘飲食食下不消濁氣上逆即頭目眩暈而心胸不安久而穀氣瘀濁化而為熱熱流膀胱發為谷疸茵陳蒿湯茵陳利水而除濕梔黃瀉熱而清煩也茵陳蒿湯六十四方見傷寒太陰茵陳蒿六兩梔子十四枚大黃二兩上三味以水一斗先煮茵陳減六升內二味煮取三升去滓分溫三服小便當利尿如皂角汁狀色正赤一宿腹減黃從小便去也黃疸十六酒疸心中懊憹或熱痛梔子大黃湯主之酒疸心中懊憹或生熱痛全是濕熱熏沖宮城鬱塞梔子大黃湯梔子香豉清熱而除煩枳實大黃瀉滿而蕩瘀也梔子大黃湯六十五梔子十四枚香豉一升枳實五枚大黃三兩上四味以水六升煮取四升分溫三服黃疸十七黃家日晡所發熱而反惡寒此為女勞得之膀胱急少腹滿身盡黃額上黑足下熱因作黑疸其腹脹如水狀大便必黑時溏此女勞之病非水也腹滿者難治硝礬散主之黃家日晡所發熱而反惡寒此為女勞得之緣女勞泄其腎陽水寒土濕乙木遏陷不能疏泄水道一感風邪衛氣內閉汗尿不行濕無泄路瘀蒸肌膚而發黃色日晡土旺之時濕盛熱發而木鬱陽陷故足下常熱而身反惡寒木鬱水土之內不能上達膀胱迫急少腹滿脹一身盡發黃色而寒水上逆額上獨黑久而土負水勝黃化而黑因作黑疸谷滓不從土化而從水化大便亦黑時時溏泄其腹脹如水病之狀此係女勞之病並非水也腹滿者水木旺而中氣敗證為難治硝礬散硝石清熱瘀而瀉木礬石收濕淫而瀉水也硝礬散六十六硝石礬石等分燒上二味為散大麥粥汁和服方寸匕日三服病隨大小便去小便正黃大便正黑是其候也黃疸十八黃疸病茵陳五苓散主之黃疸病水鬱土濕茵陳瀉濕而清熱五苓利水而燥土也茵陳五苓散六十七茵陳蒿末五分五苓散五分上二味和先食飲服方寸匕日三服黃疸十九諸黃豬膏發煎主之諸黃濕熱瘀蒸膀胱癃閉豬膏利水而清熱發灰瀉濕而開癃也豬膏發煎六十八豬膏半斤亂髮如雞子大三枚上二味和膏中煎之發消藥成分再服病從小便去黃疸二十諸病黃家但利其小便假令脈浮當以汗解之宜桂枝加黃耆湯主之方在水氣諸病黃家皆由濕得膀胱閉癃濕無泄路但當利其小便以瀉濕熱茵陳五苓豬膏發煎之法是也假令脈浮則濕在經絡而不在臟腑此當以汗解之宜桂枝加黃耆湯瀉其營衛以散濕邪也黃疸二十一黃疸腹滿小便不利而赤自汗出此為表和裡實當下之宜大黃硝石湯黃疸腹滿小便不利而赤自汗出此為表和裡實緣汗孔外泄水道里瘀濕不在經絡而在臟腑法當下之大黃硝石湯大黃硝石瀉陽明之濕熱梔子黃柏清君相之鬱火也大黃硝石湯六十九大黃四兩硝石四兩梔子十五枚黃柏四兩上四味以水六升煮取二升去滓內硝石更煮取一升頓服黃疸二十二黃疸病小便色不變欲自利腹滿而喘不可除熱熱除必噦噦者小半夏湯主之方在痰飲黃疸病小便清白不變黃赤之色兼欲自利是脾腎寒濕而清氣下陷也腹滿而喘是肺胃寒濕而濁氣上逆也如此雖有外熱不可除也熱除土敗寒濕愈增胃氣更逆必發噦噫噦者宜小半夏湯半夏生薑降沖逆而止嘔噦溫寒濕而行鬱滿也黃疸二十三諸黃腹痛而嘔者宜小柴胡湯方在嘔吐諸黃腹痛而嘔者甲木之賊戊土而胃氣上逆也宜小柴胡湯柴胡黃芩疏甲木而瀉相火參甘大棗培戊土而補中氣生薑半夏降逆氣而止嘔吐也男子黃小便自利當與虛勞小建中湯方在虛勞此係黃本缺依要略補之以待考焉
