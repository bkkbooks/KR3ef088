body:
  text: 卷二外感五臟風寒積聚二十一章五臟風寒積聚虛邪之外感本氣之內傷者也風雨之邪傷於上清濕之邪傷於下飲食喜怒之邪傷於中表邪外襲里邪內應兩虛相逢留而不去此積聚所由來也積者血多而氣少難經所謂血滯而不濡者也聚者氣多而血少難經所謂氣留而不行者也心病於上腎病於下肺病於右肝病於左脾病於中五臟之積聚各有其部此三焦所由分也既成積聚不得不用消磨仲景未嘗立法然大黃蟅蟲桂枝茯苓抵當湯丸鱉甲煎丸下瘀血湯之類具載諸篇審宜而選用之可也五臟風寒十九章五臟風寒一肺中風者口燥而喘身運而重冒而腫脹肺主氣氣化津肺中風者風邪在表肺氣壅阻是以發喘氣滯津凝是以口燥風鬱勃而外泄故身體旋運氣收斂而內閉故身體遲重陽遏不能外達故昏冒無覺氣滯不能四達故腫脹不消五臟風寒二肺中寒吐濁涕肺主皮毛寒侵皮毛裡氣鬱塞肺無降路逆衝上竅清氣淫蒸則化痰涕涕少則出於鼻多則出於口也五臟風寒三肺死臟浮之虛按之弱如蔥葉下無根者死肺死臟者肺之真臟脈也肺脈浮而澀蓋金降於水則脈沉澀者將沉而未沉氣之方收而未藏者也若浮取之而虛飄重按之弱如蔥葉之空下無根者是肺金之衰敗而不降也此謂真臟脈真臟見則死素問平人氣象論死肺脈來如物之浮如風吹毛曰肺死玉機真臟論真肺脈至大而虛如以毛羽中人膚即此義也五臟風寒四肝中風者頭目瞤兩脅痛行常傴令人嗜甘肝為厥陰風木肝中風者木鬱風動筋脈振搖故頭目瞤動肝脈行於脅肋經氣壅塞故兩脅痛楚筋脈燥急故行常傴俯木燥而剋土土虛則嗜甘土味甘也五臟風寒五肝中寒者兩臂不舉舌本燥喜太息胸中痛不得轉側食則吐而汗出也足之三陰自足走胸手之三陰自胸走手肝中寒者足之厥陰下陷手之厥陰上逆手厥陰之脈入肘下臂兩臂無氣故痿而不舉靈樞經脈肝者筋之合也筋者聚於陰器而脈絡於舌本木陷風生故舌本燥經脈膽足少陽之經是動則病口苦善太息肝膽同氣陽盛則怒陰盛則悲也肝脈上貫胸膈風木鬱沖故胸中痛厥陰行身之側經氣鬱縮轉側痛生故不得轉側脾土被刑飲食不化故食則吐逆食下之時土困肝鬱風木疏泄是以汗出也五臟風寒六肝死臟浮之弱按之如索不來或曲如蛇行者死肝死臟者肝之真臟脈也肝脈弦而滑蓋甲木降於水而乙木升於火升於火則脈浮滑者將浮而未浮氣之方生而未長者也若浮取之而弱重按之如索不來或曲如蛇行者是肝木之頽敗而不升也如索不來者如繩索空懸輕飄遊移按之應手而去不能復來鼓指也如蛇行者木暢則直鬱則曲一曲一直鬱而不暢故狀如蛇行平人氣象論死肝脈來急益徑如新張弓弦曰肝死玉機真臟論真肝脈至中外急如循刀刃責責然如按琴瑟弦彼乃肝脈之太過此則肝脈之不及者也五臟風寒七肝著其人常欲蹈其胸上先未苦時但欲飲熱旋覆花湯主之方在婦人雜病肝著者肝氣痹著而不舒也肝愈鬱而風愈動風木蕩搖神魂懸虛故常欲人蹈其胸上先未苦時水寒木燥故但欲飲熱旋覆花湯旋覆新絛行血而清風蔥白通經而瀉滯也五臟風寒八心中風者翕翕發熱不能起心中飢食即嘔吐心中風者火鬱上炎故翕翕發熱熱則傷氣故虛乏不能起身心液消爍空洞虛餒故心中常飢心火既升胃氣必逆緣火不歸水水寒則土濕故也胃氣上逆故食即嘔吐五臟風寒九心中寒者其人苦病心如啖蒜狀劇者心痛徹背背痛徹心譬如蟲注其脈浮者自吐乃愈金之味辛心中寒者火衰不能制金金反侮火故心中時作辛味劇者寒水侮火故心痛徹背背痛徹心譬如蟲注之痛楚也其脈浮者寒瘀胸膈必自吐之乃愈也五臟風寒十心傷者其人勞倦即頭面赤而下重心中痛而自煩發熱當臍跳其脈弦此為心臟傷所致也心為水傷心者火也心傷者一遇勞倦即火上炎而頭面赤水下凝而腿足重寒氣逆沖而心痛熱氣升鬱而自煩火上鬱而發熱木下鬱而臍跳其脈弦而不能洪此為心臟傷於寒水所致也弦為肝脈肝木心之母心脈浮洪木不生火故心脈當洪而反弦也五臟風寒十一邪入使魂魄不安者血氣少也血氣少者屬於心心氣虛者其人則畏合目欲眠夢遠行而精神離散魂魄妄行陰氣衰者為顛陽氣衰者為狂靈樞本神心藏脈脈舍神腎藏精精舍志肝藏血血舍魂肺藏氣氣舍魄邪入使魂魄不安者肝肺之血氣少也血氣少者屬於心以血者自陰而之陽水升而化火則生血氣者自陽而之陰火降而化水則生氣血氣皆原於火故血氣少者由於心火之虛也心氣虛則腎水勝火腎之志為恐緣火盛則神氣升達而為喜水盛則神氣淪陷而為恐故水勝火者其人則恐水寒火敗則火升而水沉金逆而木陷火升水沉則神飛而精走金逆木陷則魄蕩而魂馳故合目欲眠夢遠行而精神離散魂魄妄行以水火之不濟金木之不交也精魄陰也陰氣衰者則志迷而為顛神魂陽也陽氣衰者則神亂而為狂難經重陰則顛重陽則狂言與此殊而實則同也蓋濁降則為陰陰愈盛則愈溫清升則為陽陽愈盛則愈涼故陽降而為濁陰陰升而化清陽陽清則化神陰濁則化精而神根於精坎之陽也水陰而抱陽故精溫而不顛精根於神離之陰也火陽而含陰故神清而不狂狂者君火不降雖上熱如爐實陽虛而非陽盛也顛者癸水不升雖下寒如冰實陰虛而非陰盛也五臟風寒十二心死臟浮之實如麻豆按之益躁疾者死心死臟者心之真臟脈也心火下降則心位清虛而不實難經所謂浮而大散者心也若浮取之實如麻豆重按之益覺躁疾者是心火之升炎而不降也平人氣象論死心脈來前曲後居如操帶鉤曰心死玉機真臟論真心脈至堅而搏如循薏苡子纍纍然即此義也五臟風寒十三腎著之病其人身體重腰中冷如坐水中形如水狀反不渴小便自利飲食如故病屬下焦身勞汗出衣里冷濕久久得之腰以下冷痛腹重如帶五千錢姜甘苓朮湯主之腎著者腎氣痹著而凝沍也水盛陰旺故身體遲重腰中寒冷如坐水中水漬經絡故形如水病之狀似乎浮腫水旺土濕故反不渴水不在於臟腑故小便自利飲食如故其病在腎屬於下焦原因身勞汗出衣里沾濡冷濕冷濕之氣久久入腠理而浸經絡同氣相感故令腎氣痹著而成此病腎位在腰自腰以下陰冷痛楚土位在腹水旺侮土故腹重如帶五千錢也姜甘苓朮湯薑苓溫中而瀉水朮甘培土而去濕也姜甘苓朮湯一乾薑四兩甘草四兩茯苓四兩白朮四兩上四味以水五升煮取三升分溫三服腰中即溫五臟風寒十四腎死臟浮之堅按之亂如轉丸益下入尺者死腎死臟者腎之真臟脈也癸水升於丁火則水位泮渙而不結若浮取之而堅重按之亂如轉丸益下入尺者是腎水之下流而不升也平人氣象論死腎脈來發如奪索辟辟如彈石曰腎死玉機真臟論真腎脈至搏而絶如指彈石辟辟然即此義也腎無中風中寒者心腎同經心病即腎病也而腎著之病即中寒所傷也五臟風寒十五脾中風者翕翕發熱形如醉人腹中煩重皮肉瞤瞤而短氣脾為濕土脾中風者濕鬱為熱故形如醉人脾位在腹故腹中煩重熱盛則煩濕盛則重也土濕則木鬱而風生故皮肉瞤動脾土鬱滿肺金莫降是以短氣五臟風寒十六脾死臟浮之大堅按之如覆盆潔潔狀如搖者死脾死臟者脾之真臟脈也己土升於離位則清氣在上戊土降於坎中則濁氣在下清升濁降中氣衝和是以脈見關上其象為緩若浮之大堅是戊土之壅而不降也按之如覆盆之硬潔潔狀如搖動者是己土之滯而不升也脈法浮為在表沉為在裡腑者里中之表故宜浮取臟者里中之裡故宜重按傷寒脈法所謂數脈見於關上上下無頭尾厥厥動搖者是也平人氣象論死脾脈來鋭堅如烏之喙如鳥之距曰脾死玉機真臟論諸真臟脈見者皆死不治也五臟者皆稟氣於胃胃者五臟之本也臟氣者不能自致於手太陰必因於胃氣乃致於手太陰也故五臟各以其時自胃而致於手太陰邪氣勝者精氣衰也病甚者胃氣不能與之俱致於手太陰故真臟之氣獨見獨見者病勝臟也故曰死五臟風寒十七問曰三焦竭部上焦竭善噫何謂也師曰上焦受中焦氣未和不能消穀故為噫耳下焦竭即遺溺失便其氣不和不能自禁制不須治久則愈三焦各有其部三焦竭部者三焦竭其本部之氣也上焦清氣竭則濁氣上逆而為噫緣上焦受氣於中焦中焦燥濕之氣未和不能消穀土氣鬱滿濁陰不降故上焦痞悶而為噫耳下焦腎氣虧竭無以約束便溺即遺溺而失便以其陽根升泄陰孤於下其中不和不能自禁制夫二便也不須治之久而陽降氣和則愈矣此寒氣之傷於三焦而內寒者五臟風寒十八師曰熱在上焦者因咳為肺痿熱在中焦者則為堅熱在下焦者則尿血亦令淋閉不通大腸有寒者多騖溏有熱者便腸垢小腸有寒者其人下重便血有熱者必痔熱在上焦者因咳嗽而為肺痿熱在中焦者則為消穀而便堅熱在下焦者則為木陷而尿血亦令淋閉而不通緣土濕木陷郁生下熱風木疏泄而水不能藏則為尿血寒水閉藏而木不能泄則為淋閉也此風氣之傷於三焦而內熱者若夫大腸有寒者多如鴨鶩之溏泄有熱者脂膏腐爛而便腸垢小腸有寒者肝脾濕陷下重而便血有熱者肛門腫結而為痔此於下焦之中分別寒熱五臟風寒十九趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相摶大便則堅其脾為約麻仁丸主之趺陽胃脈足趺上之衝陽也陽盛則脈浮浮則胃氣強壯也血虛則脈澀澀則風木疏泄而小便數也浮澀相合土燥水枯大便則堅其脾氣為之約結不舒而糞如羊矢麻仁丸麻仁杏仁潤燥而滑腸芍藥大黃清風而泄熱厚朴枳實行滯而開結也此熱在中焦則為堅者麻仁丸二方見傷寒麻子仁二升芍藥半斤杏仁一升熬別作脂大黃一斤去皮厚朴一尺去皮枳實一斤炙上六味末之煉蜜和丸梧子大飲服十丸日三服漸加以知為度積聚二章積聚二十問曰病有積有聚有䅽氣何謂也師曰積者臟病也終不移聚者腑病也發作有時展轉痛移為可治䅽氣者脅下痛按之則愈復發為䅽氣病有積有聚有䅽氣積者五臟之病也臟為陰其性靜故終不遷移難經臟病者止而不移其病不離其處聚者六腑之病也腑為陽其性動故發作有時展轉痛移此為可治難經腑病者倣佛賁響上下流行居無常處䅽氣者穀氣也水穀不消中氣鬱滿木氣抑遏故脅下作痛按之郁開則愈舉手復發是為䅽氣此風寒之傷於臟腑而成積聚者也積聚二十一諸積大法脈來細而附骨者乃積也寸口積在胸中微出寸口積在喉中關上積在臍旁上關上積在心下微下關積在少腹尺中積在氣街脈出左積在左脈出右積在右脈兩出積在中央各以其部處之診諸積之大法脈來細而附骨者乃積也見於寸口則上而積在胸中微出寸口則更上而積在喉中見於關上則中而積在臍旁上於關上則上而積在心下微下於關則下而積在少腹見於尺中則下而積在氣街脈出於左積在於左脈出於右積在於右脈左右兩出積在中央各以其上下左右之部處之五十六難肝之積曰肥氣在左脅下如覆杯有頭足心之積曰伏梁起臍上大如臂上至心下脾之積曰痞氣在胃脘覆大如盤肺之積曰息賁在右脅下覆大如杯腎之積曰奔豚發於少腹上至心下若豚狀或上或下無時此五積之部也此就積聚而分三焦之部積聚者風寒之所成也靈樞百病始生夫百病之始生也皆起於風雨寒暑清濕喜怒喜怒不節則傷臟風雨則傷上清濕則傷下是謂三部虛邪之中人也始於皮膚皮膚緩則腠理開開則邪從毛髮入入則抵深深則毛髮立毛髮立則淅然故皮膚痛留而不去則傳舍於絡脈在絡之時痛於肌肉其痛之時息大經乃代留而不去傳舍於經在經之時灑淅喜驚留而不去傳舍於腧在腧之時六經不通四肢則肢節痛腰脊乃強留而不去傳舍於伏沖之脈在伏沖之時體重身痛留而不去傳舍於腸胃在腸胃之時賁響腹脹多寒則腸鳴飧泄食不化多熱則溏出麋留而不去傳舍於腸胃之外募原眉批募膜幕三字通吳又可溫疫論解募原二字不的膈膜在肺下與脅腹周回相著如幕以遮濁氣不使熏蒸上焦查難經自明之間留著於脈稽留而不去息而成積或著孫脈或著絡脈或著經脈或著腧脈或著於伏沖之脈或著於膂筋或著於腸胃之募原上連於緩筋邪氣淫泆不可勝論其著孫絡之脈而成積者其積往來上下臂手孫絡之所居也浮而緩不能句積而止之故往來移行腸胃之間水湊滲注灌濯濯有音有寒則腹滿雷引故時切痛其著於陽明之經則挾臍而居飽食則益大飢則益小其著於緩筋也似陽明之積飽食則痛飢則安其著於腸胃之募原也病而外連於緩筋飽食則安飢則痛其著於伏沖之脈者揣之應手而動發手則熱氣下於兩股如湯沃之狀其著於膂筋在腸後者飢則積見飽則積不見按之不得其著於腧之脈者閉塞不通津液不下孔竅乾壅此邪氣之從外入內從上下也積之始生得寒乃生厥乃成積也厥氣生足悗悗生脛寒脛寒則血脈凝澀血脈凝澀則寒氣上入於腸胃入於腸胃則䐜脹䐜脹則腸外之汁沫迫聚不得散日以成積卒然多食飲則腸滿起居不節用力過度則絡脈傷陽絡傷則血外溢血外溢則衄血陰絡傷則血內溢血內溢則後血腸胃之絡傷則血溢於腸外腸外有寒汁沫與血相摶則併合凝聚不得散而積成矣卒然外中於寒若內傷於憂怒則氣上逆氣上逆則六腧不通溫氣不行凝血蘊裹而不散津液澀滲著而不去而積皆成矣憂思傷心重寒傷肺忿怒傷肝醉以入房汗出當風傷脾用力過度若入房汗出浴則傷腎此內外三部之所生病者也風寒積聚之義如此
