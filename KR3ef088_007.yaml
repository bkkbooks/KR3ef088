body:
  text: 卷七內傷血痹虛勞十八章血痹虛勞非一病也而證有相通血痹之證必因於虛勞所謂骨弱肌膚盛重因疲勞汗出是也虛勞之病必致於血痹所謂中有乾血肌膚甲錯兩目黯黑是也蓋勞傷在乎氣而病成在乎血二十二難解靈樞經脈之文是動者氣也所生病者血也氣主煦之血主濡之氣留而不行者為氣先病也血滯而不濡者為血後病也故先為是動後所生也緣氣無形而難病病必由於血瘀血有質而易病病必由於氣凝氣倡而血隨之故氣動則血病也其未結而方瘀由上亡於吐衄而下脫於便溺其既瘀而又結則淺聚於經絡而深積於臟腑其方瘀而亡脫以陰氣堙鬱而中寒也其既結而積聚則陽氣壅阻而變熱也而其先總緣於土虛土虛則火熱而水寒金爍而木枯中樞敗而四維不轉故火金傷而神氣病於上水木損而精血病於下會仲景建中之義則血痹虛勞之病隨處逢源矣血痹二章血痹一問曰血痹病從何得之師曰夫尊榮人骨弱肌膚盛重因疲勞汗出臥不時動搖加被微風遂得之但以脈自微澀在寸口關上小緊宜針引陽氣令脈和緊去則愈血痹者血閉痹而不行也此以尊榮之人骨弱肉豐氣虛血盛重因疲勞汗出氣蒸血沸之時安臥不時動搖血方動而身已靜靜則血凝加被微風吹襲閉其皮毛內郁不得外達因此痹著而不流通血痹不行則脈自微澀風寒外閉則寸口關上小緊緊者寒閉之脈清邪居上故氣行於寸關此宜針引陽氣令陽氣通達則痹開而風散緊去而脈和自然愈也久痹不已而成乾血則為大黃蟅蟲之證矣血痹二血痹陰陽俱微寸口關上微尺中小緊外證身體不仁如風痹狀黃耆桂枝五物湯主之血痹寸陽尺陰俱微其寸口關上則微其尺中則微而復兼小緊脈法緊則為寒以寒則微陽封閉而不上達故脈緊外證身體不仁如風痹之狀以風襲皮毛營血凝澀衛氣鬱遏漸生麻痹營衛阻梗不能煦濡肌肉久而枯稿無知遂以不仁營衛不行經絡無氣故尺寸關上俱微營瘀木陷鬱於寒水而不能上達故尺中小緊黃耆桂枝五物湯大棗芍藥滋營血而清風木薑桂黃耆宣營衛而行瘀澀倍用生薑通經絡而開閉痹也黃耆桂枝五物湯三十二黃耆三兩桂枝三兩芍藥三兩生薑六兩大棗十二枚上五味以水六升煮取二升溫服七合日三服一方有人參虛勞十六章虛勞一脈弦而大弦而為減大則為芤減則為寒芤則為虛虛寒相傳此名為革婦人則半産漏下男子則亡血失精此段見傷寒脈法脈弦而大弦則為陽衰而脈減大則為陰衰而脈芤減則陽氣不足而為寒芤則陰血不充而為虛虛寒相合此名為革婦人則半産漏下男子則亡血失精以其陽升而不降陰降而不升上熱下寒陰中無陽精血失統故也中氣者交濟水火之媒眉批道家黃婆嬰奼之旨水火不濟總以中氣之虛後世醫法不傳治此乃用清涼滋潤中氣崩敗水走火飛百不一生今之醫事不可問也漏下者非經期而血下血暴脫者謂之崩中如堤崩而水泄也血續失者謂之漏下如屋漏而水滴也虛勞二夫男子平人脈大為勞極虛亦為勞脈大者表陽離根而外浮所謂大則為芤也極虛者里陽虧乏而內空所謂芤則為虛也或大或芤皆以勞傷元氣之故也虛勞三男子面色薄者主渴及亡血卒喘悸脈浮者裡虛也血者色之華也亡血而無以華色故面色清薄血弱則發熱而作渴傷寒所謂諸弱發熱熱者必渴也熱盛火炎則刑金而作喘血亡肝虛風木鬱沖則生悸動凡脈浮者皆緣裡氣之虛表陽不能內交也虛勞四男子脈虛沉弦無寒熱短氣裡急小便不利面色白時時瞑兼衄少腹滿此為勞使之然脈虛者空虛而不實沉者陽陷而不升弦者水寒而木枯也無寒熱者無表證也短氣者氣不歸根裡急者木鬱不達小便不利者土濕木陷不能行水面色白者血不華色時時瞑者陽不歸根升浮而眩暈衄者肺金之不斂少腹滿者肝木之不升此皆勞傷中氣不能升降陰陽故使之然也虛勞五勞之為病其脈浮大手足煩春夏劇秋冬瘥陰寒精自出酸削不能行脈浮大手足煩者陽氣內虛而外盛也春夏陽氣浮升內愈寒而外愈熱故劇秋冬陽氣沉降外熱輕而內寒減故瘥緣中氣虛敗不能交濟水火火炎而上熱水澌而下寒腎者蟄閉封藏之官也水冷不能蟄藏陽氣則陰寒精自出水寒不能生髮肝木則酸削不能行也虛勞六男子脈浮弱而澀為無子精氣清冷脈浮者陽虛而不斂也弱者氣衰而不振也澀者血寒而不流也此其肝腎陽虧精氣清冷不能生子也冬水蟄藏地下溫暖春時木氣發泄則陽升而物生人之所以生子者腎肝之陽旺也若水寒木枯生意不旺不能生子也虛勞七男子平人脈虛弱細微者喜盜汗也脈虛弱細微者里陰盛而表陽虛寐時衛氣不交陰分外泄而不斂故喜盜汗虛勞八人年五六十其病脈大者痹挾背行若腸鳴馬刀挾癭者皆為勞得之病脈大者陽不歸根而外盛也痹挾背行者足太陽之經行身之背太陽不降則經氣痹著挾背而行也腸鳴者水寒而木鬱乙木陷於寒水之中鬱勃激宕故雷鳴而氣轉也馬刀挾癭者瘰癧之瘡足少陽之病也足少陽之經循頸側而入缺盆隨足陽明而下降水寒土濕胃逆不降則膽脈上壅瘀結而生瘰癧靈樞經脈膽足少陽之經是動則病口苦心脅痛缺盆中腫痛腋下腫馬刀挾癭靈樞癰疽其癰堅而不潰者為馬刀挾癭此皆勞傷水土不能滋培木氣故也虛勞九脈沉小遲名脫氣其人疾行則喘喝手足逆冷腹滿甚則溏泄食不消化也脈沉小而遲是名脫氣脫氣者陰中之陽陷而不升也其人疾行則喘喝而仰息喘喝者陽中之陽逆而不降也氣不歸根故動則發喘其手足逆冷以四肢秉氣於脾胃脾胃陽虛四肢失秉故寒冷不溫陽受氣於四末素問語手足者陽盛之處溫則為順不溫而寒是謂逆也脾主升清胃主降濁陽衰濕旺升降反作清氣陷而濁氣逆是以腹滿脾陽升動則水穀消磨清陽下陷磨化失職是生飧泄故甚則大便溏泄食不消化也虛勞十夫失精家少腹弦急陰頭寒目眩發落脈極虛芤遲為清穀亡血失精脈得諸芤動微緊男子失精女子夢交桂枝龍骨牡蠣湯主之失精之家風木鬱陷則少腹弦急溫氣虛敗則陰頭寒涼相火升泄則目眩發落緣水寒不能生木木氣遏陷橫塞於少腹故弦硬而緊急肝主筋前陰者宗筋之聚腎肝之陽虛故陰頭寒冷水木下寒而不升則火金上熱而不降相火升騰離根而虛飄故目眩而發落其脈極虛芤遲澀此為清穀亡血失精之診凡脈得諸芤動微緊皆陰中無陽男子則失精女子則夢交蓋乙木生於腎水溫則升而寒則陷腎主蟄藏肝主疏泄水寒木陷鬱而生風肝行其疏泄腎失其蟄藏故精滑而遺失也此其中全緣土虛以水木為陰隨己土而上升則下焦不寒火金為陽隨戊土而下降則上焦不熱上清則無嗽喘吐衄之證下溫則無清穀遺精之疾是謂平人脾升胃降之機是為中氣中氣者升降陰陽之樞交濟水火之媒奼女嬰兒之配合權在於此道家謂之黃婆義至精也其位居坎離之中戊己之界此即生身之祖氣胎元之元神陰陽之門天地之根也老子玄牝之門是謂天地根指此桂枝龍骨牡蠣湯桂枝芍藥達木鬱而清風燥薑甘大棗和中氣而補脾精龍骨牡蠣斂神氣而澀精血也桂枝龍骨牡蠣湯三十三桂枝三兩芍藥三兩甘草二兩大棗十二枚生薑三兩龍骨三兩牡蠣三兩上七味以水七升煮取三升分溫三服虛勞十一虛勞裡急悸衄腹中痛夢失精四肢痠疼手足煩熱咽乾口燥小建中湯主之裡急者乙木鬱陷迫急而不和也木性喜達鬱而欲發生氣不遂衝突擊撞是以腹痛肝主筋諸筋皆聚於節生氣失政筋節不暢故四肢痠疼膽氣上逆胸肋壅塞肝脈上行升路郁阻風木振搖故心下悸動子半陽生木氣萌蘖而生意郁陷不能上達則欲動而夢交接益以風木疏泄是以精遺風燥亡津肺府枯稿故咽乾口燥風木善泄肺金失斂故血衄鼻竅手之三陽足之三陰陷而不升故手足煩熱手之三陽不升則陽中之陽陷於陰中足之三陰不升則陰中之陽陷於陰中故手足煩熱此以中氣虛敗風木下陷而相火上逆也小建中湯膠飴甘棗補脾精而緩裡急薑桂芍藥達木鬱而清風火也小建中湯三十四方見傷寒少陽桂枝三兩芍藥六兩甘草三兩炙大棗十二枚生薑三兩膠飴一升上六味以水七升煮取三升去滓內膠飴更上微火消解溫服一升日三服嘔家不可用此湯以甜故也虛勞十二虛勞裡急諸不足黃耆建中湯主之虛勞之病脾陽陷敗風木枯稿郁迫不升是以裡急木中溫氣陽氣之根也生氣之陷原於陽根之虛黃耆建中湯膠飴甘棗補脾精而緩裡急薑桂芍藥達木鬱而清風燥黃耆補肝脾之氣以培陽根也黃耆建中湯三十五桂枝三兩芍藥六兩甘草二兩炙大棗十二枚生薑三兩膠飴一升黃耆一兩半於小建中湯內加黃耆一兩半余依建中湯法氣短胸滿者加生薑腹滿者去棗加茯苓一兩半及療肺虛損不足補氣加半夏一兩虛勞十三虛勞腰痛少腹拘急小便不利者八味腎氣丸主之方在消渴腎位於腰在脊骨十四椎之旁足太陽之經亦挾脊而抵腰中腰者水位也水寒不能生木則木陷於水而腰痛作木鬱風生不能上達則橫塞少腹枯稿而拘急乙木鬱陷緑於土濕木遏於濕土之中疏泄之令不暢故小便不利八味腎氣丸附子溫癸水而益腎氣地黃滋乙木而補肝血丹皮行血而開瘀澀薯萸斂精而止失亡苓澤瀉水而滲濕桂枝疏木而達郁也虛勞十四虛勞諸不足風氣百疾薯蕷丸主之虛勞之病率在厥陰風木一經肝脾陽虛生氣不達木鬱風動泄而不藏於是虛勞不足百病皆生肺主收斂薯蕷斂肺而保精麥冬清金而寧神桔梗杏仁破壅而降逆以助辛金之收斂肝主生髮歸膠滋肝而養血地芍潤木而清風芎藭桂枝疏鬱而升陷以助乙木之生髮土位在中是為升降金木之樞大棗補己土之精人參補戊土之氣苓朮甘草培土而瀉濕神麯乾薑消滯而溫寒所以理中而運升降之樞也木位在左是為克傷中氣之賊柴胡白蘞瀉相火而疏甲木黃卷防風燥濕土而達乙木所以剪亂而除中州之賊也薯蕷丸三十六薯蕷三十分麥冬六分桔梗五分杏仁六分當歸十分阿膠七分芍藥六分乾地黃十分大棗百枚為膏人參七分甘草二十八分白朮六分茯苓五分神麯十分乾薑三分柴胡五分白蘞二分桂枝十分防風六分豆黃卷十分以黑豆芽為正芎藭六分上二十一味末之煉蜜和丸如彈子大空腹酒服一丸一百丸為劑眉批八珍十全俱仿此方但於疏木斂金升降戊己之法不及此丸精密虛勞十五虛勞虛煩不得眠酸棗湯主之土濕胃逆相火升泄是以虛煩不得眠睡酸棗湯甘草茯苓培土而瀉濕芎藭知母疏木而清煩酸棗斂神魂而安浮動也酸棗湯三十七酸棗仁二升知母二兩芎藭二兩甘草一兩茯苓二兩上五味以水八升煮酸棗仁取六升內諸藥煮取三升分溫三服虛勞十六五勞虛極羸瘦腹滿不能飲食食傷憂傷飲傷房室傷飢傷勞傷經絡營衛氣傷內有乾血肌膚甲錯兩目黯黑緩中補虛大黃蟅蟲丸主之五勞五臟之勞病也素問宣明五氣久視傷血久臥傷氣久坐傷肉久立傷骨久行傷筋是謂五勞所傷心主血肺主氣脾主肉腎主骨肝主筋五勞不同其病各異而總以脾胃為主以其為四維之中氣也故五勞之病至於虛極必羸瘦腹滿不能飲食緣其中氣之敗也五勞之外又有七傷飽食而傷憂鬱而傷過飲而傷房室而傷飢餒而傷勞苦而傷經絡營衛氣傷其傷則在氣而病則在血血隨氣行氣滯則血瘀也血所以潤身而華色血瘀而干則肌膚甲錯而不潤兩目黯黑而不華肝竅於目靈樞肝病者眥青五閲五使篇正此義也血枯木燥筋脈短縮故中急而不緩大黃蟅蟲丸甘草培土而緩中杏仁利氣而瀉滿桃仁乾漆虻蟲水蛭蠐螬蟅蟲破瘀而消症芍藥地黃清風木而滋營血黃芩大黃瀉相火而下結塊也凡五勞七傷不離肝木肝木之病必緣土虛以中氣勞傷己土濕陷風木鬱遏生氣不達於是賊脾位而犯中原脾敗不能化水穀而生肌肉故羸瘦而腹滿肝藏血而竅於目木陷血瘀皮膚失榮故肌錯而目黑大黃蟅蟲丸養中而滋木行血而清風勞傷必需之法也大黃蟅蟲丸三十八大黃十分蒸黃芩二兩芍藥四兩乾地黃十兩甘草三兩杏仁一升桃仁一升乾漆一兩虻蟲一升水蛭百枚蠐螬一升蟅蟲半升上十二味末之煉蜜丸小豆大酒飲服五丸日三服附方千金翼炙甘草湯五方見傷寒少陽治虛勞諸不足汗出而悶脈結心悸行動如常不出百日危急者十一日死甘草四兩炙桂枝三兩人參二兩生薑三兩大棗三十枚麥冬半升阿膠二兩生地黃一斤麻仁半升上九味以酒七升水八升先煮八味取三升去滓內膠消盡溫服一升日三服
